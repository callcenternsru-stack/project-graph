<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление проектами</title>
    <style>
        /* ===== ПОЛНЫЙ КОРПОРАТИВНЫЙ СТИЛЬ ===== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000000;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #111111;
            border-radius: 24px;
            padding: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255,215,0,0.2);
        }
        h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            color: #ffd700;
            font-size: 22px;
        }
        .add-btn {
            padding: 10px 20px;
            background: #ffd700;
            color: #000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,215,0,0.4);
        }
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #000;
            color: #ffd700;
            font-weight: 600;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px 15px;
            color: #ccc;
            border-bottom: 1px solid #333;
        }
        tr:hover td {
            background: #222;
        }
        .actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-right: 5px;
        }
        .edit-btn {
            background: #6b8cff;
            color: white;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
        }
        .copy-link-btn {
            background: #4caf50;
            color: white;
        }
        .details-btn {
            background: #ffd700;
            color: #000;
        }
        /* Модальное окно */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border-radius: 24px;
            width: 800px;
            max-width: 90vw;
            border: 2px solid #ffd700;
            display: none;
            z-index: 10000;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal.show {
            display: block;
            animation: modalAppear 0.3s ease;
        }
        @keyframes modalAppear {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        .modal-header {
            padding: 20px;
            border-bottom: 2px solid #ffd700;
            color: #ffd700;
            font-size: 18px;
            font-weight: 600;
            background: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-close {
            cursor: pointer;
            font-size: 20px;
        }
        .modal-content {
            padding: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .key-display {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-family: monospace;
            font-size: 16px;
            margin-top: 5px;
            word-break: break-all;
        }
        .save-btn {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Уведомление */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px;
            background: #111111;
            border: 2px solid #ffd700;
            border-radius: 12px;
            color: #ffffff;
            z-index: 20000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Управление проектами</h1>
        <div class="section-header">
            <h2>Список проектов</h2>
            <button class="add-btn" onclick="openAddModal()">+ Добавить проект</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Название проекта</th>
                        <th>Уникальный ключ</th>
                        <th>Ссылка для кандидата</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="projectsList"></tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно для добавления/редактирования проекта (базовое) -->
    <div id="projectModal" class="modal">
        <div class="modal-header">
            <span id="modalTitle">Добавить проект</span>
            <span class="modal-close" onclick="closeModal()">✕</span>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Название проекта <span style="color:#ff6b6b;">*</span></label>
                <input type="text" id="projectName" placeholder="Например: РОССЕТТИ" maxlength="50">
            </div>
            <div class="form-group">
                <label>Уникальный ключ (генерируется автоматически)</label>
                <div class="key-display" id="projectKey">—</div>
            </div>
            <button class="save-btn" onclick="saveProject()">Сохранить</button>
        </div>
    </div>

    <!-- Модальное окно для расширенного редактирования деталей проекта -->
    <div id="projectDetailsModal" class="modal">
        <div class="modal-header">
            <span>Редактирование деталей проекта</span>
            <span class="modal-close" onclick="closeDetailsModal()">✕</span>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Название проекта (только для чтения)</label>
                <input type="text" id="detailsProjectName" readonly>
            </div>
            <div class="form-group">
                <label>Область проекта</label>
                <input type="text" id="projectArea" placeholder="например: Энергетика">
            </div>
            <div class="form-group">
                <label>Тип линии</label>
                <select id="projectLineType">
                    <option value="Входящая">Входящая</option>
                    <option value="Исходящая">Исходящая</option>
                    <option value="Чат">Чат</option>
                    <option value="Мультискилл">Мультискилл</option>
                </select>
            </div>
            <div class="form-group">
                <label>О проекте</label>
                <textarea id="projectAbout" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Что нужно делать (каждый пункт с новой строки)</label>
                <textarea id="projectDuties" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>График работы (каждый пункт с новой строки)</label>
                <textarea id="projectSchedule" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Условия сотрудничества (каждый пункт с новой строки)</label>
                <textarea id="projectConditions" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Требования к кандидату (каждый пункт с новой строки)</label>
                <textarea id="projectRequirements" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Требования к рабочему месту (каждый пункт с новой строки)</label>
                <textarea id="projectWorkplace" rows="4"></textarea>
            </div>
            <button class="save-btn" onclick="saveProjectDetails()">Сохранить детали</button>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        let projects = [];
        let editingId = null;          // для базового модального окна
        let currentProjectIdForDetails = null; // для детального окна

        function showNotification(message, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.borderColor = type === 'success' ? '#4caf50' : '#ffd700';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }

        function generateProjectKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let part1 = '', part2 = '';
            for (let i = 0; i < 4; i++) {
                part1 += chars.charAt(Math.floor(Math.random() * chars.length));
                part2 += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return `PROJ-${part1}-${part2}`;
        }

        async function loadProjects() {
            try {
                const res = await fetch('/.netlify/functions/getProjects');
                if (res.ok) {
                    projects = await res.json();
                    // Нормализуем: если у проекта нет новых полей, добавляем пустые
                    projects = projects.map(p => ({
                        id: p.id,
                        name: p.name || '',
                        area: p.area || '',
                        lineType: p.lineType || 'Входящая',
                        about: p.about || '',
                        duties: p.duties || '',
                        schedule: p.schedule || '',
                        conditions: p.conditions || '',
                        requirements: p.requirements || '',
                        workplaceRequirements: p.workplaceRequirements || ''
                    }));
                    renderProjects();
                } else {
                    showNotification('Ошибка загрузки проектов', 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        async function saveProjectToServer(project) {
            try {
                const res = await fetch('/.netlify/functions/saveProject', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(project)
                });
                if (!res.ok) throw new Error('Ошибка сохранения');
                return true;
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сохранения', 'error');
                return false;
            }
        }

        async function deleteProjectFromServer(id) {
            try {
                const res = await fetch(`/.netlify/functions/deleteProject?id=${encodeURIComponent(id)}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Ошибка удаления');
                return true;
            } catch (error) {
                console.error(error);
                showNotification('Ошибка удаления', 'error');
                return false;
            }
        }

        function renderProjects() {
            const tbody = document.getElementById('projectsList');
            tbody.innerHTML = '';
            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Нет проектов</td></tr>';
                return;
            }
            projects.forEach(proj => {
                const tr = document.createElement('tr');
                const candidateLink = `${window.location.origin}/candidate.html?projectId=${encodeURIComponent(proj.id)}`;
                tr.innerHTML = `
                    <td>${proj.name}</td>
                    <td><code>${proj.id}</code></td>
                    <td>
                        <button class="copy-link-btn" onclick="copyLink('${candidateLink}')">📋 Копировать ссылку</button>
                    </td>
                    <td class="actions">
                        <button class="edit-btn" onclick="editProject('${proj.id}')">✏️</button>
                        <button class="details-btn" onclick="openProjectDetails('${proj.id}')">📝 Детали</button>
                        <button class="delete-btn" onclick="deleteProject('${proj.id}')">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                showNotification('Ссылка скопирована!', 'success');
            }).catch(() => {
                showNotification('Не удалось скопировать ссылку', 'error');
            });
        }

        // Базовое модальное окно (добавление/редактирование имени)
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Добавить проект';
            document.getElementById('projectName').value = '';
            document.getElementById('projectKey').textContent = generateProjectKey();
            document.getElementById('projectModal').classList.add('show');
        }

        function editProject(id) {
            const proj = projects.find(p => p.id === id);
            if (!proj) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Редактировать проект';
            document.getElementById('projectName').value = proj.name;
            document.getElementById('projectKey').textContent = proj.id;
            document.getElementById('projectModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('show');
        }

        async function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            let key = document.getElementById('projectKey').textContent;

            if (!name) {
                showNotification('Введите название проекта', 'error');
                return;
            }

            if (!editingId) {
                key = generateProjectKey(); // перегенерируем для нового проекта
            }

            const project = { id: key, name: name };

            const success = await saveProjectToServer(project);
            if (success) {
                if (editingId) {
                    const index = projects.findIndex(p => p.id === editingId);
                    if (index !== -1) {
                        // Сохраняем остальные поля из старого объекта
                        projects[index] = { ...projects[index], ...project };
                    }
                } else {
                    // Новый проект: добавляем пустые поля
                    projects.push({
                        id: key,
                        name: name,
                        area: '',
                        lineType: 'Входящая',
                        about: '',
                        duties: '',
                        schedule: '',
                        conditions: '',
                        requirements: '',
                        workplaceRequirements: ''
                    });
                }
                renderProjects();
                closeModal();
                showNotification('Проект сохранён', 'success');
            }
        }

        // Детальное модальное окно
        function openProjectDetails(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            currentProjectIdForDetails = projectId;
            document.getElementById('detailsProjectName').value = project.name || '';
            document.getElementById('projectArea').value = project.area || '';
            document.getElementById('projectLineType').value = project.lineType || 'Входящая';
            document.getElementById('projectAbout').value = project.about || '';
            document.getElementById('projectDuties').value = project.duties || '';
            document.getElementById('projectSchedule').value = project.schedule || '';
            document.getElementById('projectConditions').value = project.conditions || '';
            document.getElementById('projectRequirements').value = project.requirements || '';
            document.getElementById('projectWorkplace').value = project.workplaceRequirements || '';
            document.getElementById('projectDetailsModal').classList.add('show');
        }

        function closeDetailsModal() {
            document.getElementById('projectDetailsModal').classList.remove('show');
        }

        async function saveProjectDetails() {
            const project = projects.find(p => p.id === currentProjectIdForDetails);
            if (!project) return;

            const updatedProject = {
                id: project.id,
                name: document.getElementById('detailsProjectName').value.trim(),
                area: document.getElementById('projectArea').value.trim(),
                lineType: document.getElementById('projectLineType').value,
                about: document.getElementById('projectAbout').value.trim(),
                duties: document.getElementById('projectDuties').value.trim(),
                schedule: document.getElementById('projectSchedule').value.trim(),
                conditions: document.getElementById('projectConditions').value.trim(),
                requirements: document.getElementById('projectRequirements').value.trim(),
                workplaceRequirements: document.getElementById('projectWorkplace').value.trim()
            };

            const success = await saveProjectToServer(updatedProject);
            if (success) {
                // Обновляем локальный объект
                Object.assign(project, updatedProject);
                renderProjects(); // обновим отображение (имя могло измениться)
                closeDetailsModal();
                showNotification('Детали проекта сохранены', 'success');
            }
        }

        async function deleteProject(id) {
            if (!confirm('Удалить проект? Это действие нельзя отменить.')) return;
            const success = await deleteProjectFromServer(id);
            if (success) {
                projects = projects.filter(p => p.id !== id);
                renderProjects();
                showNotification('Проект удалён', 'success');
            }
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
