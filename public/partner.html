
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Партнер - график работ (классический контраст)</title>
    <style>
        /* ========== КЛАССИЧЕСКИЙ КОНТРАСТ (ЧЁРНЫЙ, ЖЁЛТЫЙ, БЕЛЫЙ) ========== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            margin: 0;
            padding: 20px 20px 20px 60px; /* отступ для бокового меню */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        body.partner-view {
            align-items: flex-start;
        }

        body.menu-open::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            pointer-events: none;
        }

        .login-container {
            background: #111111;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2);
        }

        .login-container h2 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #ffd700;
            background: #222222;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        /* ===== БОКОВОЕ МЕНЮ (как в админке) ===== */
        .side-menu-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 100vh;
            background: transparent;
            z-index: 1001;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #111111;
            border-right: 2px solid #ffd700;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            transition: left 0.3s ease;
            z-index: 1002;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .side-menu-trigger:hover + .side-menu,
        .side-menu:hover {
            left: 0;
        }

        .side-menu .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: transparent;
            border: none;
            border-left: 4px solid transparent;
            color: #ffd700;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }

        .side-menu .menu-btn:hover {
            background: #1a1a1a;
            border-left-color: #ffd700;
        }

        .side-menu .menu-btn.logout {
            color: #ff6b6b;
        }

        .side-menu .menu-btn.logout:hover {
            background: #ff6b6b;
            color: #000000;
            border-left-color: #ff6b6b;
        }

        /* Основной интерфейс партнера */
        .partner-container {
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
            display: none;
        }

        .partner-header {
            background: #111111;
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #333333;
        }

        .partner-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .partner-badge {
            background: transparent;
            border: none;
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;       /* одинаковый вес с месяцем */
            font-size: 18px;
        }

        .month-badge {
            background: transparent;
            border: none;
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;       /* одинаковый вес с названием партнёра */
            font-size: 18px;
        }

        .sync-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Старые кнопки в шапке скрыты */
        .partner-action-buttons {
            display: none;
        }

        /* Вкладки проектов */
        .project-tabs {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .project-tab {
            padding: 12px 5px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333333;
            border-radius: 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s;
            color: #aaaaaa;
        }

        .project-tab:hover {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }

        .project-tab.active {
            color: #ffd700;
            border-bottom: 3px solid #ffd700;
            font-weight: 600;
        }

        /* График */
        .schedule-wrapper {
            background: #111111;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
            width: 100%;
            border: 1px solid #333333;
            max-height: calc(100vh - 250px);
            overflow: auto;
        }

        .schedule-wrapper::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        .schedule-wrapper::-webkit-scrollbar-track {
            background: #000000;
        }

        .schedule-wrapper::-webkit-scrollbar-thumb {
            background: #333333;
            border: 2px solid #000000;
            border-radius: 6px;
        }

        .schedule-wrapper::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }

        .headers-container {
            display: flex;
            background: #000000;
            border-bottom: 2px solid #333333;
            position: sticky;
            top: 0;
            z-index: 100;
            min-width: min-content;
        }

        .fixed-headers {
            display: flex;
            flex: 0 0 auto;
            background: #000000;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 101;
        }

        .fixed-header-cell {
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
        }

        .fixed-header-cell:first-child {
            width: 280px;
            text-align: left;
            padding-left: 20px;
            justify-content: flex-start;
        }

        .fixed-header-cell:nth-child(2) {
            width: 100px;
        }

        .fixed-header-cell:nth-child(3) {
            width: 120px;
        }

        .fixed-header-cell:nth-child(4) {
            width: 200px;
        }

        .fixed-header-cell:nth-child(5) {
            width: 50px;
        }

        .scrollable-headers {
            display: flex;
            flex: 1;
        }

        .scrollable-header-cell {
            flex: 0 0 100px;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffd700;
        }

        .day-week {
            font-size: 11px;
            color: #8f9bb3;
            font-weight: normal;
            margin-top: 2px;
        }

        .rows-container {
            min-width: min-content;
        }

        .data-row {
            display: flex;
            border-bottom: 1px solid #333333;
            min-height: 70px;
        }

        .data-row:hover {
            background: #1a1a1a;
        }

        .fixed-cells {
            display: flex;
            flex: 0 0 auto;
            background: #111111;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 90;
        }

        .fixed-cell {
            padding: 10px;
            border-right: 1px solid #333333;
            display: flex;
            align-items: center;
            color: #cccccc;
        }

        .fixed-cell:first-child {
            width: 280px;
            background: #111111;
            font-weight: 600;
            font-size: 13px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fixed-cell:first-child span {
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            color: #ffd700;
        }

        .fixed-cell:nth-child(2) {
            width: 100px;
        }

        .fixed-cell:nth-child(3) {
            width: 120px;
        }

        .fixed-cell:nth-child(4) {
            width: 200px;
        }

        .fixed-cell:nth-child(5) {
            width: 50px;
            justify-content: center;
        }

        .partner-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .partner-badge.partner {
            background: #ff6b6b;
            color: white;
        }

        .scrollable-cells {
            display: flex;
            flex: 1;
        }

        .scrollable-cell {
            flex: 0 0 100px;
            padding: 6px;
            border-right: 1px solid #333333;
            background: #111111;
            display: flex;
            align-items: center;
            position: relative;
        }

        .employee-field select, .employee-field input {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            font-size: 12px;
            color: #ffffff;
        }

        .phone-field input {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            font-size: 12px;
            color: #ffffff;
        }

        .time-cell {
            width: 100%;
            position: relative;
        }

        .time-cell input {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            color: #cccccc;
        }

        .time-cell input:focus {
            outline: none;
            border-color: #ffd700;
            background: #222222;
            color: #ffffff;
        }

        .time-cell input.filled {
            background: #000000;
            border-color: #ffd700;
            color: #ffd700;
        }

        .time-cell input.late {
            background: #3a3a1a;
            border-color: #ffd700;
            color: #ffd700;
        }

        .time-cell input.overtime {
            background: #1a2a1a;
            border-color: #6bff6b;
            color: #aaffaa;
        }

        .time-cell input.vacation {
            background: #1a1a2a;
            border-color: #6b6bff;
            color: #aaaaff;
        }

        .time-cell input.sick {
            background: #2a1a1a;
            border-color: #ff6b6b;
            color: #ffaaaa;
        }

        .time-cell input.absent {
            background: #2a1a1a;
            border-color: #ff6b6b;
            color: #ffaaaa;
            font-weight: bold;
        }

        .time-cell input.dayoff {
            background: #1a1a1a;
            border-color: #444444;
            color: #666666;
        }

        .comment-indicator {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .instruction {
            background: #111111;
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 20px;
            color: #cccccc;
            font-size: 14px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border: 1px solid #333333;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 6px;
        }

        .color-box.late { background: #3a3a1a; border: 2px solid #ffd700; }
        .color-box.overtime { background: #1a2a1a; border: 2px solid #6bff6b; }
        .color-box.vacation { background: #1a1a2a; border: 2px solid #6b6bff; }
        .color-box.sick { background: #2a1a1a; border: 2px solid #ff6b6b; }
        .color-box.absent { background: #2a1a1a; border: 2px solid #ff6b6b; }
        .color-box.dayoff { background: #1a1a1a; border: 2px solid #444444; }

        .hidden {
            display: none !important;
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: #8f9bb3;
            font-size: 16px;
        }

        /* Страница статистики */
        .stats-page {
            background: #111111;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333333;
        }

        .stats-header h2 {
            color: #ffd700;
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stats-header h2 span {
            background: #1a1a1a;
            color: #cccccc;
            font-size: 16px;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #ffd700;
        }

        .back-btn {
            padding: 12px 25px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #ffd700;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #ffd700;
            color: #000000;
            transform: translateX(-5px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #333333;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
            cursor: pointer;
        }

        .stat-card .label {
            color: #cccccc;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-card .value {
            color: #ffd700;
            font-size: 36px;
            font-weight: 600;
            line-height: 1.2;
        }

        .stat-card .unit {
            color: #8f9bb3;
            font-size: 16px;
            font-weight: normal;
            margin-left: 8px;
        }

        .stat-card.late .value { color: #ffd700; }
        .stat-card.overtime .value { color: #6bff6b; }
        .stat-card.absent .value { color: #ff6b6b; }
        .stat-card.sick .value { color: #6b6bff; }
        .stat-card.vacation .value { color: #6b6bff; }

        .stats-table-container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #333333;
            overflow-x: auto;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .stats-table th {
            background: #000000;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .stats-table th:hover {
            background: #1a1a1a;
            color: #ffffff;
        }

        .stats-table th.sorted-asc::after {
            content: " ▲";
            font-size: 12px;
            margin-left: 5px;
        }

        .stats-table th.sorted-desc::after {
            content: " ▼";
            font-size: 12px;
            margin-left: 5px;
        }

        .stats-table td {
            padding: 15px;
            text-align: center;
            color: #cccccc;
            border-bottom: 1px solid #333333;
            font-size: 14px;
        }

        .stats-table tr:hover td {
            background: #222222;
            color: #ffffff;
        }

        .stats-table td:first-child {
            color: #ffd700;
            font-weight: 600;
            text-align: left;
        }

        .stats-table .total-row {
            background: #000000;
        }

        .stats-table .total-row td {
            color: #ffd700;
            font-weight: 600;
            border-top: 2px solid #ffd700;
            border-bottom: none;
        }

        .stats-table .hours-value.late { color: #ffd700; }
        .stats-table .hours-value.overtime { color: #6bff6b; }
        .stats-table .hours-value.absent { color: #ff6b6b; }
        .stats-table .hours-value.sick { color: #6b6bff; }
        .stats-table .hours-value.vacation { color: #6b6bff; }

        .stats-empty {
            text-align: center;
            padding: 60px;
            color: #8f9bb3;
            font-size: 16px;
        }

        .stats-empty .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .export-btn {
            padding: 12px 25px;
            background: #1a1a1a;
            border: 1px solid #00ff88;
            border-radius: 12px;
            color: #00ff88;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .export-btn:hover {
            background: #00ff88;
            color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .stats-actions {
            display: flex;
            gap: 10px;
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            width: 500px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            z-index: 10000;
            display: none;
            border: 2px solid #ffd700;
            overflow: hidden;
        }

        .context-menu.show {
            display: block;
            animation: menuAppear 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes menuAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -45%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .menu-header {
            padding: 20px 25px;
            border-bottom: 2px solid #ffd700;
            font-weight: 600;
            color: #ffd700;
            font-size: 18px;
            background: #000000;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .menu-header .menu-close {
            margin-left: auto;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
            transition: opacity 0.2s;
            color: #ffd700;
            background: none;
            border: none;
            padding: 5px;
        }

        .menu-header .menu-close:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .menu-content {
            padding: 25px;
            max-height: 500px;
            overflow-y: auto;
            background: #111111;
        }

        .menu-item {
            margin-bottom: 25px;
        }

        .menu-item:last-child {
            margin-bottom: 0;
        }

        .menu-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffd700;
            font-weight: 500;
        }

        .menu-item input, .menu-item select {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            color: #ffffff;
        }

        .menu-item input:focus, .menu-item select:focus {
            outline: none;
            border-color: #ffd700;

            <div id="summaryTableContainer"></div>

    <script>
        // Ключи для localStorage (те же, что и в основной странице)
        const STORAGE_KEYS = {
            PROJECTS: 'v10_projects_list',
            MONTHS_BY_PROJECT: 'v10_months_by_project',
            EMPLOYEES: 'v10_employees_by_month',
            EMPLOYEE_DATA: 'v10_employee_data',
            ENTRIES: 'v10_time_entries',
            PARTNERS: 'v10_partners',
            COMMENTS: 'v10_comments',
            SHOW_EXTRA_COLUMNS: 'v10_show_extra_columns',
            SCHEDULE_SORT_COLUMN: 'v10_schedule_sort_column',
            SCHEDULE_SORT_DIR: 'v10_schedule_sort_dir'
        };

        // ===== NETLIFY BLOBS ИНТЕГРАЦИЯ =====

        function showSync() {
            const indicator = document.getElementById('syncIndicator');
            if (indicator) {
                indicator.style.background = '#4caf50';
                indicator.style.boxShadow = '0 0 5px #4caf50';
            }
        }

        function showSyncError() {
            const indicator = document.getElementById('syncIndicator');
            if (indicator) {
                indicator.style.background = '#ff6b6b';
                indicator.style.boxShadow = '0 0 5px #ff6b6b';
            }
        }

        // Уведомления
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        async function loadFromSheets() {
            try {
                const response = await fetch('/.netlify/functions/getData');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (result.success && result.data) {
                    localStorage.setItem(STORAGE_KEYS.PROJECTS, JSON.stringify(result.data.projects || []));
                    localStorage.setItem(STORAGE_KEYS.MONTHS_BY_PROJECT, JSON.stringify(result.data.monthsByProject || {}));
                    localStorage.setItem(STORAGE_KEYS.EMPLOYEES, JSON.stringify(result.data.employees || {}));
                    localStorage.setItem(STORAGE_KEYS.EMPLOYEE_DATA, JSON.stringify(result.data.employeeData || {}));
                    localStorage.setItem(STORAGE_KEYS.ENTRIES, JSON.stringify(result.data.entries || {}));
                    localStorage.setItem(STORAGE_KEYS.PARTNERS, JSON.stringify(result.data.partners || []));
                    localStorage.setItem(STORAGE_KEYS.COMMENTS, JSON.stringify(result.data.comments || {}));
                    showSync();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Ошибка загрузки из Blobs:', error);
                showSyncError();
                showNotification('Ошибка загрузки данных: ' + error.message, 'error');
                return false;
            }
        }

        async function saveToSheets() {
            try {
                const data = {
                    projects: JSON.parse(localStorage.getItem(STORAGE_KEYS.PROJECTS) || '[]'),
                    monthsByProject: JSON.parse(localStorage.getItem(STORAGE_KEYS.MONTHS_BY_PROJECT) || '{}'),
                    employees: JSON.parse(localStorage.getItem(STORAGE_KEYS.EMPLOYEES) || '{}'),
                    employeeData: JSON.parse(localStorage.getItem(STORAGE_KEYS.EMPLOYEE_DATA) || '{}'),
                    entries: JSON.parse(localStorage.getItem(STORAGE_KEYS.ENTRIES) || '{}'),
                    partners: JSON.parse(localStorage.getItem(STORAGE_KEYS.PARTNERS) || '[]'),
                    comments: JSON.parse(localStorage.getItem(STORAGE_KEYS.COMMENTS) || '{}')
                };

                const response = await fetch('/.netlify/functions/saveData', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (result.success) {
                    showSync();
                } else {
                    console.error('Ошибка сохранения:', result.error);
                    showSyncError();
                    showNotification('Ошибка сохранения: ' + result.error, 'error');
                }
                return result.success;
            } catch (error) {
                console.error('Ошибка сохранения в Blobs:', error);
                showSyncError();
                showNotification('Ошибка сохранения: ' + error.message, 'error');
                return false;
            }
        }

        // Данные партнера после входа
        let currentPartner = null;
        let partnerProjects = [];

        // Текущий выбранный проект и месяц
        let currentProject = null;
        let currentMonth = null;

        // Текущая страница
        let currentPage = 'schedule';

        // Переменные для сортировки статистики
        let currentSortColumn = 0;
        let currentSortDirection = 'asc';

        // Для комментариев
        let currentCommentContext = null;

        // Для сводной таблицы
        let currentSummaryType = null;

        // Переменные для скрытия полей
        let showExtraColumns = true;
        try {
            const saved = localStorage.getItem(STORAGE_KEYS.SHOW_EXTRA_COLUMNS);
            if (saved !== null) showExtraColumns = saved === 'true';
        } catch (e) {}

        // Переменные для сортировки в графике
        let scheduleSortColumn = 'name';
        let scheduleSortDirection = 'asc';
        try {
            const col = localStorage.getItem(STORAGE_KEYS.SCHEDULE_SORT_COLUMN);
            if (col) scheduleSortColumn = col;
            const dir = localStorage.getItem(STORAGE_KEYS.SCHEDULE_SORT_DIR);
            if (dir) scheduleSortDirection = dir;
        } catch (e) {}

        // Дни недели
        const weekDays = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];

        // Вспомогательные функции для времени (старая логика)
        function parseTime(timeStr) {
            if (!timeStr) return null;
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        function getDurationHours(timeStr) {
            if (!timeStr) return 0;
            const [start, end] = timeStr.split('-').map(t => t.trim());
            if (!start || !end) return 0;
            const startMinutes = parseTime(start);
            const endMinutes = parseTime(end);
            if (startMinutes === null || endMinutes === null) return 0;
            let duration = endMinutes - startMinutes;
            if (duration < 0) duration += 24 * 60;
            return duration / 60;
        }

        function compareTime(timeStr1, timeStr2) {
            if (!timeStr1 || !timeStr2) return 0;
            const dur1 = getDurationHours(timeStr1);
            const dur2 = getDurationHours(timeStr2);
            if (dur1 < dur2) return -1;
            if (dur1 > dur2) return 1;
            return 0;
        }

        // Определение статуса ячейки (старая логика, но с желтым для late)
        function getCellStatus(value, baseTime) {
            if (!value) return '';
            const lowerValue = value.toLowerCase().trim();
            if (lowerValue === 'вых') return 'dayoff';
            if (lowerValue === 'прг') return 'absent';
            if (lowerValue === 'б') return 'sick';
            if (lowerValue === 'отп') return 'vacation';
            if (!baseTime) return '';
            if (!validateTimeRange(value) || !validateTimeRange(baseTime)) return '';
            const comparison = compareTime(value, baseTime);
            if (comparison < 0) return 'late';   // желтый
            if (comparison > 0) return 'overtime';
            return '';
        }

        // Загрузка данных из localStorage
        function loadData() {
            try {
                return {
                    projects: JSON.parse(localStorage.getItem(STORAGE_KEYS.PROJECTS)) || [],
                    monthsByProject: JSON.parse(localStorage.getItem(STORAGE_KEYS.MONTHS_BY_PROJECT)) || {},
                    employees: JSON.parse(localStorage.getItem(STORAGE_KEYS.EMPLOYEES)) || {},
                    employeeData: JSON.parse(localStorage.getItem(STORAGE_KEYS.EMPLOYEE_DATA)) || {},
                    entries: JSON.parse(localStorage.getItem(STORAGE_KEYS.ENTRIES)) || {},
                    partners: JSON.parse(localStorage.getItem(STORAGE_KEYS.PARTNERS)) || [],
                    comments: JSON.parse(localStorage.getItem(STORAGE_KEYS.COMMENTS)) || {}
                };
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                return {
                    projects: [],
                    monthsByProject: {},
                    employees: {},
                    employeeData: {},
                    entries: {},
                    partners: [],
                    comments: {}
                };
            }
        }

        // Сохранение комментариев
        function saveComments(comments) {
            localStorage.setItem(STORAGE_KEYS.COMMENTS, JSON.stringify(comments));
        }

        // Ключ для комментария
        function getCommentKey(project, month, day, employee, type) {
            return `${project}_${month}_${day}_${employee}_${type}`;
        }

        // Сохранение состояния сессии
        function saveSession() {
            if (currentPartner) {
                sessionStorage.setItem('partner_session', JSON.stringify({
                    name: currentPartner.name,
                    projects: currentPartner.projects
                }));
            }
        }

        // Загрузка сессии
        function loadSession() {
            try {
                const session = sessionStorage.getItem('partner_session');
                if (session) {
                    const data = JSON.parse(session);
                    const allData = loadData();
                    const partner = allData.partners.find(p => p.name === data.name);
                    if (partner) {
                        currentPartner = partner;
                        partnerProjects = partner.projects || [];
                        return true;
                    }
                }
            } catch (e) {
                console.error('Ошибка загрузки сессии:', e);
            }
            return false;
        }

        // Очистка сессии
        function clearSession() {
            sessionStorage.removeItem('partner_session');
            currentPartner = null;
            partnerProjects = [];
        }

        // Вход партнера
        function partnerLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                showLoginError('Введите логин и пароль');
                return;
            }

            const data = loadData();
            const partner = data.partners.find(p => p.name === username);

            if (partner && partner.password === password) {
                currentPartner = partner;
                partnerProjects = partner.projects || [];

                if (partnerProjects.length === 0) {
                    showLoginError('У вас нет подключенных проектов');
                    return;
                }

                currentProject = partnerProjects[0];

                if (data.monthsByProject[currentProject]?.length > 0) {
                    const months = [...data.monthsByProject[currentProject]].sort();
                    currentMonth = months[months.length - 1];
                }

                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('partnerContainer').style.display = 'block';
                document.body.classList.add('partner-view');

                saveSession();

                refreshUI();
            } else {
                showLoginError('Неверный логин или пароль');
            }
        }

        function showLoginError(message) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Выход
        function logout() {
            clearSession();
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('partnerContainer').style.display = 'none';
            document.body.classList.remove('partner-view');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        // Управление меню
        function toggleMenu(menuId) {
            const menu = document.getElementById(menuId);

            document.querySelectorAll('.context-menu').forEach(m => {
                if (m.id !== menuId) {
                    m.classList.remove('show');
                }
            });

            if (menu.classList.contains('show')) {
                menu.classList.remove('show');
                document.body.classList.remove('menu-open');
            } else {
                menu.classList.add('show');
                document.body.classList.add('menu-open');
                updateMenuSelects();
            }
        }

        function closeMenu(menuId) {
            const menu = document.getElementById(menuId);
            menu.classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        function closeAllMenus() {
            document.querySelectorAll('.context-menu').forEach(menu => {
                menu.classList.remove('show');
            });
            document.body.classList.remove('menu-open');
        }

        // Форматирование месяца
        function formatMonth(monthStr) {
            if (!monthStr) return '';
            const [year, month] = monthStr.split('-');
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                           'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            return `${months[parseInt(month) - 1]} ${year}`;
        }

        function formatDate(monthStr, day) {
            if (!monthStr) return String(day);
            const [year, month] = monthStr.split('-');
            return `${day}.${month}.${year}`;
        }

        function getDayOfWeek(monthStr, day) {
            if (!monthStr) return '';
            const [year, month] = monthStr.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            return weekDays[date.getDay()];
        }

        function formatDateHeader(monthStr, day) {
            if (!monthStr) return String(day);
            const [year, month] = monthStr.split('-');
            const dayOfWeek = getDayOfWeek(monthStr, day);
            return `${dayOfWeek}/${String(day).padStart(2, '0')}.${month}`;
        }

        function getDaysInMonth(monthStr) {
            if (!monthStr) return 30;
            const [year, month] = monthStr.split('-').map(Number);
            return new Date(year, month, 0).getDate();
        }

        function validateTimeRange(timeRangeStr) {
            if (!timeRangeStr) return true;
            const regex = /^([0-1][0-9]|2[0-3]):[0-5][0-9]-([0-1][0-9]|2[0-3]):[0-5][0-9]$/;
            return regex.test(timeRangeStr);
        }

        function updateEmployeeData(project, month, employeeName, field, value) {
            const data = loadData();
            const dataKey = `${project}_${month}_${employeeName}`;

            if (!data.employeeData[dataKey]) {
                data.employeeData[dataKey] = { shiftType: '', time: '', phone: '', partner: currentPartner.name };
            }

            if (field === 'time' && value && !validateTimeRange(value)) {
                alert('Ошибка: время должно быть в формате ЧЧ:ММ-ЧЧ:ММ (например, 09:00-18:00)');
                return false;
            }

            data.employeeData[dataKey][field] = value;

            if (field === 'time' && value && validateTimeRange(value)) {
                const daysInMonth = getDaysInMonth(month);
                const employeeKey = `${project}_${month}`;

                for (let day = 1; day <= daysInMonth; day++) {
                    const entryKey = `${employeeKey}_${day}_${employeeName}`;
                    if (!data.entries[entryKey]) {
                        data.entries[entryKey] = value;
                    }
                }
            }

            localStorage.setItem(STORAGE_KEYS.EMPLOYEE_DATA, JSON.stringify(data.employeeData));
            localStorage.setItem(STORAGE_KEYS.ENTRIES, JSON.stringify(data.entries));

            saveToSheets();

            if (project === currentProject && month === currentMonth) {
                refreshUI();
            }

            return true;
        }

        function updateTimeEntry(project, month, day, operator, value) {
            const data = loadData();
            const employeeKey = `${project}_${month}`;
            const entryKey = `${employeeKey}_${day}_${operator}`;

            if (value.trim() === '') {
                delete data.entries[entryKey];
                localStorage.setItem(STORAGE_KEYS.ENTRIES, JSON.stringify(data.entries));
                saveToSheets();
                refreshUI();
                return;
            }

            data.entries[entryKey] = value;
            localStorage.setItem(STORAGE_KEYS.ENTRIES, JSON.stringify(data.entries));
            saveToSheets();

            const dataKey = `${project}_${month}_${operator}`;
            const employeeData = data.employeeData[dataKey] || { time: '' };

            const lowerValue = value.toLowerCase().trim();
            const status = getCellStatus(value, employeeData.time);

            let commentType = null;

            if (lowerValue === 'прг') {
                commentType = 'absent';
            } else if (status === 'late') {
                commentType = 'late';
            } else if (status === 'overtime') {
                commentType = 'overtime';
            }

            if (commentType) {
                forceCommentModal(project, month, day, operator, commentType);
            } else {
                refreshUI();
            }

        function collectSummaryData(type) {
            const data = loadData();
            const key = `${currentProject}_${currentMonth}`;
            const employees = getPartnerEmployees(currentProject, currentMonth, data);
            const daysInMonth = getDaysInMonth(currentMonth);

            let result = [];

            employees.forEach(employee => {
                const dataKey = `${key}_${employee}`;
                const employeeData = data.employeeData[dataKey] || { time: '', partner: currentPartner.name };

                for (let day = 1; day <= daysInMonth; day++) {
                    const entryKey = `${key}_${day}_${employee}`;
                    const value = data.entries[entryKey] || '';

                    if (value) {
                        const lowerValue = value.toLowerCase().trim();

                        if (type === 'absent' && lowerValue === 'прг') {
                            const commentKey = getCommentKey(currentProject, currentMonth, day, employee, 'absent');
                            const comment = data.comments[commentKey] || { text: '' };
                            const absentHours = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            result.push({
                                employee: employee,
                                partner: employeeData.partner || 'Внутренний',
                                date: formatDate(currentMonth, day),
                                hours: absentHours.toFixed(1),
                                comment: comment.text || ''
                            });
                        } 
                        else if (type !== 'absent' && validateTimeRange(value) && validateTimeRange(employeeData.time)) {
                            const status = getCellStatus(value, employeeData.time);
                            if ((type === 'late' && status === 'late') || (type === 'overtime' && status === 'overtime')) {
                                const hours = getDurationHours(value);
                                const baseHours = getDurationHours(employeeData.time);
                                const diff = type === 'late' ? baseHours - hours : hours - baseHours;
                                const commentKey = getCommentKey(currentProject, currentMonth, day, employee, type);
                                const comment = data.comments[commentKey] || { text: '' };
                                result.push({
                                    employee: employee,
                                    partner: employeeData.partner || 'Внутренний',
                                    date: formatDate(currentMonth, day),
                                    hours: diff.toFixed(1),
                                    comment: comment.text || ''
                                });
                            }
                        }
                    }
                }
            });

            result.sort((a, b) => a.date.localeCompare(b.date));
            return result;
        }

            const month = document.getElementById('scheduleMonthInput').value;

            if (!project || !month) return;

            const data = loadData();

            if (!data.monthsByProject[project]) {

        function deleteMonth(project, month) {
            if (confirm(`Удалить месяц ${formatMonth(month)} из проекта ${project}?`)) {
                const data = loadData();
                const index = data.monthsByProject[project].indexOf(month);
                if (index !== -1) {
                    data.monthsByProject[project].splice(index, 1);

                    const key = `${project}_${month}`;
                    delete data.employees[key];

                    Object.keys(data.employeeData).forEach(dataKey => {
                        if (dataKey.startsWith(key)) {
                            delete data.employeeData[dataKey];
                        }
                    });

                    Object.keys(data.entries).forEach(entryKey => {
                        if (entryKey.startsWith(key + '_')) {
                            delete data.entries[entryKey];
                        }
                    });

                    Object.keys(data.comments).forEach(commentKey => {
                        if (commentKey.startsWith(key)) {
                            delete data.comments[commentKey];
                        }

                    localStorage.setItem(STORAGE_KEYS.MONTHS_BY_PROJECT, JSON.stringify(data.monthsByProject));
                    localStorage.setItem(STORAGE_KEYS.EMPLOYEES, JSON.stringify(data.employees));
                    localStorage.setItem(STORAGE_KEYS.EMPLOYEE_DATA, JSON.stringify(data.employeeData));
                    localStorage.setItem(STORAGE_KEYS.ENTRIES, JSON.stringify(data.entries));
                    localStorage.setItem(STORAGE_KEYS.COMMENTS, JSON.stringify(data.comments));

                    saveToSheets();

                    if (currentProject === project && currentMonth === month) {

                            currentMonth = months[months.length - 1];

        // Функция для сортировки в графике
        function sortSchedule(column) {
            if (scheduleSortColumn === column) {
                scheduleSortDirection = scheduleSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                scheduleSortColumn = column;
                scheduleSortDirection = 'asc';
            }
            localStorage.setItem(STORAGE_KEYS.SCHEDULE_SORT_COLUMN, scheduleSortColumn);
            localStorage.setItem(STORAGE_KEYS.SCHEDULE_SORT_DIR, scheduleSortDirection);
            renderSchedulePage();

            localStorage.setItem(STORAGE_KEYS.SHOW_EXTRA_COLUMNS, showExtraColumns);
            const btn = document.getElementById('toggleColumnsBtn');
            if (btn) {

        function renderSchedulePage() {
            const wrapper = document.getElementById('mainContent');
            const data = loadData();

            if (!currentProject || !currentMonth) {
                wrapper.innerHTML = '<div class="schedule-wrapper"><div class="no-data">Выберите проект и месяц</div></div>';
                return;
            }

            let employees = getPartnerEmployees(currentProject, currentMonth, data);

            if (employees.length === 0) {
                wrapper.innerHTML = '<div class="schedule-wrapper"><div class="no-data">Нет операторов для отображения</div></div>';
                return;
            }

            // Сортировка
            const sortedEmployees = [...employees];
            if (scheduleSortColumn === 'name') {
                sortedEmployees.sort((a, b) => {
                    return scheduleSortDirection === 'asc' ? a.localeCompare(b) : b.localeCompare(a);
                });
            } else if (scheduleSortColumn === 'shift' || scheduleSortColumn === 'time' || scheduleSortColumn === 'phone') {
                sortedEmployees.sort((a, b) => {
                    const keyA = `${currentProject}_${currentMonth}_${a}`;
                    const keyB = `${currentProject}_${currentMonth}_${b}`;
                    const empA = data.employeeData[keyA] || {};
                    const empB = data.employeeData[keyB] || {};
                    let valA = '', valB = '';
                    if (scheduleSortColumn === 'shift') {
                        valA = empA.shiftType || '';
                        valB = empB.shiftType || '';
                    } else if (scheduleSortColumn === 'time') {
                        valA = empA.time || '';
                        valB = empB.time || '';
                    } else if (scheduleSortColumn === 'phone') {
                        valA = empA.phone || '';
                        valB = empB.phone || '';
                    }
                    return scheduleSortDirection === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                });
            }

            const daysInMonth = getDaysInMonth(currentMonth);
            const key = `${currentProject}_${currentMonth}`;

            let html = '<div class="schedule-wrapper">';

            // Заголовки с сортировкой
            html += '<div class="headers-container">';
            html += '<div class="fixed-headers" id="fixedHeaders">';
            html += `<div class="fixed-header-cell" onclick="sortSchedule('name')" style="cursor:pointer;">Оператор ${scheduleSortColumn === 'name' ? (scheduleSortDirection === 'asc' ? '▲' : '▼') : ''}</div>`;
            html += `<div class="fixed-header-cell ${!showExtraColumns ? 'hidden' : ''}" onclick="sortSchedule('shift')" style="cursor:pointer;">Смена ${scheduleSortColumn === 'shift' ? (scheduleSortDirection === 'asc' ? '▲' : '▼') : ''}</div>`;
            html += `<div class="fixed-header-cell ${!showExtraColumns ? 'hidden' : ''}" onclick="sortSchedule('time')" style="cursor:pointer;">Время ${scheduleSortColumn === 'time' ? (scheduleSortDirection === 'asc' ? '▲' : '▼') : ''}</div>`;
            html += `<div class="fixed-header-cell ${!showExtraColumns ? 'hidden' : ''}" onclick="sortSchedule('phone')" style="cursor:pointer;">Телефон ${scheduleSortColumn === 'phone' ? (scheduleSortDirection === 'asc' ? '▲' : '▼') : ''}</div>`;
            html += `<div class="fixed-header-cell ${!showExtraColumns ? 'hidden' : ''}">Тип</div>`;
            html += '</div>';

            html += '<div class="scrollable-headers">';
            for (let day = 1; day <= daysInMonth; day++) {
                const dateHeader = formatDateHeader(currentMonth, day);
                const [dayWeek, dateStr] = dateHeader.split('/');
                html += `<div class="scrollable-header-cell">
                    ${dateStr}
                    <span class="day-week">${dayWeek}</span>
                </div>`;
            }
            html += '</div>';
            html += '</div>';

            // Строки
            html += '<div class="rows-container">';

            sortedEmployees.forEach(operator => {
                const dataKey = `${key}_${operator}`;
                const employeeData = data.employeeData[dataKey] || { shiftType: '', time: '', phone: '' };

                html += '<div class="data-row">';
                html += '<div class="fixed-cells" id="fixedCells">';

                html += `<div class="fixed-cell" title="${operator}"><span>${operator}</span></div>`;

                html += `<div class="fixed-cell employee-field ${!showExtraColumns ? 'hidden' : ''}">`;
                html += `<select onchange="updateEmployeeData('${currentProject}', '${currentMonth}', '${operator}', 'shiftType', this.value)">`;
                html += `<option value="" ${employeeData.shiftType === '' ? 'selected' : ''}>—</option>`;
                html += `<option value="2/2" ${employeeData.shiftType === '2/2' ? 'selected' : ''}>2/2</option>`;
                html += `<option value="5/2" ${employeeData.shiftType === '5/2' ? 'selected' : ''}>5/2</option>`;
                html += '</select>';
                html += '</div>';

                html += `<div class="fixed-cell employee-field ${!showExtraColumns ? 'hidden' : ''}">`;
                const timeValid = validateTimeRange(employeeData.time);
                html += `<input type="text" value="${employeeData.time || ''}" placeholder="09:00-18:00" class="${employeeData.time && !timeValid ? 'error' : ''}" onchange="updateEmployeeData('${currentProject}', '${currentMonth}', '${operator}', 'time', this.value)">`;
                if (employeeData.time && !timeValid) {
                    html += '<div class="error-message">Формат: ЧЧ:ММ-ЧЧ:ММ</div>';
                }
                html += '</div>';

                html += `<div class="fixed-cell phone-field ${!showExtraColumns ? 'hidden' : ''}">`;
                html += `<input type="text" value="${employeeData.phone || ''}" placeholder="+7 (999) 999-99-99" onchange="updateEmployeeData('${currentProject}', '${currentMonth}', '${operator}', 'phone', this.value)">`;
                html += '</div>';

                html += `<div class="fixed-cell ${!showExtraColumns ? 'hidden' : ''}">`;
                html += '<span class="partner-badge partner">П</span>';
                html += '</div>';

                html += '</div>'; // fixed-cells

                html += '<div class="scrollable-cells">';
                for (let day = 1; day <= daysInMonth; day++) {
                    const entryKey = `${key}_${day}_${operator}`;
                    const value = data.entries[entryKey] || '';

                    const status = getCellStatus(value, employeeData.time);

                    let hasComment = false;
                    let commentType = '';

                    if (status === 'late') {
                        const commentKey = getCommentKey(currentProject, currentMonth, day, operator, 'late');
                        hasComment = !!data.comments[commentKey];
                        commentType = 'late';
                    } else if (status === 'overtime') {
                        const commentKey = getCommentKey(currentProject, currentMonth, day, operator, 'overtime');
                        hasComment = !!data.comments[commentKey];
                        commentType = 'overtime';
                    } else if (value.toLowerCase().trim() === 'прг') {
                        const commentKey = getCommentKey(currentProject, currentMonth, day, operator, 'absent');
                        hasComment = !!data.comments[commentKey];
                        commentType = 'absent';
                    }

                    html += `<div class="scrollable-cell">
                        <div class="time-cell" style="position: relative;">
                            <input type="text" value="${value}" placeholder="чч:мм-чч:мм" class="${value ? 'filled' : ''} ${status}" onchange="updateTimeEntry('${currentProject}', '${currentMonth}', ${day}, '${operator}', this.value)" oninput="this.classList.toggle('filled', this.value.length > 0)">`;

                    if (hasComment) {
                        html += `<div class="comment-indicator" onclick="openCommentModal('${currentProject}', '${currentMonth}', ${day}, '${operator}', '${commentType}')" title="Есть комментарий"></div>`;
                    }

                    html += `   </div>
                    </div>`;
                }
                html += '</div>'; // scrollable-cells
                html += '</div>'; // data-row
            });

            html += '</div>'; // rows-container
            html += '</div>'; // schedule-wrapper
            wrapper.innerHTML = html;

            // После рендера корректируем ширину фиксированных контейнеров
            const fixedCells = document.getElementById('fixedCells');
            const fixedHeaders = document.getElementById('fixedHeaders');
            if (fixedCells && fixedHeaders) {
                if (showExtraColumns) {
                    fixedCells.style.width = '750px';
                    fixedHeaders.style.width = '750px';
                } else {
                    fixedCells.style.width = '280px';
                    fixedHeaders.style.width = '280px';
                }
            }
        }

        function renderStatsPage() {
            const wrapper = document.getElementById('mainContent');
            const data = loadData();

            if (!currentProject || !currentMonth) {
                wrapper.innerHTML = '<div class="stats-page"><div class="stats-empty">Выберите проект и месяц</div></div>';
                return;
            }

            const employees = getPartnerEmployees(currentProject, currentMonth, data);

            if (employees.length === 0) {
                wrapper.innerHTML = '<div class="stats-page"><div class="stats-empty"><div class="icon">📊</div>Нет данных для отображения статистики</div></div>';
                return;
            }

            const key = `${currentProject}_${currentMonth}`;

            let totalHoursAll = 0;
            let totalLateHours = 0;
            let totalOvertimeHours = 0;
            let totalAbsentHours = 0;
            let totalSickHours = 0;
            let totalVacationHours = 0;

            let statsData = [];

            employees.forEach(employee => {
                const dataKey = `${key}_${employee}`;
                const employeeData = data.employeeData[dataKey] || { time: '' };
                const daysInMonth = getDaysInMonth(currentMonth);

                let totalHours = 0;
                let lateHours = 0;
                let overtimeHours = 0;
                let absentHours = 0;
                let sickHours = 0;
                let vacationHours = 0;

                for (let day = 1; day <= daysInMonth; day++) {
                    const entryKey = `${key}_${day}_${employee}`;
                    const value = data.entries[entryKey] || '';

                    if (value) {
                        const lowerValue = value.toLowerCase().trim();
                        const status = getCellStatus(value, employeeData.time);

                        if (lowerValue === 'прг') {
                            const absent = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            absentHours += absent;
                        } else if (lowerValue === 'б') {
                            const sick = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            sickHours += sick;
                        } else if (lowerValue === 'отп') {
                            const vacation = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            vacationHours += vacation;
                        } else if (lowerValue === 'вых') {
                            // не считаем
                        } else if (validateTimeRange(value)) {
                            const hours = getDurationHours(value);
                            totalHours += hours;

                            if (status === 'late') {
                                const diff = getDurationHours(employeeData.time) - hours;
                                lateHours += diff > 0 ? diff : 0;
                            } else if (status === 'overtime') {
                                const diff = hours - getDurationHours(employeeData.time);
                                overtimeHours += diff > 0 ? diff : 0;
                            }
                        }
                    }
                }

                statsData.push({
                    name: employee,
                    total: totalHours,
                    late: lateHours,
                    overtime: overtimeHours,
                    absent: absentHours,
                    sick: sickHours,
                    vacation: vacationHours
                });

                totalHoursAll += totalHours;
                totalLateHours += lateHours;
                totalOvertimeHours += overtimeHours;
                totalAbsentHours += absentHours;
                totalSickHours += sickHours;
                totalVacationHours += vacationHours;
            });

            const sortedData = [...statsData];
            if (currentSortColumn > 0) {
                sortedData.sort((a, b) => {
                    let aVal, bVal;

                    switch(currentSortColumn) {
                        case 0: aVal = a.name; bVal = b.name; break;
                        case 1: aVal = a.total; bVal = b.total; break;
                        case 2: aVal = a.late; bVal = b.late; break;
                        case 3: aVal = a.overtime; bVal = b.overtime; break;
                        case 4: aVal = a.absent; bVal = b.absent; break;
                        case 5: aVal = a.sick; bVal = b.sick; break;
                        case 6: aVal = a.vacation; bVal = b.vacation; break;
                        default: return 0;
                    }

                    if (currentSortDirection === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
            }

            let tableHtml = '';

            sortedData.forEach(data => {
                tableHtml += `
                    <tr>
                        <td>${data.name}</td>
                        <td class="hours-value">${data.total.toFixed(1)} ч</td>
                        <td class="hours-value late">${data.late.toFixed(1)} ч</td>
                        <td class="hours-value overtime">${data.overtime.toFixed(1)} ч</td>
                        <td class="hours-value absent">${data.absent.toFixed(1)} ч</td>
                        <td class="hours-value sick">${data.sick.toFixed(1)} ч</td>
                        <td class="hours-value vacation">${data.vacation.toFixed(1)} ч</td>
                    </tr>
                `;
            });

            tableHtml += `
                <tr class="total-row">
                    <td>ИТОГО:</td>
                    <td>${totalHoursAll.toFixed(1)} ч</td>
                    <td class="hours-value late">${totalLateHours.toFixed(1)} ч</td>
                    <td class="hours-value overtime">${totalOvertimeHours.toFixed(1)} ч</td>
                    <td class="hours-value absent">${totalAbsentHours.toFixed(1)} ч</td>
                    <td class="hours-value sick">${totalSickHours.toFixed(1)} ч</td>
                    <td class="hours-value vacation">${totalVacationHours.toFixed(1)} ч</td>
                </tr>
            `;

            const statsHtml = `
                <div class="stats-page">
                    <div class="stats-header">
                        <h2>
                            📊 Статистика за ${formatMonth(currentMonth)}
                            <span>${currentProject}</span>
                        </h2>
                        <div class="stats-actions">
                            <button class="export-btn" onclick="exportToExcel()">📥 Excel</button>
                            <button class="back-btn" onclick="showSchedulePage()">← Вернуться к графику</button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">⏱ Всего отработано</div>
                            <div class="value">${totalHoursAll.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                        <div class="stat-card late" onclick="showSummaryTable('late')" style="cursor: pointer;" title="Показать сводную таблицу опозданий">
                            <div class="label">⏰ Опоздания</div>
                            <div class="value">${totalLateHours.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                        <div class="stat-card overtime" onclick="showSummaryTable('overtime')" style="cursor: pointer;" title="Показать сводную таблицу переработок">
                            <div class="label">⚡ Переработки</div>
                            <div class="value">${totalOvertimeHours.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                        <div class="stat-card absent" onclick="showSummaryTable('absent')" style="cursor: pointer;" title="Показать сводную таблицу прогулов">
                            <div class="label">❌ Прогулы</div>
                            <div class="value">${totalAbsentHours.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                        <div class="stat-card sick">
                            <div class="label">🤒 Больничные</div>
                            <div class="value">${totalSickHours.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                        <div class="stat-card vacation">
                            <div class="label">🏖 Отпуск</div>
                            <div class="value">${totalVacationHours.toFixed(1)}<span class="unit">часов</span></div>
                        </div>
                    </div>

                    <div class="stats-table-container">
                        <table class="stats-table">
                            <thead>
                                <tr>
                                    <th onclick="sortStats(0)" class="${currentSortColumn === 0 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Оператор</th>
                                    <th onclick="sortStats(1)" class="${currentSortColumn === 1 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Всего часов</th>
                                    <th onclick="sortStats(2)" class="${currentSortColumn === 2 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Опоздания</th>
                                    <th onclick="sortStats(3)" class="${currentSortColumn === 3 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Переработки</th>
                                    <th onclick="sortStats(4)" class="${currentSortColumn === 4 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Прогулы</th>
                                    <th onclick="sortStats(5)" class="${currentSortColumn === 5 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Больничные</th>
                                    <th onclick="sortStats(6)" class="${currentSortColumn === 6 ? (currentSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Отпуск</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            wrapper.innerHTML = statsHtml;
        }

        function sortStats(column) {
            if (currentSortColumn === column) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortColumn = column;
                currentSortDirection = 'asc';
            }
            renderStatsPage();
        }

        function exportToExcel() {
            const data = loadData();
            const key = `${currentProject}_${currentMonth}`;
            const employees = getPartnerEmployees(currentProject, currentMonth, data);

            if (employees.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            let excelData = [];

            excelData.push([
                'Оператор',
                'Всего часов',
                'Опоздания',
                'Переработки',
                'Прогулы',
                'Больничные',
                'Отпуск'
            ]);

            let totalHoursAll = 0;
            let totalLateHours = 0;
            let totalOvertimeHours = 0;
            let totalAbsentHours = 0;
            let totalSickHours = 0;
            let totalVacationHours = 0;

            employees.forEach(employee => {
                const dataKey = `${key}_${employee}`;
                const employeeData = data.employeeData[dataKey] || { time: '' };
                const daysInMonth = getDaysInMonth(currentMonth);

                let totalHours = 0;
                let lateHours = 0;
                let overtimeHours = 0;
                let absentHours = 0;
                let sickHours = 0;
                let vacationHours = 0;

                for (let day = 1; day <= daysInMonth; day++) {
                    const entryKey = `${key}_${day}_${employee}`;
                    const value = data.entries[entryKey] || '';

                    if (value) {
                        const lowerValue = value.toLowerCase().trim();
                        const status = getCellStatus(value, employeeData.time);

                        if (lowerValue === 'прг') {
                            const absent = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            absentHours += absent;
                        } else if (lowerValue === 'б') {
                            const sick = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            sickHours += sick;
                        } else if (lowerValue === 'отп') {
                            const vacation = employeeData.time ? getDurationHours(employeeData.time) : 8;
                            vacationHours += vacation;
                        } else if (lowerValue === 'вых') {
                            // не считаем
                        } else if (validateTimeRange(value)) {
                            const hours = getDurationHours(value);
                            totalHours += hours;

                            if (status === 'late') {
                                const diff = getDurationHours(employeeData.time) - hours;
                                lateHours += diff > 0 ? diff : 0;
                            } else if (status === 'overtime') {
                                const diff = hours - getDurationHours(employeeData.time);
                                overtimeHours += diff > 0 ? diff : 0;
                            }
                        }
                    }
                }

                totalHoursAll += totalHours;
                totalLateHours += lateHours;
                totalOvertimeHours += overtimeHours;
                totalAbsentHours += absentHours;
                totalSickHours += sickHours;
                totalVacationHours += vacationHours;

                excelData.push([
                    employee,
                    totalHours.toFixed(1),
                    lateHours.toFixed(1),
                    overtimeHours.toFixed(1),
                    absentHours.toFixed(1),
                    sickHours.toFixed(1),
                    vacationHours.toFixed(1)
                ]);
            });

            excelData.push([
                'ИТОГО:',
                totalHoursAll.toFixed(1),
                totalLateHours.toFixed(1),
                totalOvertimeHours.toFixed(1),
                totalAbsentHours.toFixed(1),
                totalSickHours.toFixed(1),
                totalVacationHours.toFixed(1)
            ]);

            const csvContent = excelData.map(row => row.join(';')).join('\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.href = url;
            link.setAttribute('download', `statistics_${currentPartner.name}_${currentProject}_${currentMonth}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function refreshUI() {
            document.getElementById('partnerName').textContent = currentPartner.name;
            document.getElementById('currentMonth').textContent = currentMonth ? formatMonth(currentMonth) : '-';

            updateProjectTabs();

            if (currentPage === 'stats') {
                renderStatsPage();
                document.getElementById('instruction').style.display = 'none';
            } else {
                renderSchedulePage();
                document.getElementById('instruction').style.display = 'flex';
            }

            updateMenuSelects();
        }

        document.addEventListener('change', function(e) {
            if (e.target.id === 'employeeProjectSelect' || e.target.id === 'employeeMonthSelect') {
                const project = document.getElementById('employeeProjectSelect').value;
                const month = document.getElementById('employeeMonthSelect').value;
                if (project && month) {
                    updateEmployeesList(project, month);
                }
            } else if (e.target.id === 'filterProjectSelect') {
                updateFilterMonths();
            } else if (e.target.id === 'scheduleProjectSelect') {
                const project = e.target.value;
                updateMonthsList(project);
            }
        });

        window.addEventListener('load', async function() {
            await loadFromSheets();
            if (loadSession()) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('partnerContainer').style.display = 'block';
                document.body.classList.add('partner-view');

                const data = loadData();

                if (partnerProjects.length > 0) {
                    currentProject = partnerProjects[0];

                    if (data.monthsByProject[currentProject]?.length > 0) {
                        const months = [...data.monthsByProject[currentProject]].sort();
                        currentMonth = months[months.length - 1];
                    }
                }

                refreshUI();
            }
        });
    </script>
</body>
