<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета кандидата</title>
    <style>
        /* Стили полностью сохранены из предыдущей версии (см. ваш файл) */
        /* ... (полный блок стилей как в вашем candidate.html) ... */
    </style>
</head>
<body>
    <div class="container">
        <h1>РОССЕТТИ · Анкета кандидата</h1>
        
        <!-- Информация о проекте (без изменений) -->
        <section>...</section>
        <hr>
        <!-- FAQ (без изменений) -->
        <section>...</section>
        <hr>
        <!-- Выпадающий список: чем отличаются способы проверки (без изменений) -->
        <div class="faq-item">...</div>

        <!-- Анкета кандидата (обязательные поля) -->
        <section>
            <h2>📋 Заполните анкету</h2>
            <p class="required-note">Поля, отмеченные <span style="color:#ff6b6b;">*</span>, обязательны для заполнения.</p>

            <form id="candidateForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>ФИО <span>*</span></label>
                        <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
                    </div>
                    <div class="form-group">
                        <label>Русский псевдоним <span>*</span></label>
                        <input type="text" id="nickname" placeholder="Например: Ирина" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Teлеграм (логин) <span>*</span></label>
                        <input type="text" id="telegram" placeholder="@username" required>
                    </div>
                    <div class="form-group">
                        <label>Номер телефона <span>*</span></label>
                        <input type="tel" id="phone" placeholder="+7 999 999-99-99" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Ваш eMail <span>*</span></label>
                    <input type="email" id="email" placeholder="example@mail.ru" required>
                </div>

                <!-- Скрытые поля для хранения ID и названия проекта -->
                <input type="hidden" id="projectId" value="">
                <input type="hidden" id="projectName" value="">

                <!-- Две кнопки -->
                <div class="button-group">
                    <button type="button" class="btn" onclick="startAutoVerification()">✅ Пройти проверку автоматически</button>
                    <button type="button" class="btn secondary" onclick="startManualVerification()">✍️ Пройти проверку вручную</button>
                </div>
            </form>

            <!-- Блок для автоматической проверки (без изменений) -->
            <div id="autoVerificationBlock" class="result-block">...</div>

            <!-- Блок для ручной проверки (без изменений) -->
            <div id="manualVerificationBlock" class="result-block">...</div>
        </section>
    </div>

    <!-- Уведомление о копировании -->
    <div id="notification" class="notification">Код скопирован!</div>

    <script>
        // --- Вспомогательная функция получения параметра из URL ---
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // --- Загрузка списка проектов с сервера ---
        let projects = [];
        async function loadProjects() {
            try {
                const res = await fetch('/.netlify/functions/getProjects');
                if (res.ok) {
                    projects = await res.json();
                    // После загрузки проектов пытаемся найти проект по ID из URL
                    const projectIdFromUrl = getQueryParam('projectId');
                    if (projectIdFromUrl) {
                        const matched = projects.find(p => p.id === projectIdFromUrl);
                        if (matched) {
                            document.getElementById('projectId').value = matched.id;
                            document.getElementById('projectName').value = matched.name;
                        } else {
                            console.error('Проект с таким ID не найден');
                            // Можно показать сообщение об ошибке
                        }
                    } else {
                        console.error('Отсутствует параметр projectId в URL');
                        // Здесь можно заблокировать отправку формы или показать ошибку
                    }
                } else {
                    console.error('Ошибка загрузки проектов');
                }
            } catch (error) {
                console.error('Ошибка сети при загрузке проектов', error);
            }
        }

        // Вызываем загрузку проектов сразу после загрузки страницы
        window.addEventListener('load', loadProjects);

        // --- Генерация уникального кода (без изменений) ---
        function generateUniqueCode() {
            const prefix = "ROSSETI-";
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let randomPart = '';
            for (let i = 0; i < 8; i++) {
                randomPart += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const timestamp = Date.now().toString(36).toUpperCase().slice(-4);
            return prefix + timestamp + '-' + randomPart;
        }

        // --- Валидация формы (без изменений) ---
        function validateForm() {
            const requiredFields = ['fullName', 'nickname', 'telegram', 'phone', 'email'];
            let isValid = true;
            for (let id of requiredFields) {
                const field = document.getElementById(id);
                if (!field.value.trim()) {
                    field.style.borderColor = '#ff6b6b';
                    isValid = false;
                } else {
                    field.style.borderColor = '#333';
                }
            }
            return isValid;
        }

        // --- Получение данных из формы (добавлены projectId и projectName) ---
        function getFormData() {
            return {
                fullName: document.getElementById('fullName').value.trim(),
                nickname: document.getElementById('nickname').value.trim(),
                telegram: document.getElementById('telegram').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                project: document.getElementById('projectName').value,   // название для отображения
                projectId: document.getElementById('projectId').value,   // уникальный ключ
                timestamp: new Date().toISOString()
            };
        }

        // --- Уведомление (без изменений) ---
        function showNotification(message, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type}`;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // --- Автоматическая проверка (без изменений, но используется обновлённая getFormData) ---
        async function startAutoVerification() {
            if (!validateForm()) {
                alert('Пожалуйста, заполните все обязательные поля.');
                return;
            }

            const formData = getFormData();
            // Проверяем, что projectId загружен
            if (!formData.projectId) {
                alert('Ошибка: не удалось определить проект. Обратитесь к администратору.');
                return;
            }

            const code = generateUniqueCode();
            document.getElementById('codeDisplay').textContent = code;

            try {
                const response = await fetch('/.netlify/functions/submitForm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, formData })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Ошибка сервера');
                showNotification('Данные отправлены!', 'success');
            } catch (error) {
                console.error(error);
                showNotification('Ошибка отправки. Свяжитесь с поддержкой.', 'error');
            }

            document.getElementById('autoVerificationBlock').classList.add('show');
            document.getElementById('manualVerificationBlock').classList.remove('show');
        }

        // --- Ручная проверка (без изменений) ---
        async function startManualVerification() {
            if (!validateForm()) {
                alert('Пожалуйста, заполните все обязательные поля.');
                return;
            }

            const formData = getFormData();
            if (!formData.projectId) {
                alert('Ошибка: не удалось определить проект. Обратитесь к администратору.');
                return;
            }

            try {
                const response = await fetch('/.netlify/functions/submitManualForm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ formData })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Ошибка сервера');
                showNotification('Анкета отправлена! Ожидайте решения.', 'success');
            } catch (error) {
                console.error(error);
                showNotification('Ошибка отправки. Попробуйте позже.', 'error');
            }

            document.getElementById('manualVerificationBlock').classList.add('show');
            document.getElementById('autoVerificationBlock').classList.remove('show');
        }

        // --- Копирование кода (без изменений) ---
        function copyCode() {
            const code = document.getElementById('codeDisplay').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showNotification('Код скопирован!', 'success');
            }).catch(() => alert('Не удалось скопировать код.'));
        }

        // --- FAQ аккордеон (без изменений) ---
        function toggleFaq(element) {
            const faqItem = element.closest('.faq-item');
            if (faqItem) faqItem.classList.toggle('active');
        }
    </script>
</body>
</html>
