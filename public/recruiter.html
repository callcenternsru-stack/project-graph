<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекрутер – вход и панель</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 20px 20px 60px;
        }

        .side-menu-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 100vh;
            background: transparent;
            z-index: 1001;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #111111;
            border-right: 2px solid #ffd700;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            transition: left 0.3s ease;
            z-index: 1002;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .side-menu-trigger:hover + .side-menu,
        .side-menu:hover {
            left: 0;
        }

        .side-menu .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: transparent;
            border: none;
            border-left: 4px solid transparent;
            color: #ffd700;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }

        .side-menu .menu-btn:hover {
            background: #1a1a1a;
            border-left-color: #ffd700;
        }

        .side-menu .menu-btn.logout {
            color: #ff6b6b;
        }

        .side-menu .menu-btn.logout:hover {
            background: #ff6b6b;
            color: #000000;
            border-left-color: #ff6b6b;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            margin: auto;
            background: #111111;
            border-radius: 24px;
            padding: 40px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255,215,0,0.2);
        }

        .login-container h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .recruiter-interface {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: none;
        }

        .header {
            background: #111111;
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .schedule-btn {
            padding: 10px 20px;
            background: #6b8cff;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .schedule-btn:hover {
            background: #8aa5ff;
            transform: translateY(-2px);
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ff8a8a;
            transform: translateY(-2px);
        }

        .content-wrapper {
            display: flex;
            gap: 20px;
        }

        .left-panel {
            flex: 2;
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
            max-height: none;
            overflow-y: visible;
        }

        .script-selector {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .script-selector:focus {
            outline: none;
            border-color: #ffd700;
        }

        .script-item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            border-left: 4px solid #ffd700;
        }

        .script-item .title {
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .script-item .content {
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            background: #111;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            word-wrap: break-word;
        }

        .right-panel {
            flex: 1;
            background: #111111;
            border-radius: 24px;
            padding: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
        }

        .right-panel h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #222222;
        }

        .datetime-row {
            display: flex;
            gap: 10px;
        }

        .datetime-row select,
        .datetime-row input {
            flex: 1;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 25px;
        }

        .save-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        /* ===== СТИЛИ ДЛЯ КНОПОК ИНТЕГРАЦИИ ===== */
        .telegram-btn {
            width: 100%;
            padding: 16px;
            background: #0088cc;
            color: white;
            border: 2px solid #0088cc;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .telegram-btn:hover {
            background: #0077b5;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,136,204,0.4);
        }

        .whatsapp-btn {
            width: 100%;
            padding: 16px;
            background: #25D366;
            color: white;
            border: 2px solid #25D366;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .whatsapp-btn:hover {
            background: #20b859;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
        }

        .google-connect-btn {
            width: 100%;
            padding: 12px;
            background: #4285f4;
            color: white;
            border: 2px solid #4285f4;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .google-connect-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #2a5ca0;
            border-color: #2a5ca0;
        }

        .google-connect-btn:hover:not(:disabled) {
            background: #5a95f5;
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #111111;
            border: 2px solid #ffd700;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            z-index: 20000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 300px;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            border-color: #4caf50;
        }

        .notification.error {
            border-color: #ff6b6b;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden {
            display: none !important;
        }

        .candidate-counter {
            color: #8f9bb3;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: right;
        }

        /* ===== СТИЛИ ДЛЯ ПАНЕЛЕЙ КАНДИДАТОВ ===== */
        .candidates-panel {
            background: #111111;
            border-radius: 24px;
            padding: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
            margin-top: 20px;
        }

        .candidates-panel h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .candidates-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .candidates-tab {
            padding: 10px 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            color: #cccccc;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .candidates-tab:hover {
            border-color: #ffd700;
            color: #ffd700;
        }

        .candidates-tab.active {
            background: #ffd700;
            color: #000000;
            border-color: #ffd700;
        }

        .candidates-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .candidate-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .candidate-card:hover {
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }

        .candidate-field {
            flex: 1 1 200px;
            min-width: 150px;
        }

        .candidate-field .label {
            color: #8f9bb3;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .candidate-field .value {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
        }

        .candidate-field .value.highlight {
            color: #ffd700;
        }

        .candidate-status-badge {
            display: inline-block;
            background: #2d2d2d;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #ffd700;
            border: 1px solid #444;
        }

        .candidate-status-badge.waiting {
            color: #8f9bb3;
        }

        .no-candidates {
            text-align: center;
            color: #8f9bb3;
            padding: 40px;
            font-size: 16px;
        }

        /* ===== СТИЛИ ДЛЯ МОДАЛЬНОГО ОКНА ВЫБОРА СООБЩЕНИЯ ===== */
        .message-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border-radius: 24px;
            padding: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3);
            z-index: 10000;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
        }

        .message-modal.show {
            display: block;
            animation: modalAppear 0.3s ease;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .message-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd700;
        }

        .message-modal .modal-header h3 {
            color: #ffd700;
            font-size: 20px;
            margin: 0;
        }

        .message-modal .modal-close {
            cursor: pointer;
            font-size: 24px;
            color: #ffd700;
            background: none;
            border: none;
        }

        .message-modal .message-list {
            margin-bottom: 20px;
        }

        .message-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .message-item:hover {
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .message-item.selected {
            border-color: #ffd700;
            background: #2a2a2a;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .message-item .title {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .message-item .content {
            color: #cccccc;
            font-size: 14px;
            max-height: 100px;
            overflow-y: auto;
        }

        .message-preview {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .message-preview .label {
            color: #ffd700;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .message-preview .text {
            color: #ffffff;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-actions .send-btn {
            background: #ffd700;
            color: #000;
        }

        .modal-actions .send-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,215,0,0.4);
        }

        .modal-actions .cancel-btn {
            background: #1a1a1a;
            color: #ffd700;
        }

        .modal-actions .cancel-btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="side-menu-trigger"></div>
    <div class="side-menu">
        <button class="menu-btn" onclick="showForm()">Главная</button>
        <button class="menu-btn" onclick="showCandidatesPanel()">Кандидаты</button>
        <button class="menu-btn logout" onclick="logout()">Выйти</button>
    </div>

    <!-- Форма входа -->
    <div class="login-container" id="loginContainer">
        <h2>Вход для рекрутера</h2>
        <div class="form-group">
            <label>Логин (ФИО)</label>
            <input type="text" id="loginUsername" placeholder="Иванов Иван">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="login()">Войти</button>
        <div class="error-message" id="loginError">Неверный логин или пароль</div>
    </div>

    <!-- Основная панель рекрутера -->
    <div class="recruiter-interface" id="recruiterInterface">
        <div class="header">
            <h1>Панель рекрутера <span id="recruiterNameDisplay"></span></h1>
            <div class="header-actions">
                <button class="schedule-btn" onclick="window.location.href='hr control panel.html?tab=schedule-only'">График</button>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <!-- Основная рабочая область (скрипты + форма) -->
        <div class="content-wrapper" id="mainContentWrapper">
            <div class="left-panel">
                <select id="scriptSelector" class="script-selector">
                    <option value="">— выберите скрипт —</option>
                </select>
                <div id="selectedScriptContainer" style="display: none;">
                    <div class="script-item">
                        <div class="title" id="selectedScriptTitle"></div>
                        <div class="content" id="selectedScriptContent"></div>
                    </div>
                </div>
                <div id="noScriptMessage" style="color: #8f9bb3; text-align: center;">Нет доступных скриптов</div>
            </div>
            <div class="right-panel">
                <h3>Обработка кандидата</h3>
                <div id="candidateCounter" class="candidate-counter"></div>
                <form id="candidateForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>ФИО кандидата <span style="color: #ff6b6b;">*</span></label>
                            <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
                        </div>

                        <div class="form-group full-width">
                            <label>Номер телефона <span style="color: #ff6b6b;">*</span></label>
                            <input type="tel" id="phoneNumber" placeholder="+7 999 999-99-99" required>
                        </div>

                        <div class="form-group">
                            <label>Проект <span style="color: #ff6b6b;">*</span></label>
                            <select id="project" required>
                                <option value="">— выберите проект —</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Страна</label>
                            <select id="country">
                                <option value="Кыргызстан">Кыргызстан</option>
                                <option value="Узбекистан">Узбекистан</option>
                                <option value="Россия">Россия</option>
                                <option value="Казахстан">Казахстан</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label>Дата обучения</label>
                            <select id="trainingDateSelect">
                                <option value="">— выберите дату —</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label>Время обучения</label>
                            <input type="text" id="trainingTimeInput" placeholder="чч:мм">
                        </div>

                        <div class="form-group">
                            <label>Результат звонка</label>
                            <select id="callResult">
                                <option value="">— выберите —</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Тип обращения</label>
                            <select id="contactType">
                                <option value="">— выберите —</option>
                            </select>
                        </div>

                        <input type="hidden" id="recruiterField">
                        <input type="hidden" id="candidateIndexField" value="-1">

                        <div class="form-group full-width">
                            <label>Комментарий</label>
                            <textarea id="comment" rows="4" placeholder="Дополнительная информация..."></textarea>
                        </div>
                    </div>

                    <!-- Кнопки: сохранить, Telegram, WhatsApp, подключить Google -->
                    <button type="submit" class="save-btn">Сохранить кандидата</button>
                    <button type="button" class="telegram-btn" onclick="openMessageModal('telegram')">✈️ Отправить в Telegram</button>
                    <button type="button" class="whatsapp-btn" onclick="openMessageModal('whatsapp')">📱 Отправить в WhatsApp</button>
                    <button type="button" class="google-connect-btn" id="googleConnectBtn" onclick="connectGoogle()">🔗 Подключить Google Контакты</button>
                </form>
            </div>
        </div>

        <!-- Панель кандидатов (вкладки Контакты, Проверка, Черновик) -->
        <div id="candidatesPanel" class="candidates-panel" style="display: none;">
            <h3>Кандидаты</h3>
            <div class="candidates-tabs">
                <button class="candidates-tab active" id="tabContacts" onclick="switchCandidatesTab('contacts')">Контакты</button>
                <button class="candidates-tab" id="tabVerification" onclick="switchCandidatesTab('verification')">Проверка</button>
                <button class="candidates-tab" id="tabDraft" onclick="switchCandidatesTab('draft')">Черновик</button>
            </div>
            <div id="candidatesListContainer" class="candidates-list"></div>
        </div>
    </div>

    <!-- Модальное окно выбора сообщения для отправки -->
    <div id="messageModal" class="message-modal">
        <div class="modal-header">
            <h3 id="messageModalTitle">Выберите сообщение для отправки</h3>
            <button class="modal-close" onclick="closeMessageModal()">✕</button>
        </div>
        <div class="message-list" id="messageList">
            <!-- будут подгружены скрипты чата -->
        </div>
        <div class="message-preview">
            <div class="label">Предварительный просмотр:</div>
            <div class="text" id="messagePreviewText"></div>
        </div>
        <div class="modal-actions">
            <button class="send-btn" id="sendMessageBtn" onclick="sendSelectedMessage()">Отправить</button>
            <button class="cancel-btn" onclick="closeMessageModal()">Отмена</button>
        </div>
    </div>

    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentRecruiter = null;
        let myCandidates = [];               // кандидаты рекрутера (из getMyCandidates)
        let allCandidates = [];               // все анкеты (из getAllCandidates)
        let currentCandidateIndex = -1;
        let currentScriptTitle = null;
        let appData = {
            projects: [],
            callResults: [],
            contactTypes: [],
            scripts: [],
            projectTrainings: {}  // для дат обучения
        };
        let currentView = 'main'; // 'main', 'candidates'
        let candidatesTab = 'contacts'; // 'contacts', 'verification', 'draft'

        // ДОБАВЛЕНО: список проектов, которые есть в скриптах
        let scriptProjects = [];

        // Для отслеживания новых черновиков
        let previousDraftKeys = new Set();

        // Флаг, что текущий кандидат - черновик (чтобы обновлять статус через updateCandidateStatus)
        let currentIsDraft = false;
        let currentDraftId = null;

        // Для модального окна отправки сообщения
        let currentMessageType = null; // 'telegram' или 'whatsapp'
        let selectedMessageIndex = -1;
        let chatScripts = []; // скрипты типа 'test', 'Чат', 'chat'

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        // ========== ВХОД ==========
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) {
                showLoginError('Введите логин и пароль');
                return;
            }

            try {
                const response = await fetch('/.netlify/functions/loginRecruiter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Ошибка входа');
                }
                currentRecruiter = data.recruiter;
                sessionStorage.setItem('recruiter', JSON.stringify(currentRecruiter));
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('recruiterInterface').style.display = 'block';
                initInterface();
            } catch (error) {
                console.error(error);
                showLoginError('Неверный логин или пароль');
            }
        }

        function showLoginError(msg) {
            const err = document.getElementById('loginError');
            err.textContent = msg;
            err.style.display = 'block';
        }

        // ========== ПРОВЕРКА СТАТУСА ПОДКЛЮЧЕНИЯ GOOGLE ==========
        async function checkGoogleStatus() {
            if (!currentRecruiter) return;
            try {
                const res = await fetch(`/.netlify/functions/get-google-status?recruiterId=${encodeURIComponent(currentRecruiter.name)}`);
                if (res.ok) {
                    const { connected } = await res.json();
                    const btn = document.getElementById('googleConnectBtn');
                    if (connected) {
                        btn.disabled = true;
                        btn.textContent = '✅ Google подключён';
                    } else {
                        btn.disabled = false;
                        btn.textContent = '🔗 Подключить Google Контакты';
                    }
                }
            } catch (e) {
                console.error('Ошибка проверки статуса Google', e);
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ВХОДА ==========
        async function initInterface() {
            document.getElementById('recruiterNameDisplay').textContent = currentRecruiter.name;
            document.getElementById('recruiterField').value = currentRecruiter.name;

            await loadReferenceData();
            await loadScripts();
            await loadMyCandidates();
            await loadAllCandidates();   // загружаем все анкеты для черновиков
            await checkGoogleStatus();

            // Ищем первого кандидата без результата для отображения в форме
            if (myCandidates.length > 0) {
                const firstEmptyIndex = myCandidates.findIndex(c => !c.callResult || c.callResult.trim() === '');
                if (firstEmptyIndex !== -1) {
                    currentCandidateIndex = firstEmptyIndex;
                    loadCandidateIntoForm(firstEmptyIndex);
                } else {
                    currentCandidateIndex = -1;
                    loadCandidateIntoForm(-1);
                }
            } else {
                currentCandidateIndex = -1;
                loadCandidateIntoForm(-1);
            }

            // По умолчанию показываем главную вкладку
            showForm();
            // Запускаем автообновление
            startAutoRefresh();
        }

        // ========== ЗАГРУЗКА ВСЕХ АНКЕТ ==========
        async function loadAllCandidates() {
            try {
                const response = await fetch('/.netlify/functions/getAllCandidates');
                if (response.ok) {
                    allCandidates = await response.json();
                } else {
                    console.error('Ошибка загрузки всех анкет');
                }
            } catch (error) {
                console.error(error);
            }
        }

        // ========== ЗАГРУЗКА СПРАВОЧНИКОВ ==========
        async function loadReferenceData() {
            try {
                const [projectsRes, callResultsRes, contactTypesRes, trainingsRes] = await Promise.all([
                    fetch('/.netlify/functions/getProjects'),
                    fetch('/.netlify/functions/getCallResults'),
                    fetch('/.netlify/functions/getContactTypes'),
                    fetch('/.netlify/functions/getProjectTrainings')
                ]);
                appData.projects = await projectsRes.json();
                appData.callResults = await callResultsRes.json();
                appData.contactTypes = await contactTypesRes.json();
                appData.projectTrainings = await trainingsRes.json();

                fillProjects(); // заполним проектами из скриптов (пока скрипты не загружены, будет пусто)
                fillCallResults();
                fillContactTypes();
            } catch (error) {
                console.error('Ошибка загрузки справочников:', error);
                showNotification('Не удалось загрузить данные', 'error');
            }
        }

        // ========== ЗАГРУЗКА СКРИПТОВ ==========
        async function loadScripts() {
            try {
                const res = await fetch('/.netlify/functions/getScripts');
                appData.scripts = await res.json();
                updateScriptProjects();
                fillProjects(); // перезаполнить список проектов
                updateScriptsUI();
                // Сохраняем скрипты чата отдельно (поддерживаем несколько вариантов типа)
                chatScripts = appData.scripts.filter(s => s.type === 'test' || s.type === 'Чат' || s.type === 'chat');
                console.log('Загруженные скрипты:', appData.scripts);
                console.log('Скрипты чата:', chatScripts);
            } catch (error) {
                console.error('Ошибка загрузки скриптов:', error);
            }
        }

        // Функция для сбора уникальных проектов из скриптов
        function updateScriptProjects() {
            const projectSet = new Set();
            appData.scripts.forEach(script => {
                if (script.projectNames && Array.isArray(script.projectNames)) {
                    script.projectNames.forEach(name => projectSet.add(name));
                } else if (script.projectName) {
                    projectSet.add(script.projectName);
                }
            });
            scriptProjects = Array.from(projectSet);
        }

        // ========== ЗАГРУЗКА МОИХ КАНДИДАТОВ ==========
        async function loadMyCandidates() {
            try {
                const response = await fetch(`/.netlify/functions/getMyCandidates?recruiter=${encodeURIComponent(currentRecruiter.name)}`);
                if (response.ok) {
                    myCandidates = await response.json();
                    myCandidates.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                } else {
                    console.error('Ошибка загрузки кандидатов');
                }
            } catch (error) {
                console.error(error);
            }
        }

        // ========== ЗАПОЛНЕНИЕ SELECTОВ ==========
        function fillProjects() {
            const select = document.getElementById('project');
            select.innerHTML = '<option value="">— выберите проект —</option>' +
                scriptProjects.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function fillCallResults() {
            const select = document.getElementById('callResult');
            const results = appData.callResults.map(r => r.name);
            select.innerHTML = '<option value="">— выберите —</option>' +
                results.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        function fillContactTypes() {
            const select = document.getElementById('contactType');
            const types = appData.contactTypes.map(t => t.name);
            select.innerHTML = '<option value="">— выберите —</option>' +
                types.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        // ========== ОБНОВЛЕНИЕ РЕЗУЛЬТАТОВ ЗВОНКА ПО СКРИПТУ ==========
        function updateCallResults() {
            const select = document.getElementById('callResult');
            if (!currentScriptTitle) {
                fillCallResults();
                return;
            }
            const script = appData.scripts.find(s => s.title === currentScriptTitle);
            if (script && script.statuses && script.statuses.length > 0) {
                select.innerHTML = '<option value="">— выберите —</option>' +
                    script.statuses.map(s => `<option value="${s}">${s}</option>`).join('');
            } else {
                fillCallResults();
            }
        }

        // ========== РАБОТА СО СКРИПТАМИ ==========
        function updateScriptsUI() {
            const selector = document.getElementById('scriptSelector');
            const container = document.getElementById('selectedScriptContainer');
            const noMsg = document.getElementById('noScriptMessage');
            const previousTitle = currentScriptTitle;

            selector.innerHTML = '<option value="">— выберите скрипт —</option>';

            if (!appData.scripts || appData.scripts.length === 0) {
                container.style.display = 'none';
                noMsg.style.display = 'block';
                updateCallResults();
                return;
            }

            appData.scripts.forEach((script, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = script.title;
                selector.appendChild(option);
            });

            let selectedIndex = -1;
            if (previousTitle) {
                const foundIndex = appData.scripts.findIndex(s => s.title === previousTitle);
                if (foundIndex !== -1) selectedIndex = foundIndex;
            }
            if (selectedIndex === -1 && appData.scripts.length > 0) {
                selectedIndex = 0;
            }

            if (selectedIndex !== -1) {
                selector.value = selectedIndex;
                currentScriptTitle = appData.scripts[selectedIndex].title;
                displayScript(selectedIndex);
                container.style.display = 'block';
                noMsg.style.display = 'none';
                setProjectFromScript(currentScriptTitle);
                updateCallResults();
            } else {
                container.style.display = 'none';
                noMsg.style.display = 'block';
                currentScriptTitle = null;
                updateCallResults();
            }
        }

        function displayScript(index) {
            const script = appData.scripts[index];
            if (!script) return;
            document.getElementById('selectedScriptTitle').textContent = script.title;
            document.getElementById('selectedScriptContent').innerHTML = script.content;
        }

        function setProjectFromScript(scriptTitle) {
            if (!scriptTitle) return;
            if (!scriptProjects.includes(scriptTitle)) {
                scriptProjects.push(scriptTitle);
                fillProjects();
            }
            document.getElementById('project').value = scriptTitle;
            updateTrainingDates(scriptTitle);
        }

        // ========== ДАТЫ ОБУЧЕНИЯ ==========
        function updateTrainingDates(project) {
            const select = document.getElementById('trainingDateSelect');
            if (!project) {
                select.innerHTML = '<option value="">— нет данных —</option>';
                return;
            }

            const dates = [];
            for (const key in appData.projectTrainings) {
                if (key.startsWith(project + '_')) {
                    const parts = key.split('_');
                    if (parts.length === 3) {
                        const dateStr = `${parts[1]}-${parts[2].padStart(2, '0')}`;
                        dates.push({
                            date: dateStr,
                            time: appData.projectTrainings[key]
                        });
                    }
                }
            }

            dates.sort((a, b) => a.date.localeCompare(b.date));

            let options = '<option value="">— выберите дату —</option>';
            dates.forEach(d => {
                options += `<option value="${d.date}" data-time="${d.time}">${d.date}</option>`;
            });

            select.innerHTML = options;
        }

        function onTrainingDateChange() {
            const select = document.getElementById('trainingDateSelect');
            const selectedOption = select.options[select.selectedIndex];
            const time = selectedOption ? selectedOption.getAttribute('data-time') : '';
            document.getElementById('trainingTimeInput').value = time || '';
        }

        document.getElementById('project').addEventListener('change', function(e) {
            const project = e.target.value;
            updateTrainingDates(project);
        });

        document.getElementById('trainingDateSelect').addEventListener('change', onTrainingDateChange);

        // ========== ЗАГРУЗКА КАНДИДАТА В ФОРМУ ==========
        function loadCandidateIntoForm(idx) {
            if (idx < 0 || idx >= myCandidates.length) {
                document.getElementById('fullName').value = '';
                document.getElementById('phoneNumber').value = '';
                if (currentScriptTitle) {
                    setProjectFromScript(currentScriptTitle);
                } else {
                    document.getElementById('project').value = '';
                    updateTrainingDates('');
                }
                document.getElementById('country').value = 'Кыргызстан';
                document.getElementById('trainingDateSelect').value = '';
                document.getElementById('trainingTimeInput').value = '';
                document.getElementById('callResult').value = '';
                document.getElementById('contactType').value = '';
                document.getElementById('comment').value = '';
                document.getElementById('candidateIndexField').value = '-1';
                document.getElementById('candidateCounter').textContent = 'Нет кандидатов для обработки';
                return;
            }

            const candidate = myCandidates[idx];
            document.getElementById('fullName').value = candidate.fullName || '';
            document.getElementById('phoneNumber').value = candidate.phone || '';

            if (candidate.project) {
                document.getElementById('project').value = candidate.project;
                updateTrainingDates(candidate.project);
            } else if (currentScriptTitle) {
                setProjectFromScript(currentScriptTitle);
            } else {
                document.getElementById('project').value = '';
                updateTrainingDates('');
            }

            // Определяем страну по телефону
            const digits = candidate.phone.replace(/\D/g, '');
            if (digits.startsWith('996')) document.getElementById('country').value = 'Кыргызстан';
            else if (digits.startsWith('998')) document.getElementById('country').value = 'Узбекистан';
            else if (digits.startsWith('77')) document.getElementById('country').value = 'Казахстан';
            else if (digits.startsWith('79')) document.getElementById('country').value = 'Россия';
            else if (candidate.country) document.getElementById('country').value = candidate.country;

            if (candidate.trainingDate) {
                const select = document.getElementById('trainingDateSelect');
                let optionExists = false;
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === candidate.trainingDate) {
                        select.selectedIndex = i;
                        optionExists = true;
                        break;
                    }
                }
                if (!optionExists) {
                    const option = document.createElement('option');
                    option.value = candidate.trainingDate;
                    option.text = candidate.trainingDate;
                    option.setAttribute('data-time', candidate.trainingTime || '');
                    select.appendChild(option);
                    select.value = candidate.trainingDate;
                }
                document.getElementById('trainingTimeInput').value = candidate.trainingTime || '';
            } else {
                document.getElementById('trainingDateSelect').value = '';
                document.getElementById('trainingTimeInput').value = '';
            }

            document.getElementById('callResult').value = candidate.callResult || '';
            document.getElementById('contactType').value = candidate.contactType || '';
            document.getElementById('comment').value = candidate.comment || '';
            document.getElementById('candidateIndexField').value = idx;

            const total = myCandidates.length;
            document.getElementById('candidateCounter').textContent = `Кандидат ${idx+1} из ${total}`;
        }

        // ========== СОХРАНЕНИЕ КАНДИДАТА ==========
        document.getElementById('candidateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const project = document.getElementById('project').value;

            if (!fullName || !phoneNumber || !project) {
                showNotification('Заполните обязательные поля (ФИО, телефон, проект)', 'error');
                return;
            }

            const idx = parseInt(document.getElementById('candidateIndexField').value, 10);
            if (idx < 0 || idx >= myCandidates.length) {
                showNotification('Нет активного кандидата для обновления', 'error');
                return;
            }

            const candidate = myCandidates[idx];
            candidate.fullName = fullName;
            candidate.phone = phoneNumber;
            candidate.project = project;
            candidate.country = document.getElementById('country').value;
            candidate.trainingDate = document.getElementById('trainingDateSelect').value;
            candidate.trainingTime = document.getElementById('trainingTimeInput').value.trim();
            candidate.meetingTime = candidate.trainingTime;
            candidate.callResult = document.getElementById('callResult').value;
            candidate.contactType = document.getElementById('contactType').value;
            candidate.comment = document.getElementById('comment').value.trim();

            try {
                const response = await fetch('/.netlify/functions/submitCandidate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(candidate)
                });
                if (response.ok) {
                    showNotification('Кандидат сохранён', 'success');
                    goToNextCandidate();
                } else {
                    const err = await response.json();
                    showNotification('Ошибка сохранения: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        });

        // ========== ПЕРЕХОД К СЛЕДУЮЩЕМУ КАНДИДАТУ БЕЗ РЕЗУЛЬТАТА ==========
        function goToNextCandidate() {
            if (myCandidates.length === 0) {
                currentCandidateIndex = -1;
                loadCandidateIntoForm(-1);
                return;
            }

            let nextIndex = -1;
            if (currentCandidateIndex >= 0) {
                for (let i = currentCandidateIndex + 1; i < myCandidates.length; i++) {
                    if (!myCandidates[i].callResult || myCandidates[i].callResult.trim() === '') {
                        nextIndex = i;
                        break;
                    }
                }
                if (nextIndex === -1) {
                    for (let i = 0; i < currentCandidateIndex; i++) {
                        if (!myCandidates[i].callResult || myCandidates[i].callResult.trim() === '') {
                            nextIndex = i;
                            break;
                        }
                    }
                }
            } else {
                for (let i = 0; i < myCandidates.length; i++) {
                    if (!myCandidates[i].callResult || myCandidates[i].callResult.trim() === '') {
                        nextIndex = i;
                        break;
                    }
                }
            }

            if (nextIndex === -1) {
                currentCandidateIndex = -1;
                loadCandidateIntoForm(-1);
            } else {
                currentCandidateIndex = nextIndex;
                loadCandidateIntoForm(nextIndex);
            }
        }

        // ========== ВЫХОД ==========
        function logout() {
            stopAutoRefresh();
            sessionStorage.removeItem('recruiter');
            location.reload();
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ГЛАВНОЙ И КАНДИДАТАМИ ==========
        function showForm() {
            document.querySelector('.content-wrapper').style.display = 'flex';
            document.getElementById('candidatesPanel').style.display = 'none';
            currentView = 'main';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showCandidatesPanel() {
            document.querySelector('.content-wrapper').style.display = 'none';
            document.getElementById('candidatesPanel').style.display = 'block';
            currentView = 'candidates';
            // По умолчанию активна вкладка "Контакты"
            switchCandidatesTab('contacts');
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ВНУТРИ КАНДИДАТОВ ==========
        function switchCandidatesTab(tab) {
            candidatesTab = tab;
            document.getElementById('tabContacts').classList.toggle('active', tab === 'contacts');
            document.getElementById('tabVerification').classList.toggle('active', tab === 'verification');
            document.getElementById('tabDraft').classList.toggle('active', tab === 'draft');

            if (tab === 'contacts') {
                renderContactsCandidates();
            } else if (tab === 'verification') {
                renderVerificationCandidates();
            } else {
                renderDraftCandidates();
            }
        }

        // ========== РЕНДЕР КОНТАКТОВ (все кандидаты рекрутера) ==========
        function renderContactsCandidates() {
            const container = document.getElementById('candidatesListContainer');
            if (myCandidates.length === 0) {
                container.innerHTML = '<div class="no-candidates">Нет контактов</div>';
                return;
            }

            let html = '';
            myCandidates.forEach((candidate, index) => {
                const status = candidate.callResult || 'ожидает связи';
                const statusClass = candidate.callResult ? '' : 'waiting';
                html += `
                    <div class="candidate-card" data-index="${index}" data-id="${candidate.id}">
                        <div class="candidate-field">
                            <div class="label">ФИО</div>
                            <div class="value highlight">${candidate.fullName || '—'}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Телефон</div>
                            <div class="value">${candidate.phone || '—'}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Статус</div>
                            <div class="value"><span class="candidate-status-badge ${statusClass}">${status}</span></div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Проект</div>
                            <div class="value">${candidate.project || '—'}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            document.querySelectorAll('#candidatesListContainer .candidate-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const index = card.dataset.index;
                    if (index !== undefined) {
                        currentCandidateIndex = parseInt(index);
                        loadCandidateIntoForm(currentCandidateIndex);
                        showForm();
                    }
                });
            });
        }

        // ========== РЕНДЕР КАНДИДАТОВ ПРОВЕРКИ ==========
        function renderVerificationCandidates() {
            const container = document.getElementById('candidatesListContainer');
            const verificationCandidates = myCandidates.filter(c => c.callResult === "Проверка");

            if (verificationCandidates.length === 0) {
                container.innerHTML = '<div class="no-candidates">Нет кандидатов на проверку</div>';
                return;
            }

            let html = '';
            verificationCandidates.forEach(candidate => {
                const trainingInfo = candidate.trainingDate
                    ? `${candidate.trainingDate} ${candidate.trainingTime || ''}`
                    : '—';
                html += `
                    <div class="candidate-card" data-index="${myCandidates.findIndex(c => c.id === candidate.id)}" data-id="${candidate.id}">
                        <div class="candidate-field">
                            <div class="label">ФИО</div>
                            <div class="value highlight">${candidate.fullName}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Телефон</div>
                            <div class="value">${candidate.phone}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Проект</div>
                            <div class="value">${candidate.project || '—'}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Обучение</div>
                            <div class="value">${trainingInfo}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Статус</div>
                            <div class="value"><span class="candidate-status-badge">${candidate.callResult}</span></div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            document.querySelectorAll('#candidatesListContainer .candidate-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const index = card.dataset.index;
                    if (index !== undefined) {
                        currentCandidateIndex = parseInt(index);
                        loadCandidateIntoForm(currentCandidateIndex);
                        showForm();
                    }
                });
            });
        }

        // ========== ПОЛУЧИТЬ КАНДИДАТОВ ДЛЯ ЧЕРНОВИКА ==========
        function getDraftCandidates() {
            const oneHourAgo = Date.now() - 60 * 60 * 1000; // 1 час назад
            return allCandidates.filter(c =>
                c.recruitmentStatus === 'draft' &&
                new Date(c.createdAt).getTime() < oneHourAgo
            );
        }

        // ========== РЕНДЕР ЧЕРНОВИКОВ ==========
        function renderDraftCandidates() {
            const container = document.getElementById('candidatesListContainer');
            const draftCandidates = getDraftCandidates();

            // Формируем ключи для новых черновиков
            const newKeys = draftCandidates.map(c => `${c.fullName}_${c.phone}`);
            const newKeysSet = new Set(newKeys);

            // Проверяем, появились ли новые
            let newAdded = false;
            for (let key of newKeysSet) {
                if (!previousDraftKeys.has(key)) {
                    newAdded = true;
                    break;
                }
            }
            if (newAdded) {
                showNotification('Добавлен новый черновик', 'info');
            }
            previousDraftKeys = newKeysSet;

            if (draftCandidates.length === 0) {
                container.innerHTML = '<div class="no-candidates">Нет черновиков</div>';
                return;
            }

            let html = '';
            draftCandidates.forEach(candidate => {
                const telegram = candidate.telegram || '—';
                html += `
                    <div class="candidate-card" data-id="${candidate.id}">
                        <div class="candidate-field">
                            <div class="label">ФИО</div>
                            <div class="value highlight">${candidate.fullName}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Телефон</div>
                            <div class="value">${candidate.phone}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Telegram</div>
                            <div class="value">${telegram}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Проект</div>
                            <div class="value">${candidate.project || '—'}</div>
                        </div>
                        <div class="candidate-field">
                            <div class="label">Статус</div>
                            <div class="value"><span class="candidate-status-badge">${candidate.recruitmentStatus || 'draft'}</span></div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ========== ОБРАБОТЧИК СМЕНЫ СКРИПТА ==========
        document.getElementById('scriptSelector').addEventListener('change', function(e) {
            const index = e.target.value;
            if (index === '') {
                document.getElementById('selectedScriptContainer').style.display = 'none';
                document.getElementById('noScriptMessage').style.display = 'block';
                currentScriptTitle = null;
                updateCallResults();
                return;
            }
            const idx = parseInt(index, 10);
            if (!isNaN(idx) && idx >= 0 && idx < appData.scripts.length) {
                currentScriptTitle = appData.scripts[idx].title;
                displayScript(idx);
                document.getElementById('selectedScriptContainer').style.display = 'block';
                document.getElementById('noScriptMessage').style.display = 'none';
                setProjectFromScript(currentScriptTitle);
                updateCallResults();
            }
        });

        // ========== ВОССТАНОВЛЕНИЕ СЕССИИ ==========
        window.addEventListener('load', () => {
            const saved = sessionStorage.getItem('recruiter');
            if (saved) {
                try {
                    currentRecruiter = JSON.parse(saved);
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('recruiterInterface').style.display = 'block';
                    initInterface();
                } catch (e) {
                    sessionStorage.removeItem('recruiter');
                }
            }
        });

        // ========== ФУНКЦИИ ДЛЯ ИНТЕГРАЦИИ С GOOGLE ==========
        function connectGoogle() {
            const state = encodeURIComponent(currentRecruiter.name);
            window.location.href = `/.netlify/functions/auth-google-redirect?state=${state}`;
        }

        // ========== НОВЫЕ ФУНКЦИИ ДЛЯ ОТПРАВКИ СООБЩЕНИЙ ==========
        function openMessageModal(type) {
            // Проверяем, что выбран кандидат
            const phone = document.getElementById('phoneNumber').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            if (!phone || !fullName) {
                showNotification('Заполните ФИО и номер телефона', 'error');
                return;
            }
            // Проверяем наличие скриптов чата
            if (!chatScripts || chatScripts.length === 0) {
                showNotification('Нет доступных скриптов для чата', 'error');
                return;
            }

            currentMessageType = type;
            document.getElementById('messageModalTitle').textContent = type === 'telegram' ? 'Выберите сообщение для Telegram' : 'Выберите сообщение для WhatsApp';
            
            // Рендерим список сообщений
            const listContainer = document.getElementById('messageList');
            let html = '';
            chatScripts.forEach((script, index) => {
                // Очищаем HTML-теги из контента для предпросмотра
                const plainText = script.content.replace(/<[^>]*>/g, '');
                html += `
                    <div class="message-item ${selectedMessageIndex === index ? 'selected' : ''}" data-index="${index}">
                        <div class="title">${script.title}</div>
                        <div class="content">${plainText.substring(0, 150)}${plainText.length > 150 ? '…' : ''}</div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;

            // Добавляем обработчики клика
            document.querySelectorAll('.message-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.message-item').forEach(el => el.classList.remove('selected'));
                    item.classList.add('selected');
                    const index = item.dataset.index;
                    if (index !== undefined) {
                        selectedMessageIndex = parseInt(index);
                        updateMessagePreview();
                    }
                });
            });

            // Если ни одно не выбрано, выбираем первое
            if (selectedMessageIndex === -1 && chatScripts.length > 0) {
                selectedMessageIndex = 0;
                document.querySelector('.message-item')?.classList.add('selected');
                updateMessagePreview();
            }

            document.getElementById('messageModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        function updateMessagePreview() {
            if (selectedMessageIndex === -1 || !chatScripts[selectedMessageIndex]) return;
            const script = chatScripts[selectedMessageIndex];
            const projectName = document.getElementById('project').value;
            // Получаем projectId по названию проекта из appData.projects
            const projectObj = appData.projects.find(p => p.name === projectName);
            const projectId = projectObj ? projectObj.id : '';
            const link = projectId ? `${window.location.origin}/candidate.html?projectId=${encodeURIComponent(projectId)}` : '';

            // Очищаем HTML-теги и добавляем ссылку
            let plainText = script.content.replace(/<[^>]*>/g, '');
            if (link) {
                plainText += '\n\nСсылка для заполнения анкеты: ' + link;
            }
            document.getElementById('messagePreviewText').textContent = plainText;
        }

        async function sendSelectedMessage() {
            if (selectedMessageIndex === -1) {
                showNotification('Выберите сообщение', 'error');
                return;
            }
            const script = chatScripts[selectedMessageIndex];
            const phone = document.getElementById('phoneNumber').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const projectName = document.getElementById('project').value;
            const projectObj = appData.projects.find(p => p.name === projectName);
            const projectId = projectObj ? projectObj.id : '';
            const link = projectId ? `${window.location.origin}/candidate.html?projectId=${encodeURIComponent(projectId)}` : '';

            // Формируем текст сообщения
            let text = script.content.replace(/<[^>]*>/g, '');
            if (link) {
                text += '\n\nСсылка для заполнения анкеты: ' + link;
            }

            // Очищаем номер от всего, кроме цифр
            const cleanPhone = phone.replace(/\D/g, '');

            if (currentMessageType === 'telegram') {
                // Для Telegram: сначала копируем текст, затем открываем чат через Google Contacts
                try {
                    // Копируем текст в буфер обмена
                    await navigator.clipboard.writeText(text);
                    
                    // Получаем ссылку на чат через add-google-contact
                    showLoading();
                    const response = await fetch('/.netlify/functions/add-google-contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            recruiterId: currentRecruiter.name,
                            phoneNumber: phone,
                            fullName: fullName
                        })
                    });
                    hideLoading();
                    
                    if (response.ok) {
                        const data = await response.json();
                        // Открываем чат Telegram
                        window.open(data.chatUrl, '_blank');
                        showNotification('Текст скопирован! Вставьте его в открывшемся чате Telegram.', 'success');
                    } else if (response.status === 401) {
                        showNotification('Необходимо подключить Google Контакты', 'error');
                    } else {
                        const err = await response.json();
                        showNotification('Ошибка при открытии чата: ' + (err.error || ''), 'error');
                    }
                } catch (err) {
                    hideLoading();
                    console.error(err);
                    showNotification('Ошибка при копировании или открытии чата', 'error');
                }
            } else {
                // WhatsApp: открываем wa.me с текстом
                const url = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }

            // Закрываем модальное окно
            closeMessageModal();
        }

        // ========== АВТОМАТИЧЕСКОЕ ОБНОВЛЕНИЕ ==========
        let refreshInterval = null;
        let isRefreshing = false;

        async function refreshMyCandidates() {
            if (isRefreshing || !currentRecruiter) return;
            isRefreshing = true;

            try {
                const response = await fetch(`/.netlify/functions/getMyCandidates?recruiter=${encodeURIComponent(currentRecruiter.name)}`);
                if (response.ok) {
                    const newCandidates = await response.json();
                    newCandidates.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                    const currentId = (currentCandidateIndex >= 0 && currentCandidateIndex < myCandidates.length)
                        ? myCandidates[currentCandidateIndex].id
                        : null;

                    myCandidates = newCandidates;

                    let newIndex = -1;
                    if (currentId) {
                        newIndex = myCandidates.findIndex(c => c.id === currentId);
                    }
                    if (newIndex === -1) {
                        newIndex = myCandidates.findIndex(c => !c.callResult || c.callResult.trim() === '');
                    }
                    if (newIndex === -1 && myCandidates.length > 0) {
                        newIndex = 0;
                    }

                    currentCandidateIndex = newIndex;

                    if (currentView === 'main') {
                        loadCandidateIntoForm(currentCandidateIndex);
                    } else if (currentView === 'candidates') {
                        if (candidatesTab === 'contacts') {
                            renderContactsCandidates();
                        } else if (candidatesTab === 'verification') {
                            renderVerificationCandidates();
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка при обновлении кандидатов:', error);
            } finally {
                isRefreshing = false;
            }
        }

        // Обновление всех анкет для черновиков
        async function refreshAllCandidates() {
            try {
                const response = await fetch('/.netlify/functions/getAllCandidates');
                if (response.ok) {
                    const newAll = await response.json();
                    allCandidates = newAll;
                    // Если сейчас открыта вкладка черновиков, перерендерить
                    if (currentView === 'candidates' && candidatesTab === 'draft') {
                        renderDraftCandidates();
                    }
                }
            } catch (error) {
                console.error('Ошибка при обновлении всех анкет:', error);
            }
        }

        function startAutoRefresh(intervalMs = 20000) {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                refreshMyCandidates();
                refreshAllCandidates();
            }, intervalMs);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });

        // ========== СТИЛИ ДЛЯ ЗАГРУЗКИ ==========
        function showLoading() {
            let overlay = document.getElementById('loadingOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">Идет загрузка...</div>';
                document.body.appendChild(overlay);
            }
            overlay.classList.remove('hidden');
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('hidden');
        }

        const style = document.createElement('style');
        style.textContent = `
            .loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.9);
                z-index: 2000;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                gap: 20px;
            }
            .loading-overlay.hidden {
                display: none;
            }
            .loading-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid #333;
                border-top-color: #ffd700;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            .loading-text {
                color: #ffd700;
                font-size: 24px;
                font-weight: 600;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
