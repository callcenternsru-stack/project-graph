<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка ID анкет</title>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: monospace; padding: 30px; }
        h2 { color: #ffd700; margin-bottom: 10px; }
        p.sub { color: #888; font-size: 13px; margin-bottom: 20px; }
        .section { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .section h3 { color: #ffd700; margin-bottom: 12px; font-size: 15px; }
        .ok   { color: #6bff9e; }
        .warn { color: #ff6b6b; }
        .info { color: #6b8cff; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #000; color: #ffd700; padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; }
        td { padding: 7px 12px; border-bottom: 1px solid #222; color: #ccc; word-break: break-all; }
        tr:hover td { background: #222; }
        #log { white-space: pre-wrap; font-size: 12px; color: #888; background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; max-height: 200px; overflow-y: auto; }
        button { background: #ffd700; color: #000; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 24px; }
        button:hover { background: #ffe44d; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-left: 8px; }
        .badge-red   { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .badge-green { background: rgba(107,255,158,0.15); color: #6bff9e; border: 1px solid #6bff9e; }
        .badge-blue  { background: rgba(107,140,255,0.15); color: #6b8cff; border: 1px solid #6b8cff; }
    </style>
</head>
<body>

<h2>🔍 Проверка анкет vs База контактов</h2>
<p class="sub">
    Сравниваем поле <strong>contactId</strong> в анкете с полем <strong>id</strong> в Базе контактов.
</p>

<button id="runBtn" onclick="runCheck()">▶ Запустить проверку</button>

<div id="logSection" class="section" style="display:none;">
    <h3>Лог</h3>
    <div id="log"></div>
</div>

<div id="results" style="display:none;"></div>

<script>
    function log(msg) {
        const el = document.getElementById('log');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
    }

    async function safeFetch(url, label) {
        try {
            log('Загружаю ' + label + '...');
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            log('  OK ' + label);
            return data;
        } catch (e) {
            log('  ОШИБКА ' + label + ': ' + e.message);
            return [];
        }
    }

    // getCandidates возвращает кривой массив — первый элемент может быть массивом
    // Распрямляем всё в плоский список объектов
    function flattenCandidates(raw) {
        const result = [];
        if (!Array.isArray(raw)) return result;
        for (const item of raw) {
            if (Array.isArray(item)) {
                // вложенный массив — раскрываем
                for (const sub of item) {
                    if (sub && typeof sub === 'object' && !Array.isArray(sub)) {
                        result.push(sub);
                    }
                }
            } else if (item && typeof item === 'object') {
                result.push(item);
            }
        }
        return result;
    }

    function renderTable(rows, cols) {
        if (!rows.length) return '<p style="color:#888;">Нет записей</p>';
        let html = '<div style="overflow-x:auto;"><table><thead><tr>';
        cols.forEach(function(c) { html += '<th>' + c.label + '</th>'; });
        html += '</tr></thead><tbody>';
        rows.forEach(function(r) {
            html += '<tr>' + cols.map(function(c) {
                return '<td>' + (r[c.key] !== undefined && r[c.key] !== null ? r[c.key] : '—') + '</td>';
            }).join('') + '</tr>';
        });
        return html + '</tbody></table></div>';
    }

    async function runCheck() {
        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Загружаю данные...';
        document.getElementById('logSection').style.display = 'block';
        document.getElementById('log').textContent = '';
        document.getElementById('results').style.display = 'none';

        // Загружаем все источники
        const [allForms, manualForms, autoForms, rawCandidates] = await Promise.all([
            safeFetch('/.netlify/functions/getAllForms',    'getAllForms'),
            safeFetch('/.netlify/functions/getManualForms','getManualForms'),
            safeFetch('/.netlify/functions/getResults',    'getResults (autoForms)'),
            safeFetch('/.netlify/functions/getCandidates', 'getCandidates'),
        ]);

        // Распрямляем кандидатов
        const candidates = flattenCandidates(rawCandidates);
        log('Кандидатов после распрямления: ' + candidates.length);

        // Строим Set из id кандидатов
        const contactIdSet = new Set(
            candidates.map(function(c) { return String(c.id || ''); }).filter(Boolean)
        );
        log('Уникальных ID в Базе контактов: ' + contactIdSet.size);

        // Объединяем все анкеты, дедупликация по code/id
        const seen = new Set();
        const forms = [];

        function addForms(arr, source) {
            if (!Array.isArray(arr)) return;
            for (const f of arr) {
                const formId = String(f.code || f.id || '');
                if (!formId || seen.has(formId)) continue;
                seen.add(formId);

                // Достаём поля — они могут быть в formData или на верхнем уровне
                const fd = f.formData || {};
                forms.push({
                    formId:      formId,
                    contactId:   f.contactId || fd.candidateId || '—',
                    source:      source,
                    fullName:    fd.fullName  || f.fullName  || '—',
                    phone:       fd.phone     || f.phone     || '—',
                    project:     fd.project   || f.project   || '—',
                    recruiter:   f.recruiter  || fd.recruiter || '—',
                    status:      f.recruitmentStatus || f.status || '—',
                    createdAt:   f.createdAt  ? new Date(f.createdAt).toLocaleString() : '—',
                });
            }
        }

        addForms(allForms,    'allForms');
        addForms(autoForms,   'autoForms');
        addForms(manualForms, 'manualForms');

        log('Уникальных анкет: ' + forms.length);

        // Сравниваем contactId анкеты с id кандидата
        const missing = [];  // contactId не найден в базе контактов
        const matched = [];  // contactId найден

        for (const f of forms) {
            const cid = f.contactId;
            if (cid && cid !== '—' && contactIdSet.has(cid)) {
                matched.push(f);
            } else {
                missing.push(f);
            }
        }

        log('\nРезультат:');
        log('  Анкет БЕЗ пары в контактах: ' + missing.length);
        log('  Анкет С парой в контактах:  ' + matched.length);

        const cols = [
            { label: 'ID анкеты',   key: 'formId' },
            { label: 'contactId',   key: 'contactId' },
            { label: 'Источник',    key: 'source' },
            { label: 'ФИО',         key: 'fullName' },
            { label: 'Телефон',     key: 'phone' },
            { label: 'Проект',      key: 'project' },
            { label: 'Рекрутер',    key: 'recruiter' },
            { label: 'Статус',      key: 'status' },
            { label: 'Дата',        key: 'createdAt' },
        ];

        document.getElementById('results').style.display = 'block';
        document.getElementById('results').innerHTML =
            '<div class="section">' +
            '<h3>Итог</h3>' +
            '<p>Всего анкет: <strong class="info">' + forms.length + '</strong></p>' +
            '<p>Записей в Базе контактов: <strong class="info">' + candidates.length + '</strong></p>' +
            '<p>Анкеты <strong>БЕЗ</strong> пары в контактах: <span class="badge ' +
                (missing.length > 0 ? 'badge-red' : 'badge-green') + '">' + missing.length + '</span></p>' +
            '<p>Анкеты <strong>С</strong> парой в контактах: <span class="badge badge-blue">' + matched.length + '</span></p>' +
            '</div>' +

            '<div class="section">' +
            '<h3>Анкеты <span class="warn">БЕЗ</span> совпадения в Базе контактов ' +
            '<span class="badge badge-red">' + missing.length + '</span></h3>' +
            renderTable(missing, cols) +
            '</div>' +

            '<div class="section">' +
            '<h3>Анкеты <span class="ok">С</span> совпадением в Базе контактов ' +
            '<span class="badge badge-blue">' + matched.length + '</span></h3>' +
            renderTable(matched, cols) +
            '</div>';

        btn.disabled = false;
        btn.textContent = '🔄 Повторить проверку';
    }
</script>
</body>
</html>
