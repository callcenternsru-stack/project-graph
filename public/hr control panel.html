<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель рекрутинга</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ===== СТИЛИ ПОЛНОСТЬЮ СОХРАНЕНЫ ===== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000000;
            margin: 0;
            padding: 20px 20px 20px 60px;
            min-height: 100vh;
            color: #ffffff;
        }
        body.menu-open::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            pointer-events: none;
        }
        .side-menu-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 100vh;
            background: transparent;
            z-index: 1001;
        }
        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #111111;
            border-right: 2px solid #ffd700;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            transition: left 0.3s ease;
            z-index: 1002;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .side-menu-trigger:hover + .side-menu,
        .side-menu:hover {
            left: 0;
        }
        .side-menu .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: transparent;
            border: none;
            border-left: 4px solid transparent;
            color: #ffd700;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        .side-menu .menu-btn:hover {
            background: #1a1a1a;
            border-left-color: #ffd700;
        }
        .side-menu .menu-btn.active {
            background: #1a1a1a;
            border-left-color: #ffd700;
            font-weight: 600;
        }
        .admin-container {
            max-width: 1800px;
            margin: 0 auto;
        }
        .header {
            background: #111111;
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
        }
        .content-card {
            background: #111111;
            border-radius: 24px;
            padding: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            color: #ffd700;
            font-size: 20px;
            font-weight: 600;
        }
        .add-btn {
            padding: 10px 20px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }
        .add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #333333;
            background: #1a1a1a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        th {
            background: #000000;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #ffd700;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.2s;
        }
        th:hover {
            background: #1a1a1a;
        }
        th.sorted-asc::after {
            content: " ▲";
            font-size: 12px;
            margin-left: 5px;
        }
        th.sorted-desc::after {
            content: " ▼";
            font-size: 12px;
            margin-left: 5px;
        }
        td {
            padding: 12px 15px;
            color: #cccccc;
            border-bottom: 1px solid #333333;
        }
        tr:hover td {
            background: #222222;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .edit-btn, .delete-btn, .import-btn, .download-btn, .delete-form-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
        }
        .edit-btn {
            background: #6b8cff;
            color: white;
        }
        .edit-btn:hover {
            background: #8aa5ff;
        }
        .delete-btn, .delete-form-btn {
            background: #ff6b6b;
            color: white;
        }
        .delete-btn:hover, .delete-form-btn:hover {
            background: #ff8a8a;
        }
        .import-btn {
            background: #4caf50;
            color: white;
        }
        .import-btn:hover {
            background: #66bb6a;
        }
        .download-btn {
            background: #ffd700;
            color: #000;
        }
        .download-btn:hover {
            background: #ffe44d;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            width: 1000px;
            max-width: calc(100vw - 40px);
            z-index: 10000;
            display: none;
            border: 2px solid #ffd700;
            overflow: hidden;
        }
        .modal.show {
            display: block;
            animation: modalAppear 0.3s ease;
        }
        @keyframes modalAppear {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 2px solid #ffd700;
            font-weight: 600;
            color: #ffd700;
            font-size: 18px;
            background: #000000;
            display: flex;
            align-items: center;
        }
        .modal-header .modal-close {
            margin-left: auto;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
            transition: opacity 0.2s;
            color: #ffd700;
            background: none;
            border: none;
            padding: 5px;
        }
        .modal-header .modal-close:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .modal-content {
            padding: 25px;
            background: #111111;
        }
        .modal-content .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .modal-content .form-group {
            flex: 1 1 calc(33.333% - 20px);
            min-width: 200px;
        }
        .modal-content label {
            display: block;
            color: #ffd700;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s;
        }
        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #222222;
        }
        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 10px;
            min-width: 36px;
            transition: all 0.2s;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover {
            background: #222;
            border-color: #ffd700;
        }
        .toolbar .font-size-group {
            display: flex;
            gap: 4px;
        }
        .toolbar .font-size-group button {
            padding: 6px 8px;
            font-size: 12px;
        }
        .password-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .password-container input {
            flex: 1;
            min-width: 0;
        }
        .password-container button {
            width: auto;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .password-container button:hover {
            background: #222222;
            border-color: #ffd700;
        }
        .modal-content .save-btn {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .modal-content .save-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #111111;
            border: 2px solid #ffd700;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            z-index: 20000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 300px;
            animation: slideIn 0.3s ease;
        }
        .notification.success {
            border-color: #4caf50;
        }
        .notification.error {
            border-color: #ff6b6b;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .schedule-wrapper {
            background: #111111;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            margin-bottom: 30px;
            width: 100%;
            border: 1px solid #333333;
            max-height: 500px;
            overflow: auto;
        }
        .schedule-wrapper::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .schedule-wrapper::-webkit-scrollbar-track {
            background: #000000;
        }
        .schedule-wrapper::-webkit-scrollbar-thumb {
            background: #333333;
            border: 2px solid #000000;
            border-radius: 6px;
        }
        .schedule-wrapper::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
        .headers-container {
            display: flex;
            background: #000000;
            border-bottom: 2px solid #333333;
            position: sticky;
            top: 0;
            z-index: 100;
            min-width: min-content;
        }
        .fixed-headers {
            display: flex;
            flex: 0 0 auto;
            background: #000000;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 101;
        }
        .fixed-header-cell {
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
        }
        .fixed-header-cell:first-child {
            width: 280px;
            text-align: left;
            padding-left: 20px;
            justify-content: flex-start;
        }
        .scrollable-headers {
            display: flex;
            flex: 1;
        }
        .scrollable-header-cell {
            flex: 0 0 100px;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffd700;
        }
        .day-week {
            font-size: 11px;
            color: #8f9bb3;
            font-weight: normal;
            margin-top: 2px;
        }
        .rows-container {
            min-width: min-content;
        }
        .data-row {
            display: flex;
            border-bottom: 1px solid #333333;
            min-height: 50px;
        }
        .data-row:hover {
            background: #1a1a1a;
        }
        .fixed-cells {
            display: flex;
            flex: 0 0 auto;
            background: #111111;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 90;
        }
        .fixed-cell {
            padding: 10px;
            border-right: 1px solid #333333;
            display: flex;
            align-items: center;
            background: #111111;
            color: #cccccc;
            white-space: nowrap;
        }
        .fixed-cell:first-child {
            width: 280px;
            font-weight: 600;
            color: #ffd700;
            padding-left: 20px;
        }
        .scrollable-cells {
            display: flex;
            flex: 1;
        }
        .scrollable-cell {
            flex: 0 0 100px;
            padding: 6px;
            border-right: 1px solid #333333;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .time-input {
            width: 100%;
            padding: 6px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .time-input:focus {
            outline: none;
            border-color: #ffd700;
            background: #222;
        }
        .time-input.filled {
            border-color: #ffd700;
            color: #ffd700;
        }
        .graph-title {
            color: #ffd700;
            font-size: 20px;
            margin: 30px 0 15px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }
        .month-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .month-selector select {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 14px;
            min-width: 200px;
        }
        .month-selector select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .readonly-text {
            color: #ffd700;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .loader {
            text-align: center;
            padding: 40px;
            color: #ffd700;
            font-size: 18px;
        }

        /* NEW: Стили для модального окна деталей кандидата */
        .file-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        .file-list li {
            margin-bottom: 8px;
        }
        .file-list a {
            color: #000;
            background: #ffd700;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            border: 1px solid #ccb000;
            transition: background 0.2s;
            display: inline-block;
        }
        .file-list a:hover {
            background: #ffe44d;
        }
        .status-select {
            background: #1a1a1a;
            color: #ffd700;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            width: 180px;
        }
        .status-select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .task-info {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-left: 4px solid #ffd700;
            border-radius: 4px;
            color: #ccc;
        }
        .task-info strong {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="side-menu-trigger"></div>
    <div class="side-menu">
        <button class="menu-btn" data-tab="recruiters" onclick="switchTab('recruiters')">Рекрутеры</button>
        <button class="menu-btn" data-tab="candidates" onclick="switchTab('candidates')">База контактов</button>
        <button class="menu-btn" data-tab="scripts" onclick="switchTab('scripts')">Скрипты</button>
        <button class="menu-btn" data-tab="schedule" onclick="switchTab('schedule')">График</button>
        <!-- Удалена кнопка "Все анкеты" -->
        <button class="menu-btn" data-tab="candidatesAll" onclick="switchTab('candidatesAll')">Анкеты</button>
        <button class="menu-btn" data-tab="characteristics" onclick="switchTab('characteristics')">Характеристики</button>
    </div>

    <div class="admin-container">
        <div class="header">
            <h1>Администрирование рекрутинга</h1>
        </div>
        <div class="content-card" id="contentArea"></div>
    </div>

    <!-- Модальные окна -->
    <div id="addMonthModal" class="modal">
        <div class="modal-header">
            <span>Добавить месяц в график</span>
            <button class="modal-close" onclick="closeAddMonthModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Выберите месяц:</label>
                <input type="month" id="addMonthInput">
            </div>
            <button class="save-btn" onclick="addScheduleMonth()">Добавить</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-header">
            <span id="modalTitle">Добавить</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <div id="commentModal" class="modal">
        <div class="modal-header">
            <span id="commentModalTitle">Ссылка на группу</span>
            <button class="modal-close" onclick="closeCommentModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Проект:</label>
                <div id="commentProject" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Дата:</label>
                <div id="commentDate" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Тип:</label>
                <div id="commentType" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Время:</label>
                <div id="commentTime" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Ссылка на группу:</label>
                <input type="text" id="commentLink" placeholder="https://t.me/...">
            </div>
            <button class="save-btn" onclick="saveComment()">Сохранить</button>
        </div>
    </div>

    <div id="characteristicModal" class="modal">
        <div class="modal-header">
            <span>Характеристики проекта</span>
            <button class="modal-close" onclick="closeCharacteristicModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-row">
                <div class="form-group" style="flex: 1 1 100%;">
                    <label>Проект</label>
                    <select id="charProjectSelect">
                        <option value="">— выберите проект —</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Операционная система</label>
                    <select id="charOsSelect">
                        <option value="">— выберите —</option>
                        <option value="Windows 10">Windows 10</option>
                        <option value="Windows 10 Pro">Windows 10 Pro</option>
                        <option value="Windows 11">Windows 11</option>
                        <option value="Windows 11 Pro">Windows 11 Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Тип подключения</label>
                    <select id="charConnectionSelect">
                        <option value="">— выберите —</option>
                        <option value="Wi-Fi">Wi-Fi</option>
                        <option value="LAN">LAN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Скорость интернета</label>
                    <select id="charInternetSpeedSelect">
                        <option value="">— выберите —</option>
                        <option value="20 Мбит/с">20 Мбит/с</option>
                        <option value="40 Мбит/с">40 Мбит/с</option>
                        <option value="60 Мбит/с">60 Мбит/с</option>
                        <option value="80 Мбит/с">80 Мбит/с</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Оперативная память (RAM)</label>
                    <select id="charRamSelect">
                        <option value="">— выберите —</option>
                        <option value="2 ГБ">2 ГБ</option>
                        <option value="4 ГБ">4 ГБ</option>
                        <option value="8 ГБ">8 ГБ</option>
                        <option value="16 ГБ">16 ГБ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Кол-во ядер</label>
                    <select id="charCoresSelect">
                        <option value="">— выберите —</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="6">6</option>
                        <option value="8">8</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Частота процессора (ГГц)</label>
                    <select id="charCpuFreqSelect">
                        <option value="">— выберите —</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
            </div>

    <script>
        // ========== СОСТОЯНИЕ ==========

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        // ========== ЗАГРУЗКА ДАННЫХ С СЕРВЕРА ==========
        async function loadCharacteristics() {
            try {
                const res = await fetch('/.netlify/functions/getCharacteristics');
                if (res.ok) {
                    state.characteristics = await res.json();
                } else {
                    console.error('Failed to load characteristics');
                }
            } catch (error) {
                console.error('Error loading characteristics:', error);
            }
        }

        async function saveCharacteristicsToServer() {
            try {
                const res = await fetch('/.netlify/functions/saveCharacteristics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state.characteristics)
                });
                if (!res.ok) {
                    showNotification('Ошибка сохранения характеристик', 'error');
                }
            } catch (error) {
                console.error('Error saving characteristics:', error);
                showNotification('Ошибка сети при сохранении', 'error');
            }
        }

        async function loadAllData() {
            try {
                const refRes = await fetch('/.netlify/functions/getAllReferences');
                const refData = await refRes.json();
                state.recruiters = refData.recruiters || [];
                state.callResults = refData.callResults || [];
                state.contactTypes = refData.contactTypes || [];
                state.projects = refData.projects || [];
                state.scripts = refData.scripts || [];

                const [
                    candidatesRes,
                    meetingsRes,
                    trainingsRes,
                    meetingCommentsRes,
                    trainingCommentsRes,
                    monthsRes,
                    manualFormsRes,
                    allFormsRes,
                    allCandidatesRes
                ] = await Promise.all([
                    fetch('/.netlify/functions/getCandidates'),
                    fetch('/.netlify/functions/getProjectMeetings'),
                    fetch('/.netlify/functions/getProjectTrainings'),
                    fetch('/.netlify/functions/getProjectMeetingComments'),
                    fetch('/.netlify/functions/getProjectTrainingComments'),
                    fetch('/.netlify/functions/getScheduleMonths'),
                    fetch('/.netlify/functions/getManualForms'),
                    fetch('/.netlify/functions/getAllForms'),
                    fetch('/.netlify/functions/getAllCandidates')
                ]);

                state.candidates = await candidatesRes.json();
                state.projectMeetings = await meetingsRes.json();
                state.projectTrainings = await trainingsRes.json();
                state.projectMeetingComments = await meetingCommentsRes.json();
                state.projectTrainingComments = await trainingCommentsRes.json();
                state.scheduleMonths = await monthsRes.json();
                state.manualForms = await manualFormsRes.json();
                state.allForms = await allFormsRes.json();
                state.allCandidates = await allCandidatesRes.json();

                const autoRes = await fetch('/.netlify/functions/getResults');
                state.autoForms = await autoRes.json();

                await loadCharacteristics();

                updateMenuCounts();
                candidatesPage = 1;
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showNotification('Не удалось загрузить данные', 'error');
            }
        }

        // ========== ОБНОВЛЕНИЕ СЧЕТЧИКОВ НА КНОПКАХ МЕНЮ ==========
        function updateMenuCounts() {
            document.querySelectorAll('.side-menu .menu-btn').forEach(btn => {
                const tab = btn.dataset.tab;
                if (!tab) return;
                let count = 0;
                switch (tab) {
                    case 'recruiters': count = state.recruiters.length; break;
                    case 'candidates': count = state.candidates.length; break;
                    case 'scripts': count = state.scripts.length; break;
                    case 'schedule': count = 0; break;
                    case 'candidatesAll': count = state.allCandidates.length; break;
                    case 'characteristics': count = state.characteristics.length; break;
                }
                let baseText = btn.innerText.replace(/\s*\(\d+\)$/, '');
                if (count > 0) {
                    btn.innerText = `${baseText} (${count})`;
                } else {
                    btn.innerText = baseText;
                }
            });
        }

        // ========== УДАЛЕНИЕ АНКЕТ ==========
        async function deleteAutoForm(code) {
            if (!confirm('Удалить автоматическую анкету?')) return;
            try {
                const res = await fetch(`/.netlify/functions/deleteAutoForm?code=${encodeURIComponent(code)}`, { method: 'DELETE' });
                if (res.ok) {
                    state.allForms = state.allForms.filter(f => f.code !== code);
                    const autoRes = await fetch('/.netlify/functions/getResults');
                    state.autoForms = await autoRes.json();
                    state.allCandidates = state.allCandidates.filter(c => !(c.id === code && c.type === 'auto'));
                    renderContent();
                    updateMenuCounts();
                    showNotification('Анкета удалена', 'success');
                } else {
                    showNotification('Ошибка удаления', 'error');
                }
            } catch (e) {
                showNotification('Ошибка сети', 'error');
            }
        }

        async function deleteManualForm(id) {
            if (!confirm('Удалить ручную анкету?')) return;
            try {
                const res = await fetch(`/.netlify/functions/deleteManualForm?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (res.ok) {
                    state.manualForms = state.manualForms.filter(f => f.id !== id);
                    state.allCandidates = state.allCandidates.filter(c => !(c.id === id && c.type === 'manual'));
                    renderContent();
                    updateMenuCounts();
                    showNotification('Анкета удалена', 'success');
                } else {
                    showNotification('Ошибка удаления', 'error');
                }
            } catch (e) {
                showNotification('Ошибка сети', 'error');
            }

        function showCandidateDetails(id, type) {
            const candidate = state.allCandidates.find(c => c.id === id && c.type === type);
            if (!candidate) return;

            console.log('Candidate details:', candidate); // для отладки

            const content = document.getElementById('candidateDetailsContent');
            let filesHtml = '';

            if (type === 'auto' && candidate.status === 'completed') {
                filesHtml = `
                    <h3>Файлы автоматической проверки</h3>
                    <ul class="file-list">
                        <li><a href="${candidate.files.report}" target="_blank">report.txt</a></li>
                        <li><a href="${candidate.files.results}" target="_blank">results.json</a></li>
                        <li><a href="${candidate.files.voice}" target="_blank">voice_recording.wav</a></li>
                    </ul>
                `;
            } else if (type === 'manual' && candidate.files && Object.keys(candidate.files).length > 0) {
                filesHtml = '<h3>Загруженные файлы</h3><ul class="file-list">';
                const taskFiles = {};
                for (const [key, url] of Object.entries(candidate.files)) {
                    const match = key.match(/^task_(\d+)$/);
                    if (match) {
                        const taskNum = parseInt(match[1]) + 1;
                        // Надёжное извлечение имени файла из URL
                        let filename = '';
                        try {
                            const urlObj = new URL(url, window.location.origin);
                            filename = decodeURIComponent(urlObj.searchParams.get('file') || '');
                        } catch (e) {
                            // fallback для старых форматов
                            const fileParam = url.split('&file=')[1]?.split('&')[0] || '';
                            filename = decodeURIComponent(fileParam);
                        }
                        taskFiles[taskNum] = { url, filename };
                    }
                }
                for (let i = 1; i <= 7; i++) {
                    if (taskFiles[i]) {
                        filesHtml += `<li><strong>Задание ${i}:</strong> <a href="${taskFiles[i].url}" target="_blank">${taskFiles[i].filename}</a></li>`;
                    }
                }
                // AnyDesk (задание 5)
                if (candidate.taskInputs && candidate.taskInputs['task_4_input']) {
                    filesHtml += `<li><strong>AnyDesk (задание 5):</strong> ${candidate.taskInputs['task_4_input']}</li>`;
                }
                // Процент правильных ответов (задание 3)
                if (candidate.taskScores && candidate.taskScores['task_2_score']) {
                    try {
                        const score = typeof candidate.taskScores['task_2_score'] === 'string'
                            ? JSON.parse(candidate.taskScores['task_2_score'])
                            : candidate.taskScores['task_2_score'];
                        filesHtml += `<li><strong>Тест (задание 3):</strong> ${score.correct} из ${score.total} (${score.percentage}%)</li>`;
                    } catch (e) {
                        console.error('Error parsing task score', e);
                        filesHtml += `<li><strong>Тест (задание 3):</strong> ${candidate.taskScores['task_2_score']} (ошибка парсинга)</li>`;
                    }
                } else {
                    console.log('task_2_score отсутствует в данных кандидата');
                }
                filesHtml += '</ul>';
            } else {
                filesHtml = '<p>Файлы отсутствуют или проверка ещё не завершена.</p>';
            }

            content.innerHTML = `
                <p><strong>ФИО:</strong> ${candidate.fullName}</p>
                <p><strong>Проект:</strong> ${candidate.project}</p>
                <p><strong>Тип проверки:</strong> ${candidate.type === 'auto' ? 'Автоматическая' : 'Ручная'}</p>
                <p><strong>Дата создания:</strong> ${new Date(candidate.createdAt).toLocaleString()}</p>
                ${filesHtml}
            `;

            document.getElementById('candidateDetailsModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function closeCandidateDetails() {
            document.getElementById('candidateDetailsModal').classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        async function updateCandidateStatus(id, type, newStatus) {
            try {
                const response = await fetch('/.netlify/functions/updateCandidateStatus', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, type, recruitmentStatus: newStatus })
                });
                if (response.ok) {
                    const candidate = state.allCandidates.find(c => c.id === id && c.type === type);
                    if (candidate) candidate.recruitmentStatus = newStatus;
                    showNotification('Статус обновлён', 'success');
                } else {
                    showNotification('Ошибка обновления статуса', 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadAllData();
            if (!scheduleOnly) {
                switchTab('recruiters');
            }
        });
    </script>
</body>
</html>
