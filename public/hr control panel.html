<body>
    <div class="side-menu-trigger"></div>
    <div class="side-menu">
        <button class="menu-btn" onclick="switchTab('recruiters')">Рекрутеры</button>
        <button class="menu-btn" onclick="switchTab('candidates')">База контактов</button>
        <button class="menu-btn" onclick="switchTab('scripts')">Скрипты</button>
        <button class="menu-btn" onclick="switchTab('schedule')">График</button>
        <button class="menu-btn" onclick="switchTab('allForms')">Все анкеты</button>
        <button class="menu-btn" onclick="switchTab('auto')">Анкеты авто</button>
        <button class="menu-btn" onclick="switchTab('manual')">Анкеты ручные</button>

        <button class="menu-btn" onclick="switchTab('characteristics')">Характеристики</button>
    </div>

    <div class="admin-container">
        <div class="header">
            <h1>Администрирование рекрутинга</h1>
        </div>

        <div class="content-card" id="contentArea"></div>
    </div>

    <!-- Модальное окно для добавления месяца (без выбора проекта) -->
    <div id="addMonthModal" class="modal">
        <div class="modal-header">
            <span>Добавить месяц в график</span>
            <button class="modal-close" onclick="closeAddMonthModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Выберите месяц:</label>
                <input type="month" id="addMonthInput">
            </div>
            <button class="save-btn" onclick="addScheduleMonth()">Добавить</button>
        </div>
    </div>

    <!-- Модальное окно для редактирования (из предыдущих частей) -->
    <div id="editModal" class="modal">
        <div class="modal-header">
            <span id="modalTitle">Добавить</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Модальное окно для ввода/просмотра ссылки на группу -->
    <div id="commentModal" class="modal">
        <div class="modal-header">
            <span id="commentModalTitle">Ссылка на группу</span>
            <button class="modal-close" onclick="closeCommentModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Проект:</label>
                <div id="commentProject" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Дата:</label>
                <div id="commentDate" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Тип:</label>
                <div id="commentType" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Время:</label>
                <div id="commentTime" style="color:#ffd700; margin-bottom:10px;"></div>
            </div>
            <div class="form-group">
                <label>Ссылка на группу:</label>
                <input type="text" id="commentLink" placeholder="https://t.me/...">
            </div>
            <button class="save-btn" onclick="saveComment()">Сохранить</button>
        </div>
    </div>

    <!-- Новое модальное окно для добавления характеристики (увеличенное, с горизонтальным расположением) -->

        <div class="modal-header">
            <span>Добавить характеристику для проекта</span>
            <button class="modal-close" onclick="closeCharacteristicModal()">✕</button>
        </div>
        <div class="modal-content">
            <div class="form-row">
                <div class="form-group">
                    <label>Проект</label>
                    <select id="charProjectSelect">
                        <option value="">— выберите проект —</option>
                    </select>
                </div>

                    <label>Параметр</label>
                    <select id="charParamSelect" onchange="updateCharValueOptions()">
                        <option value="">— выберите параметр —</option>
                        <option value="os">Операционная система</option>
                        <option value="connectionType">Тип подключения</option>
                        <option value="internetSpeed">Скорость интернета</option>
                        <option value="ram">Оперативная память (RAM)</option>
                        <option value="cores">Кол-во ядер</option>
                        <option value="cpuFreq">частота процессора МБ/сек</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Значение</label>
                    <select id="charValueSelect">
                        <option value="">— выберите значение —</option>
                    </select>
                </div>
            </div>

        </div>

    <!-- Скрытый input для загрузки Excel -->
    <input type="file" id="excelUpload" accept=".xlsx,.xls,.csv" style="display: none;">

    <script>
        // ========== СОСТОЯНИЕ ПРИЛОЖЕНИЯ (ВСЁ С СЕРВЕРА) ==========
        let state = {
            recruiters: [],
            callResults: [],
            contactTypes: [],
            projects: [],
            candidates: [],
            scripts: [],
            projectMeetings: {},
            projectTrainings: {},
            projectMeetingComments: {},
            projectTrainingComments: {},
            scheduleMonths: [],
            autoForms: [],
            manualForms: [],
            allForms: [],
            characteristics: [] // новое поле для характеристик
        };

        // Фиксированные параметры и их возможные значения
        const parameterOptions = {
            os: {
                label: "Операционная система",
                values: ["Windows 10", "Windows 10 Pro", "Windows 11", "Windows 11 Pro"]
            },
            connectionType: {
                label: "Тип подключения",
                values: ["Wi-Fi", "LAN"]
            },
            internetSpeed: {
                label: "Скорость интернета",
                values: ["20 Мбит/с", "40 Мбит/с", "60 Мбит/с", "80 Мбит/с"]
            },
            ram: {
                label: "Оперативная память (RAM)",
                values: ["2 ГБ", "4 ГБ", "8 ГБ", "16 ГБ"]
            },
            cores: {
                label: "Кол-во ядер",
                values: ["2", "4", "6", "8"]
            },
            cpuFreq: {
                label: "частота процессора МБ/сек",
                values: ["2", "3", "4"]
            }
        };

        let currentTab = 'recruiters';
        let editingId = null;
        let editingType = null;
        let currentRecruiterForImport = null;
        let currentScheduleMonth = new Date().toISOString().slice(0, 7);
        let currentCommentContext = null;
        let candidatesSortColumn = 0;
        let candidatesSortDirection = 'desc';

        // Проверяем URL-параметр tab=schedule-only
        const urlParams = new URLSearchParams(window.location.search);
        const scheduleOnly = urlParams.get('tab') === 'schedule-only';

        if (scheduleOnly) {
            document.addEventListener('DOMContentLoaded', function() {

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');

            setTimeout(() => notif.remove(), 5000);

        // ========== ЗАГРУЗКА ВСЕХ ДАННЫХ С СЕРВЕРА ==========
        async function loadAllData() {
            try {
                const [
                    recruitersRes,
                    callResultsRes,
                    contactTypesRes,
                    projectsRes,
                    candidatesRes,
                    scriptsRes,
                    meetingsRes,
                    trainingsRes,
                    meetingCommentsRes,
                    trainingCommentsRes,
                    monthsRes,
                    manualFormsRes,
                    allFormsRes
                ] = await Promise.all([
                    fetch('/.netlify/functions/getRecruiters'),
                    fetch('/.netlify/functions/getCallResults'),
                    fetch('/.netlify/functions/getContactTypes'),
                    fetch('/.netlify/functions/getProjects'),
                    fetch('/.netlify/functions/getCandidates'),
                    fetch('/.netlify/functions/getScripts'),
                    fetch('/.netlify/functions/getProjectMeetings'),
                    fetch('/.netlify/functions/getProjectTrainings'),
                    fetch('/.netlify/functions/getProjectMeetingComments'),
                    fetch('/.netlify/functions/getProjectTrainingComments'),
                    fetch('/.netlify/functions/getScheduleMonths'),
                    fetch('/.netlify/functions/getManualForms'),
                    fetch('/.netlify/functions/getAllForms')
                ]);

                state.recruiters = await recruitersRes.json();
                state.callResults = await callResultsRes.json();
                state.contactTypes = await contactTypesRes.json();
                state.projects = await projectsRes.json();
                state.candidates = await candidatesRes.json();
                state.scripts = await scriptsRes.json();
                state.projectMeetings = await meetingsRes.json();
                state.projectTrainings = await trainingsRes.json();
                state.projectMeetingComments = await meetingCommentsRes.json();
                state.projectTrainingComments = await trainingCommentsRes.json();
                state.scheduleMonths = await monthsRes.json();
                state.manualForms = await manualFormsRes.json();
                state.allForms = await allFormsRes.json();

                // Автоанкеты загружаются отдельно (они могут быть большими)
                const autoRes = await fetch('/.netlify/functions/getResults');
                state.autoForms = await autoRes.json();

                // Здесь можно загрузить характеристики, если есть серверная функция
                // пока оставим пустым или загрузим из localStorage для демо
                const savedChars = localStorage.getItem('characteristics');
                if (savedChars) {
                    state.characteristics = JSON.parse(savedChars);
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showNotification('Не удалось загрузить данные', 'error');
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabId) {
            if (scheduleOnly) return;
            currentTab = tabId;
            document.querySelectorAll('.side-menu .menu-btn').forEach(btn => btn.classList.remove('active'));
            // обновим индексы для кнопок (добавили characteristics)
            const index = ['recruiters', 'candidates', 'scripts', 'schedule', 'allForms', 'auto', 'manual', 'characteristics'].indexOf(tabId);
            if (index !== -1) {
                document.querySelectorAll('.side-menu .menu-btn')[index].classList.add('active');
            }
            renderContent();
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            if (currentTab === 'recruiters') {
                renderRecruiters(area);
            } else if (currentTab === 'candidates') {
                renderCandidates(area);
            } else if (currentTab === 'scripts') {
                renderScripts(area);
            } else if (currentTab === 'schedule') {
                renderSchedulePage(area);
            } else if (currentTab === 'allForms') {
                renderAllForms(area);
            } else if (currentTab === 'auto') {
                renderAutoForms(area);
            } else if (currentTab === 'manual') {
                renderManualForms(area);
            } else if (currentTab === 'characteristics') {

        function sortCandidates(columnIndex) {
            if (candidatesSortColumn === columnIndex) {
                candidatesSortDirection = candidatesSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                candidatesSortColumn = columnIndex;
                candidatesSortDirection = 'asc';
            }
            renderContent();
        }

        function sortCandidatesData(candidates) {
            const fields = [
                'createdAt',
                'fullName',
                'phone',
                'project',
                'country',
                'trainingDate',
                'meetingTime',
                'callResult',
                'contactType',
                'recruiter',
                'comment'
            ];
            const field = fields[candidatesSortColumn];
            const direction = candidatesSortDirection === 'asc' ? 1 : -1;

            return candidates.sort((a, b) => {
                let valA = a[field];
                let valB = b[field];

                if (field === 'createdAt') {
                    valA = new Date(valA || 0).getTime();
                    valB = new Date(valB || 0).getTime();
                } else {
                    valA = valA || '';
                    valB = valB || '';
                }

                if (valA < valB) return -direction;
                if (valA > valB) return direction;
                return 0;
            });
        }

        // ========== ГРАФИК (без изменений) ==========
        function renderSchedulePage(container) {
            let allMonths = [...state.scheduleMonths];
            if (!allMonths.includes(currentScheduleMonth)) {
                allMonths.push(currentScheduleMonth);
            }
            allMonths.sort().reverse();

            const monthOptions = allMonths.map(m => `<option value="${m}" ${m === currentScheduleMonth ? 'selected' : ''}>${formatMonth(m)}</option>`).join('');

            const html = `
                <div class="month-selector">
                    <label style="color:#ffd700;">Месяц:</label>
                    <select id="scheduleMonthSelect" onchange="changeScheduleMonth(this.value)">
                        ${monthOptions}
                    </select>
                    <button class="add-btn" onclick="openAddMonthModal()">➕ Добавить месяц</button>
                </div>
                ${renderEventGraph('meeting', 'Организационные встречи')}
                ${renderEventGraph('training', 'Обучения')}
            `;
            container.innerHTML = html;
        }

        function renderEventGraph(type, title) {
            const projects = state.scripts.map(s => s.title).filter(p => p);
            if (projects.length === 0) {
                return `<h3 class="graph-title">${title}</h3><div style="color: #8f9bb3; padding: 20px; text-align: center;">Нет проектов (скриптов) для отображения</div>`;
            }

            const [year, month] = currentScheduleMonth.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const weekDays = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];

            function getDayOfWeek(day) {
                const date = new Date(year, month - 1, day);
                return weekDays[date.getDay()];
            }

            function formatDateHeader(day) {
                return `${getDayOfWeek(day)}/${String(day).padStart(2, '0')}.${String(month).padStart(2, '0')}`;
            }

            let html = `<h3 class="graph-title">${title}</h3>`;
            html += '<div class="schedule-wrapper">';

            html += '<div class="headers-container">';
            html += '<div class="fixed-headers">';
            html += '<div class="fixed-header-cell">Проект</div>';
            html += '</div>';
            html += '<div class="scrollable-headers">';
            for (let day = 1; day <= daysInMonth; day++) {
                const header = formatDateHeader(day);
                const [dayWeek, dateStr] = header.split('/');
                html += `<div class="scrollable-header-cell">${dateStr}<span class="day-week">${dayWeek}</span></div>`;
            }
            html += '</div></div>';

            html += '<div class="rows-container">';
            projects.forEach(project => {
                html += '<div class="data-row">';
                html += '<div class="fixed-cells">';
                html += `<div class="fixed-cell">${project}</div>`;
                html += '</div>';

                html += '<div class="scrollable-cells">';
                for (let day = 1; day <= daysInMonth; day++) {
                    const key = `${project}_${currentScheduleMonth}_${day}`;
                    const timeValue = type === 'meeting' ? (state.projectMeetings[key] || '') : (state.projectTrainings[key] || '');
                    const filledClass = timeValue ? 'filled' : '';
                    html += `<div class="scrollable-cell">`;
                    html += `<input type="text" class="time-input ${filledClass}" value="${timeValue}" placeholder="чч:мм-чч:мм" data-type="${type}" data-project="${project}" data-month="${currentScheduleMonth}" data-day="${day}" onchange="handleTimeChange(this)" onclick="openCommentModalFromClick(this)" oninput="this.classList.toggle('filled', this.value.length > 0)">`;
                    html += `</div>`;
                }
                html += '</div></div>';
            });
            html += '</div></div>';

            return html;
        }

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ХАРАКТЕРИСТИКАМИ ==========
        function updateCharProjectSelect() {
            const select = document.getElementById('charProjectSelect');
            if (!select) return;
            const projects = state.scripts.map(s => s.title).filter(p => p);
            select.innerHTML = '<option value="">— выберите проект —</option>' +
                projects.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function updateCharValueOptions() {
            const paramSelect = document.getElementById('charParamSelect');
            const valueSelect = document.getElementById('charValueSelect');
            const param = paramSelect.value;
            if (!param) {
                valueSelect.innerHTML = '<option value="">— выберите значение —</option>';
                return;
            }
            const values = parameterOptions[param]?.values || [];
            valueSelect.innerHTML = '<option value="">— выберите значение —</option>' +
                values.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function openCharacteristicModal() {
            // Обновляем список проектов перед открытием
            updateCharProjectSelect();
            // Сбрасываем выбор параметра и значения
            document.getElementById('charParamSelect').value = '';
            document.getElementById('charValueSelect').innerHTML = '<option value="">— выберите значение —</option>';
            document.getElementById('characteristicModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function closeCharacteristicModal() {
            document.getElementById('characteristicModal').classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        function saveCharacteristic() {
            const project = document.getElementById('charProjectSelect').value;
            const param = document.getElementById('charParamSelect').value;
            const value = document.getElementById('charValueSelect').value;

            if (!project || !param || !value) {
                showNotification('Заполните все поля', 'error');
                return;
            }

            // Добавляем в состояние
            state.characteristics.push({ project, param, value });
            // Сохраняем в localStorage для демонстрации (позже будет на сервер)
            localStorage.setItem('characteristics', JSON.stringify(state.characteristics));
            closeCharacteristicModal();
            renderContent(); // перерисовываем текущую вкладку
            showNotification('Характеристика добавлена', 'success');
        }

        // ========== ОБРАБОТКА ИЗМЕНЕНИЙ В ГРАФИКЕ (без изменений) ==========
        function handleTimeChange(input) {
            const type = input.dataset.type;
            const project = input.dataset.project;
            const month = input.dataset.month;
            const day = parseInt(input.dataset.day);
            const newValue = input.value.trim();

            if (newValue === '') {
                const key = `${project}_${month}_${day}`;
                if (type === 'meeting') {
                    delete state.projectMeetings[key];
                    delete state.projectMeetingComments[key];
                    saveProjectMeetings();
                } else {
                    delete state.projectTrainings[key];
                    delete state.projectTrainingComments[key];
                    saveProjectTrainings();
                }
                showNotification('Удалено', 'success');
                return;
            }

            currentCommentContext = {
                type,
                project,
                month,
                day,
                inputElement: input
            };

            document.getElementById('commentProject').textContent = project;
            const dateStr = `${day}.${month.slice(5)}.${month.slice(0,4)}`;
            document.getElementById('commentDate').textContent = dateStr;
            document.getElementById('commentType').textContent = type === 'meeting' ? 'Организационная встреча' : 'Обучение';
            document.getElementById('commentTime').textContent = newValue;

            const commentKey = `${project}_${month}_${day}`;
            const existingLink = type === 'meeting' ? (state.projectMeetingComments[commentKey] || '') : (state.projectTrainingComments[commentKey] || '');
            document.getElementById('commentLink').value = existingLink;

            document.getElementById('commentModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function openCommentModalFromClick(input) {
            if (!input.value.trim()) return;

            const type = input.dataset.type;
            const project = input.dataset.project;
            const month = input.dataset.month;
            const day = parseInt(input.dataset.day);

            currentCommentContext = {
                type,
                project,
                month,

            };

            const dateStr = `${day}.${month.slice(5)}.${month.slice(0,4)}`;
            document.getElementById('commentProject').textContent = project;
            document.getElementById('commentDate').textContent = dateStr;
            document.getElementById('commentType').textContent = type === 'meeting' ? 'Организационная встреча' : 'Обучение';
            document.getElementById('commentTime').textContent = input.value;

            const commentKey = `${project}_${month}_${day}`;
            const existingLink = type === 'meeting' ? (state.projectMeetingComments[commentKey] || '') : (state.projectTrainingComments[commentKey] || '');
            document.getElementById('commentLink').value = existingLink;

        function saveComment() {
            if (!currentCommentContext) return;

            const { type, project, month, day, inputElement } = currentCommentContext;
            const currentTime = inputElement.value.trim();
            const link = document.getElementById('commentLink').value.trim();
            const key = `${project}_${month}_${day}`;

            if (type === 'meeting') {
                state.projectMeetings[key] = currentTime;

                saveProjectMeetings();
                saveProjectMeetingComments();
            } else {
                state.projectTrainings[key] = currentTime;

                saveProjectTrainings();
                saveProjectTrainingComments();

            closeCommentModal();
            showNotification('Сохранено', 'success');

        function formatMonth(monthStr) {
            if (!monthStr) return '';
            const [year, month] = monthStr.split('-');

                           'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            return `${months[parseInt(month) - 1]} ${year}`;

        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let password = '';
            for (let i = 0; i < 8; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));

            return password;
        }

        async function saveModal() {
            try {
                if (editingType === 'recruiter') {
                    const nameElem = document.getElementById('modalName');
                    const passwordElem = document.getElementById('modalPassword');
                    const phoneElem = document.getElementById('modalPhone');
                    const emailElem = document.getElementById('modalEmail');

                    if (!nameElem) throw new Error('Поле "ФИО" не найдено');
                    const name = nameElem.value.trim();
                    if (!name) {
                        alert('Введите ФИО');
                        return;
                    }
                    const password = passwordElem ? passwordElem.value.trim() : generatePassword();
                    const phone = phoneElem ? phoneElem.value.trim() : '';
                    const email = emailElem ? emailElem.value.trim() : '';
                    const newItem = { name, password, phone, email };

                    let response;
                    if (editingId === null) {
                        response = await fetch('/.netlify/functions/saveRecruiter', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newItem)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.recruiters.push(saved.recruiter);
                        }
                    } else {
                        const oldItem = state.recruiters[editingId];
                        response = await fetch('/.netlify/functions/saveRecruiter', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...newItem, id: oldItem.name })
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.recruiters[editingId] = saved.recruiter;
                        }
                    }
                    if (!response.ok) throw new Error('Ошибка сохранения');
                } else if (editingType === 'script') {
                    const titleElem = document.getElementById('scriptTitle');
                    const contentElem = document.getElementById('scriptContent');

                    if (!titleElem) throw new Error('Поле "Название" не найдено');
                    if (!contentElem) throw new Error('Поле "Текст скрипта" не найдено');

                    const title = titleElem.value.trim();
                    const content = contentElem.innerHTML.trim();

                    if (!title || !content) {
                        alert('Заполните все поля');
                        return;
                    }
                    const newItem = { title, content };

                    let response;
                    if (editingId === null) {
                        response = await fetch('/.netlify/functions/saveScript', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newItem)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.scripts.push(saved.script);
                        }
                    } else {
                        const oldItem = state.scripts[editingId];
                        response = await fetch('/.netlify/functions/saveScript', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...newItem, id: oldItem.title })
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.scripts[editingId] = saved.script;
                        }
                    }
                    if (!response.ok) throw new Error('Ошибка сохранения');
                } else {
                    console.warn('Неизвестный тип редактирования:', editingType);
                    return;
                }

                closeModal();
                renderContent();
                showNotification('Сохранено', 'success');
            } catch (error) {
                console.error('Ошибка в saveModal:', error);
                showNotification('Ошибка: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');

        // ========== ИМПОРТ КАНДИДАТОВ ИЗ EXCEL ==========
        function importCandidates(recruiterIndex) {
            currentRecruiterForImport = recruiterIndex;
            const fileInput = document.getElementById('excelUpload');
            fileInput.value = '';
            fileInput.click();
        }

        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (currentRecruiterForImport === null) return;

            const reader = new FileReader();
            reader.onload = async function(loadEvent) {
                try {
                    const data = new Uint8Array(loadEvent.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                    if (rows.length < 2) {
                        showNotification('Файл не содержит данных', 'error');
                        return;
                    }

                    const candidatesAdded = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 2) continue;
                        const fullName = row[0] ? row[0].toString().trim() : '';
                        const phone = row[1] ? row[1].toString().trim() : '';
                        if (!fullName || !phone) continue;

                        const newCandidate = {
                            fullName,
                            phone,
                            project: '',
                            country: '',
                            trainingDate: '',
                            trainingTime: '',
                            meetingTime: '',
                            callResult: '',
                            contactType: '',
                            recruiter: state.recruiters[currentRecruiterForImport].name,
                            comment: '',
                            createdAt: new Date().toISOString()
                        };

                        const response = await fetch('/.netlify/functions/submitCandidate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newCandidate)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.candidates.push(saved.candidate);
                            candidatesAdded.push(saved.candidate);
                        }
                    }

                    if (candidatesAdded.length > 0) {
                        showNotification(`Добавлено контактов: ${candidatesAdded.length}`, 'success');
                        if (currentTab === 'candidates') {
                            renderContent();
                        }
                    } else {
                        showNotification('Не найдено валидных записей', 'error');
                    }
                } catch (err) {
                    console.error(err);
                    showNotification('Ошибка при обработке файла', 'error');
                } finally {
                    currentRecruiterForImport = null;
                }
            };
            reader.readAsArrayBuffer(file);
        });
