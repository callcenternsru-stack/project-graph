            border-color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="side-menu-trigger"></div>
    <div class="side-menu">
        <button class="menu-btn" data-tab="recruiters" onclick="switchTab('recruiters')">Рекрутеры</button>
        <button class="menu-btn" data-tab="candidates" onclick="switchTab('candidates')">База контактов</button>
        <button class="menu-btn" data-tab="scripts" onclick="switchTab('scripts')">Скрипты</button>
        <button class="menu-btn" data-tab="schedule" onclick="switchTab('schedule')">График</button>
        <button class="menu-btn" data-tab="candidatesAll" onclick="switchTab('candidatesAll')">Анкеты</button>
        <button class="menu-btn" data-tab="characteristics" onclick="switchTab('characteristics')">Характеристики</button>
        <button class="menu-btn" data-tab="analytics" onclick="switchTab('analytics')">Аналитика</button>
    </div>

    <div class="admin-container">
        <div class="header">
            <h1>Администрирование рекрутинга</h1>
        </div>
        <div class="content-card" id="contentArea"></div>
    </div>

    <!-- модальные окна (оставлены как в исходном коде) -->
    <div id="addMonthModal" class="modal">...</div>
    <div id="editModal" class="modal">...</div>
    <div id="commentModal" class="modal">...</div>
    <div id="characteristicModal" class="modal">...</div>
    <div id="statusModal" class="modal">...</div>
    <div id="analyticsModal" class="modal">...</div>
    <div id="candidateDetailsModal" class="modal">...</div>
    <input type="file" id="excelUpload" accept=".xlsx,.xls,.csv" style="display: none;">

    <script>
        // ========== СОСТОЯНИЕ ==========
        let state = {
            recruiters: [],
            callResults: [],
            contactTypes: [],
            projects: [],
            candidates: [],
            scripts: [],
            projectMeetings: {},
            projectTrainings: {},
            projectMeetingComments: {},
            projectTrainingComments: {},
            scheduleMonths: [],
            autoForms: [],
            manualForms: [],
            allForms: [],
            characteristics: [],
            allCandidates: [],
            analytics: []
        };

        let currentTab = 'recruiters';
        let editingId = null;
        let editingType = null;
        let currentRecruiterForImport = null;
        let currentScheduleMonth = new Date().toISOString().slice(0, 7);
        let currentCommentContext = null;
        let candidatesSortColumn = 0;
        let candidatesSortDirection = 'desc';
        let candidatesFilterText = '';               // <-- НОВАЯ ПЕРЕМЕННАЯ ДЛЯ ФИЛЬТРА
        let selectedCandidateIds = new Set();
        let editingAnalyticsId = null;
        let candidatesPage = 1;
        const CANDIDATES_PER_PAGE = 20;

        const urlParams = new URLSearchParams(window.location.search);
        const scheduleOnly = urlParams.get('tab') === 'schedule-only';

        if (scheduleOnly) {
            document.addEventListener('DOMContentLoaded', async function() {
                const trigger = document.querySelector('.side-menu-trigger');
                const sideMenu = document.querySelector('.side-menu');
                const header = document.querySelector('.header');
                if (trigger) trigger.style.display = 'none';
                if (sideMenu) sideMenu.style.display = 'none';
                if (header) header.style.display = 'none';
                currentTab = 'schedule';
                window.renderContent = function() {
                    const area = document.getElementById('contentArea');
                    if (area) renderSchedulePage(area);
                };
                await loadAllData();
                renderContent();
            });
        }

        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        // ========== ЗАГРУЗКА ДАННЫХ (без изменений) ==========
        async function loadCharacteristics() { ... }
        async function loadAnalytics() { ... }
        async function saveCharacteristicsToServer() { ... }
        async function autoAssignRecruiters() { ... }
        function findMatchingRecruiter(candidate) { ... }

        async function loadAllData() { ... }  // остается без изменений

        async function processCompletedCandidates() { ... }
        function updateMenuCounts() { ... }
        async function deleteAutoForm(code) { ... }
        async function deleteManualForm(id) { ... }
        async function deleteCandidate(id, type) { ... }

        function switchTab(tabId) {
            if (scheduleOnly) return;
            currentTab = tabId;
            document.querySelectorAll('.side-menu .menu-btn').forEach(btn => btn.classList.remove('active'));
            const index = ['recruiters', 'candidates', 'scripts', 'schedule', 'candidatesAll', 'characteristics', 'analytics'].indexOf(tabId);
            if (index !== -1) {
                document.querySelectorAll('.side-menu .menu-btn')[index].classList.add('active');
            }
            renderContent();
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            if (currentTab === 'recruiters') renderRecruiters(area);
            else if (currentTab === 'candidates') renderCandidates(area);
            else if (currentTab === 'scripts') renderScripts(area);
            else if (currentTab === 'schedule') renderSchedulePage(area);
            else if (currentTab === 'candidatesAll') renderCandidatesAll(area);
            else if (currentTab === 'characteristics') renderCharacteristics(area);
            else if (currentTab === 'analytics') renderAnalytics(area);
        }

        // ========== ФУНКЦИЯ ФИЛЬТРАЦИИ ==========
        function applyCandidatesFilter(candidates) {
            if (!candidatesFilterText.trim()) return candidates;
            const search = candidatesFilterText.toLowerCase().trim();
            return candidates.filter(c => {
                const fields = [
                    c.fullName, c.phone, c.project, c.country, c.trainingDate, c.meetingTime,
                    c.callResult, c.contactType, c.recruiter, c.comment,
                    c.updatedAt ? new Date(c.updatedAt).toLocaleString() : (c.createdAt ? new Date(c.createdAt).toLocaleString() : ''),
                    new Date(c.createdAt).toLocaleString()
                ];
                return fields.some(field => field && field.toString().toLowerCase().includes(search));
            });
        }

        // ========== ОБНОВЛЁННЫЙ РЕНДЕР КАНДИДАТОВ ==========
        function renderCandidates(container) {
            const headers = [
                { label: 'Время изменения', field: 'updatedAt' },
                { label: 'Дата', field: 'createdAt' },
                { label: 'ФИО', field: 'fullName' },
                { label: 'Телефон', field: 'phone' },
                { label: 'Проект', field: 'project' },
                { label: 'Страна', field: 'country' },
                { label: 'Обучение', field: 'trainingDate' },
                { label: 'Встреча', field: 'meetingTime' },
                { label: 'Результат', field: 'callResult' },
                { label: 'Тип', field: 'contactType' },
                { label: 'Рекрутер', field: 'recruiter' },
                { label: 'Комментарий', field: 'comment' },
                { label: 'Действия', field: null }
            ];

            // Фильтрация
            let filtered = applyCandidatesFilter(state.candidates);
            // Сортировка
            const sorted = sortCandidatesData([...filtered]);

            let headerHtml = '<tr>';
            headerHtml += '<th class="checkbox-col"><input type="checkbox" class="select-all-checkbox" onclick="toggleSelectAll(this)"></th>';
            headers.forEach((h, idx) => {
                let sortClass = '';
                if (h.field && candidatesSortColumn === idx) {
                    sortClass = candidatesSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc';
                }
                headerHtml += `<th class="${sortClass}" onclick="${h.field ? `sortCandidates(${idx})` : ''}">${h.label}</th>`;
            });
            headerHtml += '</tr>';

            let rowsHtml = '';
            if (sorted.length === 0) {
                rowsHtml = `<tr><td colspan="${headers.length+1}" style="text-align:center;">Нет контактов</td></tr>`;
            } else {
                sorted.forEach(c => {
                    const training = c.trainingDate && c.trainingTime ? `${c.trainingDate} ${c.trainingTime}` : '—';
                    const meeting = c.meetingTime ? c.meetingTime : '—';
                    const updatedAtStr = c.updatedAt ? new Date(c.updatedAt).toLocaleString() : (c.createdAt ? new Date(c.createdAt).toLocaleString() : '—');
                    const createdAtStr = new Date(c.createdAt).toLocaleString();
                    const checked = selectedCandidateIds.has(c.id) ? 'checked' : '';
                    rowsHtml += `
                        <tr>
                            <td class="checkbox-col"><input type="checkbox" class="row-checkbox" value="${c.id}" ${checked} onclick="toggleCandidateSelect('${c.id}', this.checked)"></td>
                            <td>${updatedAtStr}</td>
                            <td>${createdAtStr}</td>
                            <td>${c.fullName}</td>
                            <td>${c.phone}</td>
                            <td>${c.project}</td>
                            <td>${c.country || '—'}</td>
                            <td>${training}</td>
                            <td>${meeting}</td>
                            <td>${c.callResult || '—'}</td>
                            <td>${c.contactType || '—'}</td>
                            <td>${c.recruiter || '—'}</td>
                            <td>${c.comment || '—'}</td>
                            <td><button class="delete-candidate-btn" onclick="deleteCandidateFromBase('${c.id}')">✕</button></td>
                        </tr>
                    `;
                });
            }

            const bulkDeleteDisabled = selectedCandidateIds.size === 0 ? 'disabled' : '';

            let html = `
                <div class="section-header">
                    <h2>База контактов</h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="candidatesSearchInput" class="filter-input" placeholder="Фильтр по всем полям..." value="${candidatesFilterText.replace(/"/g, '&quot;')}">
                        <div class="bulk-actions">
                            <button class="bulk-delete-btn" ${bulkDeleteDisabled} onclick="bulkDeleteCandidates()">
                                <i class="fas fa-trash-alt"></i> Удалить выбранные (${selectedCandidateIds.size})
                            </button>
                        </div>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>${headerHtml}</thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
            `;
            container.innerHTML = html;

            // привязываем обработчик фильтра
            const filterInput = document.getElementById('candidatesSearchInput');
            if (filterInput) {
                filterInput.removeEventListener('input', handleFilterInput);
                filterInput.addEventListener('input', handleFilterInput);
            }
        }

        function handleFilterInput(e) {
            candidatesFilterText = e.target.value;
            renderContent();
        }

        // ========== ФУНКЦИИ ДЛЯ МАССОВОГО ВЫДЕЛЕНИЯ ==========
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                if (checkbox.checked) {
                    selectedCandidateIds.add(cb.value);
                } else {
                    selectedCandidateIds.delete(cb.value);
                }
            });
            const bulkBtn = document.querySelector('.bulk-delete-btn');
            if (bulkBtn) {
                bulkBtn.disabled = selectedCandidateIds.size === 0;
                bulkBtn.innerHTML = `<i class="fas fa-trash-alt"></i> Удалить выбранные (${selectedCandidateIds.size})`;
            }
        }

        function toggleCandidateSelect(id, checked) {
            if (checked) {
                selectedCandidateIds.add(id);
            } else {
                selectedCandidateIds.delete(id);
            }
            const selectAll = document.querySelector('.select-all-checkbox');
            if (selectAll) {
                const total = document.querySelectorAll('.row-checkbox').length;
                const checkedCount = document.querySelectorAll('.row-checkbox:checked').length;
                selectAll.checked = total === checkedCount && total > 0;
            }
            const bulkBtn = document.querySelector('.bulk-delete-btn');
            if (bulkBtn) {
                bulkBtn.disabled = selectedCandidateIds.size === 0;
                bulkBtn.innerHTML = `<i class="fas fa-trash-alt"></i> Удалить выбранные (${selectedCandidateIds.size})`;
            }
        }

        async function bulkDeleteCandidates() {
            if (selectedCandidateIds.size === 0) return;
            if (!confirm(`Удалить ${selectedCandidateIds.size} контактов?`)) return;
            const ids = Array.from(selectedCandidateIds);
            let successCount = 0;
            showLoading();
            for (const id of ids) {
                try {
                    const response = await fetch(`/.netlify/functions/deleteCandidate?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                    if (response.ok) {
                        successCount++;
                        state.candidates = state.candidates.filter(c => c.id !== id);
                    } else {
                        console.error(`Ошибка удаления ${id}`);
                    }
                } catch (error) {
                    console.error(`Ошибка сети при удалении ${id}`, error);
                }
            }
            hideLoading();
            if (successCount > 0) {
                showNotification(`Удалено контактов: ${successCount}`, 'success');
                selectedCandidateIds.clear();
                renderContent();
            } else {
                showNotification('Не удалось удалить ни одного контакта', 'error');
            }
        }

        // ========== СОРТИРОВКА (обновлённая) ==========
        function sortCandidates(columnIndex) {
            if (candidatesSortColumn === columnIndex) {
                candidatesSortDirection = candidatesSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                candidatesSortColumn = columnIndex;
                candidatesSortDirection = 'asc';
            }
            renderContent();
        }

        function sortCandidatesData(candidates) {
            const fields = [
                'updatedAt', 'createdAt', 'fullName', 'phone', 'project', 'country',
                'trainingDate', 'meetingTime', 'callResult', 'contactType', 'recruiter', 'comment'
            ];
            const field = fields[candidatesSortColumn];
            const direction = candidatesSortDirection === 'asc' ? 1 : -1;

            return candidates.sort((a, b) => {
                let valA = a[field];
                let valB = b[field];

                if (field === 'createdAt' || field === 'updatedAt') {
                    valA = new Date(valA || 0).getTime();
                    valB = new Date(valB || 0).getTime();
                } else {
                    valA = valA || '';
                    valB = valB || '';
                }

                if (valA < valB) return -direction;
                if (valA > valB) return direction;
                return 0;
            });
        }

        async function deleteCandidateFromBase(id) {
            if (!confirm('Удалить этот контакт?')) return;
            try {
                const response = await fetch(`/.netlify/functions/deleteCandidate?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (response.ok) {
                    state.candidates = state.candidates.filter(c => c.id !== id);
                    selectedCandidateIds.delete(id);
                    renderContent();
                    showNotification('Контакт удалён', 'success');
                } else {
                    const err = await response.json();
                    showNotification('Ошибка удаления: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        // ========== ОСТАЛЬНЫЕ ФУНКЦИИ (без изменений, за исключением добавления updatedAt при импорте) ==========
        function renderRecruiters(container) { ... }
        function renderScripts(container) { ... }
        function renderSchedulePage(container) { ... }
        function renderEventGraph(type, title) { ... }
        function renderCharacteristics(container) { ... }
        function updateCharProjectSelect() { ... }
        function openCharacteristicModal() { ... }
        function closeCharacteristicModal() { ... }
        function saveCharacteristics() { ... }
        function deleteCharacteristic(index) { ... }
        function handleTimeChange(input) { ... }
        function openCommentModalFromClick(input) { ... }
        function deleteTimeFromModal() { ... }
        function saveComment() { ... }
        function closeCommentModal() { ... }
        function changeScheduleMonth(month) { ... }
        function openAddMonthModal() { ... }
        function closeAddMonthModal() { ... }
        async function addScheduleMonth() { ... }
        function formatMonth(monthStr) { ... }
        async function deleteItem(type, index) { ... }
        function generatePassword() { ... }
        function formatText(command, value = null) { ... }
        function openAddModal(type) { ... }
        function generateNewPassword() { ... }
        function openEditModal(type, index) { ... }
        async function saveModal() { ... }
        function closeModal() { ... }
        function importCandidates(recruiterIndex) { ... }
        async function saveProjectMeetings() { ... }
        async function saveProjectTrainings() { ... }
        async function saveProjectMeetingComments() { ... }
        async function saveProjectTrainingComments() { ... }
        async function saveScheduleMonths() { ... }
        async function updateCandidateRecruiter(id, type, newRecruiter) { ... }

        // Импорт Excel — добавим updatedAt
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (currentRecruiterForImport === null) return;
            const reader = new FileReader();
            reader.onload = async function(loadEvent) {
                try {
                    const data = new Uint8Array(loadEvent.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                    if (rows.length < 2) {
                        showNotification('Файл не содержит данных', 'error');
                        return;
                    }
                    const candidatesAdded = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 2) continue;
                        const fullName = row[0] ? row[0].toString().trim() : '';
                        const phone = row[1] ? row[1].toString().trim() : '';
                        if (!fullName || !phone) continue;
                        const now = new Date().toISOString();
                        const newCandidate = {
                            fullName,
                            phone,
                            project: '',
                            country: '',
                            trainingDate: '',
                            trainingTime: '',
                            meetingTime: '',
                            callResult: '',
                            contactType: '',
                            recruiter: state.recruiters[currentRecruiterForImport].name,
                            comment: '',
                            createdAt: now,
                            updatedAt: now   // <-- добавлено время изменения
                        };
                        const response = await fetch('/.netlify/functions/submitCandidate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newCandidate)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.candidates.push(saved.candidate);
                            candidatesAdded.push(saved.candidate);
                        }
                    }
                    if (candidatesAdded.length > 0) {
                        showNotification(`Добавлено контактов: ${candidatesAdded.length}`, 'success');
                        if (currentTab === 'candidates') renderContent();
                        updateMenuCounts();
                    } else {
                        showNotification('Не найдено валидных записей', 'error');
                    }
                } catch (err) {
                    console.error(err);
                    showNotification('Ошибка при обработке файла', 'error');
                } finally {
                    currentRecruiterForImport = null;
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderCandidatesAll(container) { ... }
        function showCandidateDetails(id, type) { ... }
        function closeCandidateDetails() { ... }
        async function updateCandidateStatus(id, type, newStatus, showNotif = true) { ... }
        let editingStatusIndex = -1;
        function openStatusModal() { ... }
        function closeStatusModal() { ... }
        function renderStatusList() { ... }
        function editStatus(index) { ... }
        async function saveStatus() { ... }
        async function deleteStatus(index) { ... }
        function renderAnalytics(container) { ... }
        function openAnalyticsModal(entry = null) { ... }
        function editAnalytics(id) { ... }
        async function deleteAnalytics(id) { ... }
        function closeAnalyticsModal() { ... }
        document.getElementById('analyticsForm').addEventListener('submit', async (e) => { ... });

        function showLoading() { ... }
        function hideLoading() { ... }
        const style = document.createElement('style');
        style.textContent = ` ... `;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', async function() {
            await loadAllData();
            if (!scheduleOnly) {
                switchTab('recruiters');
            }
        });
    </script>
</body>
