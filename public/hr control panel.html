                    } catch (e) {
                        console.error('Error parsing task score', e);
                        extraInfoHtml += `<p><strong>Тест (задание 3):</strong> ${candidate.taskScores['task_2_score']} (ошибка парсинга)</p>`;
                    }
                }
            }

            if (type === 'auto' && candidate.status === 'completed') {
                filesHtml = `
                    <h3>Файлы автоматической проверки</h3>
                    <ul class="file-list">
                        <li><a href="${candidate.files.report}" target="_blank">report.txt</a></li>
                        <li><a href="${candidate.files.results}" target="_blank">results.json</a></li>
                        <li><a href="${candidate.files.voice}" target="_blank">voice_recording.wav</a></li>
                    </ul>
                `;
            } else if (type === 'manual' && candidate.files && Object.keys(candidate.files).length > 0) {
                filesHtml = '<h3>Загруженные файлы</h3><ul class="file-list">';
                const taskFiles = {};
                for (const [key, url] of Object.entries(candidate.files)) {
                    const match = key.match(/^task_(\d+)$/);
                    if (match) {
                        const taskNum = parseInt(match[1]) + 1;
                        let filename = '';
                        try {
                            const urlObj = new URL(url, window.location.origin);
                            filename = decodeURIComponent(urlObj.searchParams.get('file') || '');
                        } catch (e) {
                            const fileParam = url.split('&file=')[1]?.split('&')[0] || '';
                            filename = decodeURIComponent(fileParam);
                        }
                        taskFiles[taskNum] = { url, filename };
                    }
                }
                for (let i = 1; i <= 7; i++) {
                    if (taskFiles[i]) {
                        filesHtml += `<li><strong>Задание ${i}:</strong> <a href="${taskFiles[i].url}" target="_blank">${taskFiles[i].filename}</a></li>`;
                    }
                }
                filesHtml += '</ul>';
            } else {
                filesHtml = '<p>Файлы отсутствуют или проверка ещё не завершена.</p>';
            }

            content.innerHTML = `
                <p><strong>ФИО:</strong> ${fullName}</p>
                <p><strong>Псевдоним:</strong> ${nickname}</p>
                <p><strong>Telegram:</strong> ${telegram}</p>
                <p><strong>Телефон:</strong> ${phone}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Проект:</strong> ${project}</p>
                <p><strong>Тип проверки:</strong> ${type === 'auto' ? 'Автоматическая' : 'Ручная'}</p>
                <p><strong>Дата создания:</strong> ${new Date(candidate.createdAt).toLocaleString()}</p>
                ${extraInfoHtml}
                ${filesHtml}
            `;

            document.getElementById('candidateDetailsModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function closeCandidateDetails() {
            document.getElementById('candidateDetailsModal').classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        async function updateCandidateStatus(id, type, newStatus, showNotif = true) {
            try {
                const response = await fetch('/.netlify/functions/updateCandidateStatus', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, type, recruitmentStatus: newStatus })
                });
                if (response.ok) {
                    const candidate = state.allCandidates.find(c => c.id === id && c.type === type);
                    if (candidate) candidate.recruitmentStatus = newStatus;
                    if (showNotif) showNotification('Статус обновлён', 'success');
                } else {
                    if (showNotif) showNotification('Ошибка обновления статуса', 'error');
                }
            } catch (error) {
                console.error(error);
                if (showNotif) showNotification('Ошибка сети', 'error');
            }
        }

        // ========== УПРАВЛЕНИЕ СТАТУСАМИ ==========
        let editingStatusIndex = -1;

        function openStatusModal() {
            editingStatusIndex = -1;
            document.getElementById('statusNameInput').value = '';
            renderStatusList();
            document.getElementById('statusModal').classList.add('show');
            document.body.classList.add('menu-open');
        }

        function closeStatusModal() {
            document.getElementById('statusModal').classList.remove('show');
            document.body.classList.remove('menu-open');
            editingStatusIndex = -1;
        }

        function renderStatusList() {
            const list = document.getElementById('statusList');
            if (!list) return;
            if (!state.callResults || state.callResults.length === 0) {
                list.innerHTML = '<div class="list-item">Нет статусов</div>';
                return;
            }
            list.innerHTML = state.callResults.map((status, index) => `
                <div class="list-item">
                    <span>${status.name}</span>
                    <div>
                        <button class="edit-btn" onclick="editStatus(${index})">✏️</button>
                        <button class="delete-btn" onclick="deleteStatus(${index})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function editStatus(index) {
            const status = state.callResults[index];
            if (!status) return;
            editingStatusIndex = index;
            document.getElementById('statusNameInput').value = status.name;
            const saveBtn = document.querySelector('#statusModal .save-btn');
            saveBtn.textContent = 'Сохранить';
        }

        async function saveStatus() {
            const nameInput = document.getElementById('statusNameInput');
            const name = nameInput.value.trim();
            if (!name) {
                showNotification('Введите название статуса', 'error');
                return;
            }

            let response;
            if (editingStatusIndex !== -1) {
                // редактирование
                const oldName = state.callResults[editingStatusIndex].name;
                response = await fetch('/.netlify/functions/saveCallResult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, id: oldName })
                });
            } else {
                // добавление
                response = await fetch('/.netlify/functions/saveCallResult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
            }

            if (response.ok) {
                const data = await response.json();
                if (editingStatusIndex !== -1) {
                    state.callResults[editingStatusIndex] = data.item;
                } else {
                    state.callResults.push(data.item);
                }
                renderStatusList();
                nameInput.value = '';
                editingStatusIndex = -1;
                document.querySelector('#statusModal .save-btn').textContent = 'Добавить';
                showNotification('Статус сохранён', 'success');
                if (currentTab === 'candidatesAll') {
                    renderContent();
                }
            } else {
                const err = await response.json();
                showNotification('Ошибка сохранения: ' + (err.error || ''), 'error');
            }
        }

        async function deleteStatus(index) {
            if (!confirm('Удалить статус? Все кандидаты с этим статусом останутся, но вы больше не сможете его выбрать.')) return;
            const status = state.callResults[index];
            try {
                const response = await fetch(`/.netlify/functions/deleteCallResult?name=${encodeURIComponent(status.name)}`, { method: 'DELETE' });
                if (response.ok) {
                    state.callResults.splice(index, 1);
                    renderStatusList();
                    showNotification('Статус удалён', 'success');
                    if (currentTab === 'candidatesAll') {
                        renderContent();
                    }
                } else {
                    const err = await response.json();
                    showNotification('Ошибка удаления: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        // ========== НОВЫЕ ФУНКЦИИ ДЛЯ АНАЛИТИКИ ==========
        function renderAnalytics(container) {
            let html = `
                <div class="section-header">
                    <h2>Аналитика звонков</h2>
                    <button class="add-btn" onclick="openAnalyticsModal()">➕ Добавить запись</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Рекрутер</th>
                                <th>Описание</th>
                                <th>Качество (%)</th>
                                <th>Файл</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            if (state.analytics.length === 0) {
                html += '<tr><td colspan="6" style="text-align:center;">Нет записей</td></tr>';
            } else {
                state.analytics.forEach(entry => {
                    const date = entry.createdAt ? new Date(entry.createdAt).toLocaleString() : '—';
                    const recruiterName = entry.recruiterName || '—';
                    const description = entry.description || '—';
                    const quality = entry.quality !== undefined ? entry.quality : '—';
                    const fileLink = entry.fileUrl ? `<a href="${entry.fileUrl}" target="_blank" class="download-btn">📁 Скачать</a>` : '—';
                    html += `
                        <tr>
                            <td>${date}</td>
                            <td>${recruiterName}</td>
                            <td>${description}</td>
                            <td style="text-align:center;"><span class="quality-badge">${quality}</span></td>
                            <td>${fileLink}</td>
                            <td class="actions">
                                <button class="edit-btn" onclick="editAnalytics('${entry.id}')">✏️</button>
                                <button class="delete-btn" onclick="deleteAnalytics('${entry.id}')">✕</button>
                            </td>
                        </tr>
                    `;
                });
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function openAnalyticsModal(entry = null) {
            const modal = document.getElementById('analyticsModal');
            const title = document.getElementById('analyticsModalTitle');
            const recruiterSelect = document.getElementById('analyticsRecruiter');
            const description = document.getElementById('analyticsDescription');
            const quality = document.getElementById('analyticsQuality');
            const fileInput = document.getElementById('analyticsFile');
            const idField = document.getElementById('analyticsId');
            const saveBtn = document.getElementById('analyticsSaveBtn');

            // Заполняем список рекрутеров
            recruiterSelect.innerHTML = '<option value="">— выберите рекрутера —</option>' +
                state.recruiters.map(r => `<option value="${r.name}">${r.name}</option>`).join('');

            if (entry) {
                // Режим редактирования
                title.textContent = 'Редактировать запись аналитики';
                recruiterSelect.value = entry.recruiterName || '';
                description.value = entry.description || '';
                quality.value = entry.quality !== undefined ? entry.quality : '';
                idField.value = entry.id;
                fileInput.value = '';
                saveBtn.textContent = '💾 Обновить';
            } else {
                // Режим добавления
                title.textContent = 'Добавить запись аналитики';
                recruiterSelect.value = '';
                description.value = '';
                quality.value = '';
                idField.value = '';
                fileInput.value = '';
                saveBtn.textContent = '💾 Сохранить';
            }

            modal.classList.add('show');
            document.body.classList.add('menu-open');
        }

        function editAnalytics(id) {
            const entry = state.analytics.find(a => a.id === id);
            if (entry) {
                openAnalyticsModal(entry);
            } else {
                showNotification('Запись не найдена', 'error');
            }
        }

        async function deleteAnalytics(id) {
            if (!confirm('Удалить запись аналитики?')) return;
            try {
                const response = await fetch(`/.netlify/functions/deleteAnalytics?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (response.ok) {
                    showNotification('Запись удалена', 'success');
                    await loadAnalytics();
                    if (currentTab === 'analytics') {
                        renderContent();
                    }
                } else {
                    const err = await response.json();
                    showNotification('Ошибка удаления: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        function closeAnalyticsModal() {
            document.getElementById('analyticsModal').classList.remove('show');
            document.body.classList.remove('menu-open');
        }

        document.getElementById('analyticsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const recruiterName = document.getElementById('analyticsRecruiter').value;
            const description = document.getElementById('analyticsDescription').value.trim();
            const quality = document.getElementById('analyticsQuality').value;
            const fileInput = document.getElementById('analyticsFile');
            const id = document.getElementById('analyticsId').value;

            if (!recruiterName || !description || quality === '') {
                showNotification('Заполните все обязательные поля', 'error');
                return;
            }

            const qualityNum = parseInt(quality, 10);
            if (isNaN(qualityNum) || qualityNum < 0 || qualityNum > 100) {
                showNotification('Качество должно быть числом от 0 до 100', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('recruiterName', recruiterName);
            formData.append('description', description);
            formData.append('quality', qualityNum);
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }
            if (id) {
                formData.append('id', id);
            }

            showLoading();
            try {
                const url = id ? '/.netlify/functions/updateAnalytics' : '/.netlify/functions/saveAnalytics';
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    showNotification(id ? 'Запись обновлена' : 'Запись сохранена', 'success');
                    closeAnalyticsModal();
                    await loadAnalytics();
                    if (currentTab === 'analytics') {
                        renderContent();
                    }
                } else {
                    const err = await response.json();
                    showNotification('Ошибка: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            } finally {
                hideLoading();
            }
        });

        // ========== СТИЛИ ДЛЯ ЗАГРУЗКИ ==========
        function showLoading() {
            let overlay = document.getElementById('loadingOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">Идет загрузка...</div>';
                document.body.appendChild(overlay);
            }
            overlay.classList.remove('hidden');
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('hidden');
        }

        const style = document.createElement('style');
        style.textContent = `
            .loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.9);
                z-index: 2000;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                gap: 20px;
            }
            .loading-overlay.hidden {
                display: none;
            }
            .loading-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid #333;
                border-top-color: #ffd700;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            .loading-text {
                color: #ffd700;
                font-size: 24px;
                font-weight: 600;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            .quality-badge {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 12px;
                background: #1a1a1a;
                border: 1px solid #ffd700;
                color: #ffd700;
                font-weight: 600;
            }
        `;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', async function() {
            await loadAllData();
            if (!scheduleOnly) {
                switchTab('recruiters');
            }
        });
    </script>
</body>
</html>
