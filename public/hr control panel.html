<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель рекрутинга</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.2/xlsx.full.min.js"></script>
    <style>
        /* ===== СТИЛИ ПОЛНОСТЬЮ СОХРАНЕНЫ ===== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000000;
            margin: 0;
            padding: 20px 20px 20px 60px;
            min-height: 100vh;
            color: #ffffff;
        }
        body.menu-open::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            pointer-events: none;
        }
        .side-menu-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 100vh;
            background: transparent;
            z-index: 1001;
        }
        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #111111;
            border-right: 2px solid #ffd700;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            transition: left 0.3s ease;
            z-index: 1002;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .side-menu-trigger:hover + .side-menu,
        .side-menu:hover {
            left: 0;
        }
        .side-menu .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: transparent;
            border: none;
            border-left: 4px solid transparent;
            color: #ffd700;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        .side-menu .menu-btn:hover {
            background: #1a1a1a;
            border-left-color: #ffd700;
        }
        .side-menu .menu-btn.active {
            background: #1a1a1a;
            border-left-color: #ffd700;
            font-weight: 600;
        }
        .admin-container {
            max-width: 1800px;
            margin: 0 auto;
        }
        .header {
            background: #111111;
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
        }
        .content-card {
            background: #111111;
            border-radius: 24px;
            padding: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            color: #ffd700;
            font-size: 20px;
            font-weight: 600;
        }
        .add-btn {
            padding: 10px 20px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .add-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }
        .add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .add-btn i {
            font-size: 16px;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #333333;
            background: #1a1a1a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        th {
            background: #000000;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #ffd700;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.2s;
        }
        th:hover {
            background: #1a1a1a;
        }
        th.sorted-asc::after {
            content: " ▲";
            font-size: 12px;
            margin-left: 5px;
        }
        th.sorted-desc::after {
            content: " ▼";
            font-size: 12px;
            margin-left: 5px;
        }
        td {
            padding: 12px 15px;
            color: #cccccc;
            border-bottom: 1px solid #333333;
        }
        tr:hover td {
            background: #222222;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .edit-btn, .delete-btn, .import-btn, .download-btn, .delete-form-btn, .delete-candidate-btn, .view-analytics-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
        }
        .edit-btn {
            background: #6b8cff;
            color: white;
        }
        .edit-btn:hover {
            background: #8aa5ff;
        }
        .delete-btn, .delete-form-btn, .delete-candidate-btn {
            background: #ff6b6b;
            color: white;
        }
        .delete-btn:hover, .delete-form-btn:hover, .delete-candidate-btn:hover {
            background: #ff8a8a;
        }
        .import-btn {
            background: #4caf50;
            color: white;
        }
        .import-btn:hover {
            background: #66bb6a;
        }
        .download-btn {
            background: #ffd700;
            color: #000;
        }
        .download-btn:hover {
            background: #ffe44d;
        }
        .view-analytics-btn {
            background: #9c27b0;
            color: white;
        }
        .view-analytics-btn:hover {
            background: #ba68c8;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            width: 1000px;
            max-width: calc(100vw - 40px);
            z-index: 10000;
            display: none;
            border: 2px solid #ffd700;
            overflow: hidden;
        }
        .modal.show {
            display: block;
            animation: modalAppear 0.3s ease;
        }
        @keyframes modalAppear {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 2px solid #ffd700;
            font-weight: 600;
            color: #ffd700;
            font-size: 18px;
            background: #000000;
            display: flex;
            align-items: center;
        }
        .modal-header .modal-close {
            margin-left: auto;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
            transition: opacity 0.2s;
            color: #ffd700;
            background: none;
            border: none;
            padding: 5px;
        }
        .modal-header .modal-close:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .modal-content {
            padding: 25px;
            background: #111111;
        }
        .modal-content .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .modal-content .form-group {
            flex: 1 1 calc(33.333% - 20px);
            min-width: 200px;
        }
        .modal-content label {
            display: block;
            color: #ffd700;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s;
        }
        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #222222;
        }
        .modal-content select[multiple] {
            height: 120px;
        }
        /* Стили для контейнера чекбоксов */
        .checkbox-group {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #333333;
            border-radius: 12px;
            padding: 10px;
            background: #1a1a1a;
        }
        .checkbox-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #ffd700;
        }
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 10px;
            min-width: 36px;
            transition: all 0.2s;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover {
            background: #222;
            border-color: #ffd700;
        }
        .toolbar .font-size-group {
            display: flex;
            gap: 4px;
        }
        .toolbar .font-size-group button {
            padding: 6px 8px;
            font-size: 12px;
        }
        .password-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .password-container input {
            flex: 1;
            min-width: 0;
        }
        .password-container button {
            width: auto;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 12px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .password-container button:hover {
            background: #222222;
            border-color: #ffd700;
        }
        .modal-content .save-btn {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            color: #000000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .modal-content .save-btn:hover {
            background: #ffe44d;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #111111;
            border: 2px solid #ffd700;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            z-index: 20000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 300px;
            animation: slideIn 0.3s ease;
        }
        .notification.success {
            border-color: #4caf50;
        }
        .notification.error {
            border-color: #ff6b6b;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .schedule-wrapper {
            background: #111111;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            margin-bottom: 30px;
            width: 100%;
            border: 1px solid #333333;
            max-height: 500px;
            overflow: auto;
        }
        .schedule-wrapper::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .schedule-wrapper::-webkit-scrollbar-track {
            background: #000000;
        }
        .schedule-wrapper::-webkit-scrollbar-thumb {
            background: #333333;
            border: 2px solid #000000;
            border-radius: 6px;
        }
        .schedule-wrapper::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
        .headers-container {
            display: flex;
            background: #000000;
            border-bottom: 2px solid #333333;
            position: sticky;
            top: 0;
            z-index: 100;
            min-width: min-content;
        }
        .fixed-headers {
            display: flex;
            flex: 0 0 auto;
            background: #000000;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 101;
        }
        .fixed-header-cell {
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            color: #ffd700;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            max-width: 200px;
        }
        .fixed-header-cell:first-child {
            width: 100%;
            min-width: 300px;
            max-width: 300px;
            text-align: left;
            padding-left: 20px;
            justify-content: flex-start;
            font-weight: 600;
            color: #ffd700;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .scrollable-headers {
            display: flex;
            flex: 1;
        }
        .scrollable-header-cell {
            flex: 0 0 100px;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid #333333;
            font-size: 13px;
            background: #000000;
            color: #ffd700;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .day-week {
            font-size: 11px;
            color: #8f9bb3;
            font-weight: normal;
            margin-top: 2px;
        }
        .rows-container {
            min-width: min-content;
        }
        .data-row {
            display: flex;
            border-bottom: 1px solid #333333;
            min-height: 50px;
        }
        .data-row:hover {
            background: #1a1a1a;
        }
        .fixed-cells {
            display: flex;
            flex: 0 0 auto;
            background: #111111;
            border-right: 2px solid #ffd700;
            position: sticky;
            left: 0;
            z-index: 90;
        }
        .fixed-cell {
            padding: 10px;
            border-right: 1px solid #333333;
            display: flex;
            align-items: center;
            background: #111111;
            color: #cccccc;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            min-width: 100px;
        }
        .fixed-cell:first-child {
            width: 100%;
            min-width: 300px;
            max-width: 300px;
            font-weight: 600;
            color: #ffd700;
            padding-left: 20px;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            display: block;
            line-height: 1.4;
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .scrollable-cells {
            display: flex;
            flex: 1;
        }
        .scrollable-cell {
            flex: 0 0 100px;
            padding: 6px;
            border-right: 1px solid #333333;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .time-input {
            width: 100%;
            padding: 6px;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .time-input:focus {
            outline: none;
            border-color: #ffd700;
            background: #222;
        }
        .time-input.filled {
            border-color: #ffd700;
            color: #ffd700;
        }
        .graph-title {
            color: #ffd700;
            font-size: 20px;
            margin: 30px 0 15px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }
        .month-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .month-selector select {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 14px;
            min-width: 200px;
        }
        .month-selector select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .readonly-text {
            color: #ffd700;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .loader {
            text-align: center;
            padding: 40px;
            color: #ffd700;
            font-size: 18px;
        }

        /* Стили для модального окна деталей кандидата */
        .file-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        .file-list li {
            margin-bottom: 8px;
        }
        .file-list a {
            color: #000;
            background: #ffd700;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            border: 1px solid #ccb000;
            transition: background 0.2s;
            display: inline-block;
        }
        .file-list a:hover {
            background: #ffe44d;
        }
        .status-select {
            background: #1a1a1a;
            color: #ffd700;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            width: 180px;
        }
        .status-select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .task-info {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-left: 4px solid #ffd700;
            border-radius: 4px;
            color: #ccc;
        }
        .task-info strong {
            color: #ffd700;
        }
        /* Дополнительные стили для кнопок в модальном окне */
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-actions .save-btn {
            background: #ffd700;
            color: #000;
        }
        .modal-actions .delete-time-btn {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .modal-actions .delete-time-btn:hover {
            background: #ff8a8a;
        }

        /* Стили для списка статусов в модальном окне */
        .items-list {
            max-height: 250px;
            overflow-y: auto;
            border: 2px solid #333333;
            border-radius: 12px;
            margin-top: 10px;
            background: #1a1a1a;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #333333;
            font-size: 14px;
            transition: background 0.2s;
            color: #ffffff;
        }
        .list-item:hover {
            background: #222222;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .edit-btn,
        .list-item .delete-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: auto;
            margin: 0;
            border-radius: 8px;
            font-weight: 500;
        }
        .list-item .edit-btn {
            background: #6b8cff;
        }
        .list-item .edit-btn:hover {
            background: #8aa5ff;
        }
        .list-item .delete-btn:hover {
            background: #ff8a8a;
        }

        /* ===== НОВЫЙ СТИЛЬ ДЛЯ СЕЛЕКТА РЕКРУТЕРА ===== */
        .recruiter-select {
            background: #1a1a1a;
            color: #ffd700;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            width: 150px;
        }
        .recruiter-select:focus {
            outline: none;
            border-color: #ffd700;
        }

        /* Стиль для поля качества в аналитике */
        .quality-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="side-menu-trigger"></div>
    <div class="side-menu">
        <button class="menu-btn" data-tab="recruiters" onclick="switchTab('recruiters')">Рекрутеры</button>
        <button class="menu-btn" data-tab="candidates" onclick="switchTab('candidates')">База контактов</button>
        <button class="menu-btn" data-tab="scripts" onclick="switchTab('scripts')">Скрипты</button>
        <button class="menu-btn" data-tab="schedule" onclick="switchTab('schedule')">График</button>
        <button class="menu-btn" data-tab="candidatesAll" onclick="switchTab('candidatesAll')">Анкеты</button>
        <button class="menu-btn" data-tab="characteristics" onclick="switchTab('characteristics')">Характеристики</button>
        <button class="menu-btn" data-tab="analytics" onclick="switchTab('analytics')">Аналитика</button>
    </div>

    <div class="admin-container">
        <div class="header">
            <h1>Администрирование рекрутинга</h1>
        </div>

    <!-- Модальное окно для деталей анкеты кандидата -->

            <button class="modal-close" onclick="closeCandidateDetails()">✕</button>

            <!-- будет заполнено динамически -->

    <input type="file" id="excelUpload" accept=".xlsx,.xls,.csv" style="display: none;">

    <script>
        // ========== СОСТОЯНИЕ ==========
        let state = {
            recruiters: [],
            callResults: [],
            contactTypes: [],
            projects: [],              // массив объектов { id, name }
            candidates: [],
            scripts: [],               // каждый скрипт содержит projectIds, projectNames, title, content, statuses, type
            projectMeetings: {},
            projectTrainings: {},
            projectMeetingComments: {},
            projectTrainingComments: {},
            scheduleMonths: [],
            autoForms: [],
            manualForms: [],
            allForms: [],
            characteristics: [],         // каждый объект содержит projectId, projectName
            allCandidates: [],            // новые данные для вкладки "Анкеты"
            analytics: []                 // массив записей аналитики
        };

        let currentTab = 'recruiters';
        let editingId = null;
        let editingType = null;          // может быть 'recruiter', 'script', 'testScript'
        let currentRecruiterForImport = null;
        let currentScheduleMonth = new Date().toISOString().slice(0, 7);
        let currentCommentContext = null;
        let candidatesSortColumn = 0;
        let candidatesSortDirection = 'desc';

        // Для редактирования аналитики
        let editingAnalyticsId = null;

        // ========== ПАГИНАЦИЯ ДЛЯ КАНДИДАТОВ ==========
        let candidatesPage = 1;
        const CANDIDATES_PER_PAGE = 20;

        const urlParams = new URLSearchParams(window.location.search);
        const scheduleOnly = urlParams.get('tab') === 'schedule-only';

        if (scheduleOnly) {
            document.addEventListener('DOMContentLoaded', async function() {
                const trigger = document.querySelector('.side-menu-trigger');
                const sideMenu = document.querySelector('.side-menu');
                const header = document.querySelector('.header');
                if (trigger) trigger.style.display = 'none';
                if (sideMenu) sideMenu.style.display = 'none';
                if (header) header.style.display = 'none';
                currentTab = 'schedule';
                window.renderContent = function() {
                    const area = document.getElementById('contentArea');
                    if (area) renderSchedulePage(area);
                };
                await loadAllData();
                renderContent();
            });
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        // ========== ЗАГРУЗКА ДАННЫХ С СЕРВЕРА ==========
        async function loadCharacteristics() {
            try {
                const res = await fetch('/.netlify/functions/getCharacteristics');
                if (res.ok) {
                    state.characteristics = await res.json();
                } else {
                    console.error('Failed to load characteristics');
                }
            } catch (error) {
                console.error('Error loading characteristics:', error);
            }
        }

        async function loadAnalytics() {
            try {
                const res = await fetch('/.netlify/functions/getAnalytics');
                if (res.ok) {
                    state.analytics = await res.json();
                } else {
                    console.error('Failed to load analytics');
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }

        async function saveCharacteristicsToServer() {
            try {
                const res = await fetch('/.netlify/functions/saveCharacteristics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state.characteristics)
                });
                if (!res.ok) {
                    showNotification('Ошибка сохранения характеристик', 'error');
                }
            } catch (error) {
                console.error('Error saving characteristics:', error);
                showNotification('Ошибка сети при сохранении', 'error');
            }
        }

        // ========== АВТОМАТИЧЕСКОЕ НАЗНАЧЕНИЕ РЕКРУТЕРА ==========
        async function autoAssignRecruiters() {
            if (!state.allCandidates || !state.candidates) return;
            const updates = [];
            for (const candidate of state.allCandidates) {
                // Если поле recruiter уже заполнено (не undefined и не пустая строка), пропускаем
                if (candidate.recruiter && candidate.recruiter.trim() !== '') continue;
                
                // Пытаемся найти подходящего рекрутера
                const matched = findMatchingRecruiter(candidate);
                const newRecruiter = matched || 'Внешний';
                
                // Сохраняем
                updates.push(
                    fetch('/.netlify/functions/updateCandidateRecruiter', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: candidate.id,
                            type: candidate.type,
                            recruiter: newRecruiter
                        })
                    }).catch(err => console.error('Ошибка сохранения рекрутера:', err))
                );
                candidate.recruiter = newRecruiter;
            }
            if (updates.length > 0) {
                await Promise.allSettled(updates);
                console.log(`Автоназначение рекрутеров завершено, обновлено ${updates.length} кандидатов`);
            }
        }

        async function loadAllData() {
            try {
                const refRes = await fetch('/.netlify/functions/getAllReferences');
                const refData = await refRes.json();
                state.recruiters = refData.recruiters || [];
                state.callResults = refData.callResults || [];
                state.contactTypes = refData.contactTypes || [];
                state.projects = refData.projects || [];
                state.projects = state.projects.map(p => {
                    if (typeof p === 'string') {
                        return { id: p, name: p };
                    }
                    return p;
                });
                state.scripts = refData.scripts || [];
                state.scripts = state.scripts.map(s => {
                    if (!s.type) s.type = 'call';
                    if (s.projectId && !s.projectIds) {
                        s.projectIds = [s.projectId];
                        s.projectNames = [s.projectName || s.projectId];
                    }
                    return s;
                });

                const [
                    candidatesRes,
                    meetingsRes,
                    trainingsRes,
                    meetingCommentsRes,
                    trainingCommentsRes,
                    monthsRes,
                    manualFormsRes,
                    allFormsRes,
                    allCandidatesRes
                ] = await Promise.all([
                    fetch('/.netlify/functions/getCandidates'),
                    fetch('/.netlify/functions/getProjectMeetings'),
                    fetch('/.netlify/functions/getProjectTrainings'),
                    fetch('/.netlify/functions/getProjectMeetingComments'),
                    fetch('/.netlify/functions/getProjectTrainingComments'),
                    fetch('/.netlify/functions/getScheduleMonths'),
                    fetch('/.netlify/functions/getManualForms'),
                    fetch('/.netlify/functions/getAllForms'),
                    fetch('/.netlify/functions/getAllCandidates')
                ]);

                state.candidates = await candidatesRes.json();
                state.projectMeetings = await meetingsRes.json();
                state.projectTrainings = await trainingsRes.json();
                state.projectMeetingComments = await meetingCommentsRes.json();
                state.projectTrainingComments = await trainingCommentsRes.json();
                state.scheduleMonths = await monthsRes.json();
                state.manualForms = await manualFormsRes.json();
                state.allForms = await allFormsRes.json();
                state.allCandidates = await allCandidatesRes.json();

                const autoRes = await fetch('/.netlify/functions/getResults');
                state.autoForms = await autoRes.json();

                await loadCharacteristics();
                await loadAnalytics();

                // Автоматически проставляем статус "Проверка пройдена" для завершённых анкет
                await processCompletedCandidates();

                // Автоматически назначаем рекрутеров для незаполненных кандидатов
                await autoAssignRecruiters();

                updateMenuCounts();
                candidatesPage = 1;
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showNotification('Не удалось загрузить данные', 'error');
            }
        }

        // ========== АВТОМАТИЧЕСКОЕ ПРОСТАВЛЕНИЕ СТАТУСА "ПРОВЕРКА ПРОЙДЕНА" ==========
        async function processCompletedCandidates() {
            if (!state.allCandidates) return;
            const updates = [];
            for (const candidate of state.allCandidates) {
                if (candidate.status === 'completed' && (!candidate.recruitmentStatus || candidate.recruitmentStatus === 'draft')) {
                    updates.push(updateCandidateStatus(candidate.id, candidate.type, 'passed', false));
                }
            }
            if (updates.length > 0) {
                await Promise.allSettled(updates);
                // Перезагрузим данные, чтобы отобразить новые статусы
                const allCandidatesRes = await fetch('/.netlify/functions/getAllCandidates');
                state.allCandidates = await allCandidatesRes.json();
            }
        }

        // ========== ОБНОВЛЕНИЕ СЧЕТЧИКОВ НА КНОПКАХ МЕНЮ ==========
        function updateMenuCounts() {
            document.querySelectorAll('.side-menu .menu-btn').forEach(btn => {
                const tab = btn.dataset.tab;
                if (!tab) return;
                let count = 0;
                switch (tab) {
                    case 'recruiters': count = state.recruiters.length; break;
                    case 'candidates': count = state.candidates.length; break;
                    case 'scripts': count = state.scripts.length; break;
                    case 'schedule': count = 0; break;
                    case 'candidatesAll': count = state.allCandidates.length; break;
                    case 'characteristics': count = state.characteristics.length; break;
                    case 'analytics': count = state.analytics.length; break;
                }
                let baseText = btn.innerText.replace(/\s*\(\d+\)$/, '');
                if (count > 0) {
                    btn.innerText = `${baseText} (${count})`;
                } else {
                    btn.innerText = baseText;
                }
            });
        }

        // ========== УДАЛЕНИЕ АНКЕТ ==========
        async function deleteAutoForm(code) {
            if (!confirm('Удалить автоматическую анкету?')) return;
            try {
                const res = await fetch(`/.netlify/functions/deleteAutoForm?code=${encodeURIComponent(code)}`, { method: 'DELETE' });
                if (res.ok) {
                    state.allForms = state.allForms.filter(f => f.code !== code);
                    const autoRes = await fetch('/.netlify/functions/getResults');
                    state.autoForms = await autoRes.json();
                    state.allCandidates = state.allCandidates.filter(c => !(c.id === code && c.type === 'auto'));
                    renderContent();
                    updateMenuCounts();
                    showNotification('Анкета удалена', 'success');
                } else {
                    showNotification('Ошибка удаления', 'error');
                }
            } catch (e) {
                showNotification('Ошибка сети', 'error');
            }
        }

        async function deleteManualForm(id) {
            if (!confirm('Удалить ручную анкету?')) return;
            try {
                const res = await fetch(`/.netlify/functions/deleteManualForm?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (res.ok) {
                    state.manualForms = state.manualForms.filter(f => f.id !== id);
                    state.allCandidates = state.allCandidates.filter(c => !(c.id === id && c.type === 'manual'));
                    renderContent();
                    updateMenuCounts();
                    showNotification('Анкета удалена', 'success');
                } else {
                    showNotification('Ошибка удаления', 'error');
                }
            } catch (e) {
                showNotification('Ошибка сети', 'error');
            }
        }

        async function deleteCandidate(id, type) {
            if (type === 'auto') {
                await deleteAutoForm(id);
            } else {
                await deleteManualForm(id);
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabId) {
            if (scheduleOnly) return;
            currentTab = tabId;
            document.querySelectorAll('.side-menu .menu-btn').forEach(btn => btn.classList.remove('active'));
            const index = ['recruiters', 'candidates', 'scripts', 'schedule', 'candidatesAll', 'characteristics', 'analytics'].indexOf(tabId);
            if (index !== -1) {
                document.querySelectorAll('.side-menu .menu-btn')[index].classList.add('active');
            }
            renderContent();
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            if (currentTab === 'recruiters') {
                renderRecruiters(area);
            } else if (currentTab === 'candidates') {
                renderCandidates(area);
            } else if (currentTab === 'scripts') {
                renderScripts(area);
            } else if (currentTab === 'schedule') {
                renderSchedulePage(area);
            } else if (currentTab === 'candidatesAll') {
                renderCandidatesAll(area);
            } else if (currentTab === 'characteristics') {
                renderCharacteristics(area);
            } else if (currentTab === 'analytics') {
                renderAnalytics(area);
            }
        }

        // ========== СТАРЫЕ ФУНКЦИИ РЕНДЕРА ==========
        function renderRecruiters(container) {
            let html = `
                <div class="section-header">
                    <h2>Рекрутеры</h2>
                    <button class="add-btn" onclick="openAddModal('recruiter')">+ Добавить рекрутера</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ФИО (логин)</th>
                                <th>Пароль</th>
                                <th>Телефон</th>
                                <th>Email</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            if (state.recruiters.length === 0) {
                html += '<tr><td colspan="5" style="text-align:center;">Нет рекрутеров</td></tr>';
            } else {
                state.recruiters.forEach((rec, index) => {
                    html += `
                        <tr>
                            <td>${rec.name || ''}</td>
                            <td><code>${rec.password || '—'}</code></td>
                            <td>${rec.phone || ''}</td>
                            <td>${rec.email || ''}</td>
                            <td class="actions">
                                <button class="import-btn" onclick="importCandidates(${index})" title="Загрузить базу кандидатов">📤</button>
                                <button class="edit-btn" onclick="openEditModal('recruiter', ${index})">✏️</button>
                                <button class="delete-btn" onclick="deleteItem('recruiter', ${index})">✕</button>
                            </td>
                        </tr>
                    `;
                });
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ========== ИСПРАВЛЕНИЕ: добавлена кнопка удаления для базы контактов ==========
        function renderCandidates(container) {
            const headers = [
                { label: 'Дата', field: 'createdAt' },
                { label: 'ФИО', field: 'fullName' },
                { label: 'Телефон', field: 'phone' },
                { label: 'Проект', field: 'project' },
                { label: 'Страна', field: 'country' },
                { label: 'Обучение', field: 'trainingDate' },
                { label: 'Встреча', field: 'meetingTime' },
                { label: 'Результат', field: 'callResult' },
                { label: 'Тип', field: 'contactType' },
                { label: 'Рекрутер', field: 'recruiter' },
                { label: 'Комментарий', field: 'comment' },
                { label: 'Действия', field: null } // новая колонка
            ];

            let headerHtml = '<tr>';
            headers.forEach((h, index) => {
                let sortClass = '';
                if (h.field && candidatesSortColumn === index) {
                    sortClass = candidatesSortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc';
                }
                headerHtml += `<th class="${sortClass}" onclick="${h.field ? `sortCandidates(${index})` : ''}">${h.label}</th>`;
            });
            headerHtml += '</tr>';

            let html = `
                <div class="section-header">
                    <h2>База контактов</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            ${headerHtml}
                        </thead>
                        <tbody>
            `;

            const sorted = sortCandidatesData([...state.candidates]);

            if (sorted.length === 0) {
                html += '<tr><td colspan="12" style="text-align:center;">Нет контактов</td></tr>';
            } else {
                sorted.forEach(c => {
                    const training = c.trainingDate && c.trainingTime ? `${c.trainingDate} ${c.trainingTime}` : '—';
                    const meeting = c.meetingTime ? c.meetingTime : '—';
                    html += `
                        <tr>

                            <td>${training}</td>

                            <td>${c.callResult || '—'}</td>
                            <td>${c.contactType || '—'}</td>
                            <td>${c.recruiter || '—'}</td>
                            <td>${c.comment || '—'}</td>
                            <td><button class="delete-candidate-btn" onclick="deleteCandidateFromBase('${c.id}')">✕</button></td>
                        </tr>
                    `;
                });
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function sortCandidates(columnIndex) {
            if (candidatesSortColumn === columnIndex) {
                candidatesSortDirection = candidatesSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                candidatesSortColumn = columnIndex;
                candidatesSortDirection = 'asc';
            }
            renderContent();
        }

        function sortCandidatesData(candidates) {
            const fields = [
                'createdAt',
                'fullName',
                'phone',
                'project',
                'country',
                'trainingDate',
                'meetingTime',
                'callResult',
                'contactType',
                'recruiter',
                'comment'
            ];
            const field = fields[candidatesSortColumn];
            const direction = candidatesSortDirection === 'asc' ? 1 : -1;

            return candidates.sort((a, b) => {
                let valA = a[field];
                let valB = b[field];

                if (field === 'createdAt') {
                    valA = new Date(valA || 0).getTime();
                    valB = new Date(valB || 0).getTime();
                } else {
                    valA = valA || '';
                    valB = valB || '';
                }

                if (valA < valB) return -direction;
                if (valA > valB) return direction;
                return 0;
            });
        }

        async function deleteCandidateFromBase(id) {

            try {
                const response = await fetch(`/.netlify/functions/deleteCandidate?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (response.ok) {
                    state.candidates = state.candidates.filter(c => c.id !== id);
                    renderContent();
                    showNotification('Контакт удалён', 'success');
                } else {
                    const err = await response.json();
                    showNotification('Ошибка удаления: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');

        function renderEventGraph(type, title) {
            const projects = state.projects.map(p => p.name);
            if (projects.length === 0) {
                return `<h3 class="graph-title">${title}</h3><div style="color: #8f9bb3; padding: 20px; text-align: center;">Нет проектов для отображения</div>`;
            }

            const [year, month] = currentScheduleMonth.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const weekDays = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];

            function getDayOfWeek(day) {
                const date = new Date(year, month - 1, day);
                return weekDays[date.getDay()];
            }

            function formatDateHeader(day) {
                return `${getDayOfWeek(day)}/${String(day).padStart(2, '0')}.${String(month).padStart(2, '0')}`;
            }

            let html = `<h3 class="graph-title">${title}</h3>`;
            html += '<div class="schedule-wrapper">';

            html += '<div class="headers-container">';
            html += '<div class="fixed-headers">';
            html += '<div class="fixed-header-cell">Проект</div>';
            html += '</div>';
            html += '<div class="scrollable-headers">';
            for (let day = 1; day <= daysInMonth; day++) {
                const header = formatDateHeader(day);
                const [dayWeek, dateStr] = header.split('/');
                html += `<div class="scrollable-header-cell">${dateStr}<span class="day-week">${dayWeek}</span></div>`;
            }
            html += '</div></div>';

            html += '<div class="rows-container">';
            projects.forEach(project => {
                html += '<div class="data-row">';
                html += '<div class="fixed-cells">';
                html += `<div class="fixed-cell">${project}</div>`;
                html += '</div>';

                html += '<div class="scrollable-cells">';
                for (let day = 1; day <= daysInMonth; day++) {
                    const key = `${project}_${currentScheduleMonth}_${day}`;
                    const timeValue = type === 'meeting' ? (state.projectMeetings[key] || '') : (state.projectTrainings[key] || '');
                    const filledClass = timeValue ? 'filled' : '';
                    html += `<div class="scrollable-cell">`;
                    html += `<input type="text" class="time-input ${filledClass}" value="${timeValue}" placeholder="чч:мм-чч:мм" data-type="${type}" data-project="${project}" data-month="${currentScheduleMonth}" data-day="${day}" onchange="handleTimeChange(this)" onclick="openCommentModalFromClick(this)" oninput="this.classList.toggle('filled', this.value.length > 0)">`;
                    html += `</div>`;
                }
                html += '</div></div>';
            });
            html += '</div></div>';

            return html;
        }

                return;

            const existingIndex = state.characteristics.findIndex(c => c.projectId === projectId);
            const newChar = { projectId, projectName, os, connectionType, internetSpeed, ram, cores, cpuFreq };

        function handleTimeChange(input) {
            const type = input.dataset.type;

            const day = parseInt(input.dataset.day);
            const newValue = input.value.trim();

            if (newValue === '') {
                const key = `${project}_${month}_${day}`;
                if (type === 'meeting') {
                    delete state.projectMeetings[key];
                    delete state.projectMeetingComments[key];
                    saveProjectMeetings();
                } else {
                    delete state.projectTrainings[key];
                    delete state.projectTrainingComments[key];
                    saveProjectTrainings();
                }
                showNotification('Удалено', 'success');
                return;
            }

            currentCommentContext = {
                type,
                project,
                month,
                day,
                inputElement: input
            };

            document.getElementById('commentProject').textContent = project;
            const dateStr = `${day}.${month.slice(5)}.${month.slice(0,4)}`;
            document.getElementById('commentDate').textContent = dateStr;
            document.getElementById('commentType').textContent = type === 'meeting' ? 'Организационная встреча' : 'Обучение';
            document.getElementById('commentTime').textContent = newValue;

            const commentKey = `${project}_${month}_${day}`;
            const existingLink = type === 'meeting' ? (state.projectMeetingComments[commentKey] || '') : (state.projectTrainingComments[commentKey] || '');

            document.getElementById('commentModal').classList.add('show');
            document.body.classList.add('menu-open');

        // ========== ОБНОВЛЕННАЯ ФУНКЦИЯ СОХРАНЕНИЯ ==========
        async function saveModal() {
            try {
                if (editingType === 'recruiter') {
                    const nameElem = document.getElementById('modalName');
                    const passwordElem = document.getElementById('modalPassword');
                    const phoneElem = document.getElementById('modalPhone');
                    const emailElem = document.getElementById('modalEmail');

                    if (!nameElem) throw new Error('Поле "ФИО" не найдено');
                    const name = nameElem.value.trim();
                    if (!name) {
                        alert('Введите ФИО');
                        return;
                    }
                    const password = passwordElem ? passwordElem.value.trim() : generatePassword();
                    const phone = phoneElem ? phoneElem.value.trim() : '';
                    const email = emailElem ? emailElem.value.trim() : '';
                    const newItem = { name, password, phone, email };

                    let response;
                    if (editingId === null) {
                        response = await fetch('/.netlify/functions/saveRecruiter', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newItem)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.recruiters.push(saved.recruiter);
                        }
                    } else {
                        const oldItem = state.recruiters[editingId];
                        response = await fetch('/.netlify/functions/saveRecruiter', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...newItem, id: oldItem.name })
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.recruiters[editingId] = saved.recruiter;
                        }
                    }
                    if (!response.ok) throw new Error('Ошибка сохранения');
                } else if (editingType === 'script' || editingType === 'testScript') {
                    const titleElem = document.getElementById('scriptTitle');
                    const contentElem = document.getElementById('scriptContent');
                    const statusesElem = document.getElementById('scriptStatuses');

                    if (!titleElem || !contentElem) throw new Error('Не все поля найдены');

                    let projectIds = [];
                    let projectNames = [];

                    if (editingType === 'script') {
                        const projectSelect = document.getElementById('scriptProjectSelect');
                        if (!projectSelect) throw new Error('Проекты не найдены');
                        const selectedValue = projectSelect.value;
                        if (!selectedValue) {
                            alert('Выберите проект');
                            return;
                        }
                        projectIds = [selectedValue];
                        const selectedOption = projectSelect.options[projectSelect.selectedIndex];
                        projectNames = [selectedOption ? selectedOption.text : selectedValue];
                    } else {
                        const checkboxes = document.querySelectorAll('#projectCheckboxes input[type=checkbox]:checked');
                        if (checkboxes.length === 0) {
                            alert('Выберите хотя бы один проект');
                            return;
                        }
                        projectIds = Array.from(checkboxes).map(cb => cb.value);
                        projectNames = projectIds.map(id => {
                            const proj = state.projects.find(p => p.id === id);
                            return proj ? proj.name : id;
                        });
                    }

                    const title = titleElem.value.trim();
                    const content = contentElem.innerHTML.trim();

                    let statuses = [];
                    if (editingType === 'script' && statusesElem) {
                        const statusesInput = statusesElem.value.trim();
                        statuses = statusesInput ? statusesInput.split(',').map(s => s.trim()).filter(s => s) : [];
                    }

                    if (!title || !content) {
                        alert('Заполните все поля');
                        return;
                    }

                    const type = editingType === 'script' ? 'call' : 'test';

                    const newItem = { projectIds, projectNames, title, content, statuses, type };

                    let response;
                    if (editingId === null) {
                        response = await fetch('/.netlify/functions/saveScript', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newItem)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.scripts.push(saved.script);
                        }
                    } else {
                        const oldItem = state.scripts[editingId];
                        response = await fetch('/.netlify/functions/saveScript', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...newItem, id: oldItem.title })
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.scripts[editingId] = saved.script;
                        }
                    }
                    if (!response.ok) throw new Error('Ошибка сохранения');
                } else {
                    console.warn('Неизвестный тип редактирования:', editingType);
                    return;
                }

                closeModal();
                renderContent();
                updateMenuCounts();
                showNotification('Сохранено', 'success');
            } catch (error) {
                console.error('Ошибка в saveModal:', error);
                showNotification('Ошибка: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            document.body.classList.remove('menu-open');
            editingId = null;

        // ========== ИМПОРТ КАНДИДАТОВ ИЗ EXCEL ==========
        function importCandidates(recruiterIndex) {
            currentRecruiterForImport = recruiterIndex;
            const fileInput = document.getElementById('excelUpload');
            fileInput.value = '';
            fileInput.click();
        }

        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (currentRecruiterForImport === null) return;

            const reader = new FileReader();
            reader.onload = async function(loadEvent) {
                try {
                    const data = new Uint8Array(loadEvent.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                    if (rows.length < 2) {
                        showNotification('Файл не содержит данных', 'error');
                        return;
                    }

                    const candidatesAdded = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 2) continue;
                        const fullName = row[0] ? row[0].toString().trim() : '';
                        const phone = row[1] ? row[1].toString().trim() : '';
                        if (!fullName || !phone) continue;

                        const newCandidate = {
                            fullName,
                            phone,
                            project: '',
                            country: '',
                            trainingDate: '',
                            trainingTime: '',
                            meetingTime: '',
                            callResult: '',
                            contactType: '',
                            recruiter: state.recruiters[currentRecruiterForImport].name,
                            comment: '',
                            createdAt: new Date().toISOString()
                        };

                        const response = await fetch('/.netlify/functions/submitCandidate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newCandidate)
                        });
                        if (response.ok) {
                            const saved = await response.json();
                            state.candidates.push(saved.candidate);
                            candidatesAdded.push(saved.candidate);
                        }
                    }

                    if (candidatesAdded.length > 0) {
                        showNotification(`Добавлено контактов: ${candidatesAdded.length}`, 'success');
                        if (currentTab === 'candidates') {
                            renderContent();
                        }
                        updateMenuCounts();
                    } else {
                        showNotification('Не найдено валидных записей', 'error');
                    }
                } catch (err) {
                    console.error(err);
                    showNotification('Ошибка при обработке файла', 'error');
                } finally {
                    currentRecruiterForImport = null;
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // ========== НОВЫЕ ФУНКЦИИ ДЛЯ РЕКРУТЕРА ==========
        function findMatchingRecruiter(candidate) {
            if (!state.candidates || state.candidates.length === 0) return null;
            const { fullName, phone, project } = candidate;
            for (const rc of state.candidates) {
                let matches = 0;
                if (rc.fullName && rc.fullName === fullName) matches++;
                if (rc.phone && rc.phone === phone) matches++;
                if (rc.project && rc.project === project) matches++;
                if (matches >= 2) {
                    return rc.recruiter;
                }
            }
            return null;
        }

        async function updateCandidateRecruiter(id, type, newRecruiter) {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, type, recruiter: newRecruiter })
                });
                if (response.ok) {
                    const candidate = state.allCandidates.find(c => c.id === id && c.type === type);
                    if (candidate) candidate.recruiter = newRecruiter;
                    showNotification('Рекрутер обновлён', 'success');
                } else {
                    const err = await response.json();
                    showNotification('Ошибка: ' + (err.error || ''), 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка сети', 'error');
            }
        }

        // ========== НОВЫЕ ФУНКЦИИ ДЛЯ ВКЛАДКИ "Анкеты" ==========
        function renderCandidatesAll(container) {
            const candidates = state.allCandidates || [];
            const systemStatuses = ['draft', 'passed'];
            const customStatuses = state.callResults.map(r => r.name);
            const allStatuses = [...new Set([...systemStatuses, ...customStatuses])];
            const recruiterOptions = ['Внешний', ...state.recruiters.map(r => r.name)];

            let html = `
                <div class="section-header">
                    <h2>Все анкеты</h2>
                    <button class="add-btn" onclick="openStatusModal()">⚙️ Управление статусами</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>ФИО</th>
                                <th>Проект</th>
                                <th>Рекрутер</th>
                                <th>Тип</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            if (candidates.length === 0) {
                html += '<tr><td colspan="7" style="text-align:center;">Нет анкет</td></tr>';
            } else {
                candidates.forEach(c => {
                    const date = c.createdAt ? new Date(c.createdAt).toLocaleString() : '—';
                    const typeLabel = c.type === 'auto' ? 'Авто' : 'Ручная';
                    const currentStatus = c.recruitmentStatus || 'draft';
                    let matchedRecruiter = c.recruiter;
                    if (!matchedRecruiter) {
                        matchedRecruiter = findMatchingRecruiter(c) || 'Внешний';
                    }
                    let recruiterSelect = `<select class="recruiter-select" data-id="${c.id}" data-type="${c.type}" onchange="updateCandidateRecruiter('${c.id}', '${c.type}', this.value)">`;
                    recruiterOptions.forEach(opt => {
                        const selected = (opt === matchedRecruiter) ? 'selected' : '';
                        recruiterSelect += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                    recruiterSelect += '</select>';

                    html += `
                        <tr data-id="${c.id}" data-type="${c.type}">
                            <td>${date}</td>
                            <td>${c.fullName}</td>
                            <td>${c.project}</td>
                            <td>${recruiterSelect}</td>
                            <td>${typeLabel}</td>
                            <td>
                                <select class="status-select" data-id="${c.id}" data-type="${c.type}" onchange="updateCandidateStatus('${c.id}', '${c.type}', this.value)">
                                    ${allStatuses.map(opt => `<option value="${opt}" ${opt === currentStatus ? 'selected' : ''}>${opt}</option>`).join('')}
                                </select>
                            </td>
                            <td>
                                <button class="delete-btn" onclick="event.stopPropagation(); deleteCandidate('${c.id}', '${c.type}')">✕</button>
                            </td>
                        </tr>
                    `;
                });
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function showCandidateDetails(id, type) {
            const candidate = state.allCandidates.find(c => c.id === id && c.type === type);

            const content = document.getElementById('candidateDetailsContent');
            let filesHtml = '';
            let extraInfoHtml = '';

            let fullName = candidate.fullName || '';
            let nickname = candidate.nickname || '';
            let telegram = candidate.telegram || '';
            let phone = candidate.phone || '';
            let email = candidate.email || '';
            let project = candidate.project || '';

            if (type === 'auto' && candidate.formData) {
                fullName = candidate.formData.fullName || fullName;
                nickname = candidate.formData.nickname || nickname;
                telegram = candidate.formData.telegram || telegram;
                phone = candidate.formData.phone || phone;
                email = candidate.formData.email || email;
                project = candidate.formData.project || project;
            }

            if (type === 'manual') {
                if (candidate.taskInputs && candidate.taskInputs['task_4_input']) {
                    extraInfoHtml += `<p><strong>AnyDesk (задание 5):</strong> ${candidate.taskInputs['task_4_input']}</p>`;
